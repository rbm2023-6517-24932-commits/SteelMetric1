<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Analysis - Axial Compression</title>
    <style>
        /* --- Boot-Up Animation Styles --- */
        #boot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-page); /* Matches your dark background */
            z-index: 9999; /* Keeps it above everything else */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .boot-logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-glow 1.5s infinite alternate;
            margin-bottom: 20px;
        }

        .boot-line {
            width: 0;
            height: 2px;
            background: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan);
            animation: load-line 1.8s ease-in-out forwards;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.2)); transform: scale(0.98); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.6)); transform: scale(1.02); }
        }

        @keyframes load-line {
            0% { width: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 300px; opacity: 1; }
        }

        .hide-boot {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        /* Ensure it doesn't show up when printing */
        @media print {
            #boot-overlay { display: none !important; }
        }
        /* --- End Boot-Up Animation Styles --- */
        /* --- Back Button Styles --- */
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(255, 255, 255, 0.05);
    color: #e2e8f0;
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
    z-index: 1000;
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #ffffff;
    border-color: #3b82f6; 
    transform: translateX(-3px); 
}
        :root {
            --bg-page: #040914;
            --text-main: #f3f4f6;
            --text-label: #9ca3af;
            --accent-blue: #38bdf8;
            --accent-cyan: #22d3ee;
            --accent-orange: #f97316;
            --accent-yellow: #fde047;
            --accent-green: #10b981;
            --danger-red: #ef4444;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(17, 24, 39, 0.55);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-input: rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Glows to make Glassmorphism pop */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: rgba(34, 211, 238, 0.15); /* Cyan glow */
        }
        .blob-2 {
            bottom: -10%; right: -5%;
            width: 45vw; height: 45vw;
            background: rgba(249, 115, 22, 0.12); /* Orange glow */
        }

        /* Main Glass Container */
        .calculator-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 1050px; 
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .badge {
            background: linear-gradient(135deg, var(--accent-orange), #ea580c);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 30px;
            margin-bottom: 25px;
            align-items: start;
        }

        .form-group, .sub-form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .left-column-container, .right-column-container {
            display: flex; flex-direction: column; gap: 18px;
        }

        .input-wrapper {
            display: flex; align-items: center; gap: 10px;
        }

        label {
            font-size: 0.85rem; color: var(--text-label); font-weight: 500;
        }

        /* Glass Inputs */
        input, select {
            background-color: var(--glass-input);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        input.value-input { width: 100px; text-align: center; }

        input[readonly], select:disabled {
            background-color: rgba(0, 0, 0, 0.4);
            color: #6b7280;
            cursor: not-allowed;
            border-color: rgba(255,255,255,0.03);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 10px auto;
            padding-right: 35px;
        }
        
        select option { background-color: #111827; color: white; }

        input:focus, select:focus { 
            outline: none; 
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        .unit-label { color: var(--text-label); font-size: 0.95rem; }

        /* Glass Panels */
        .segments-section, .total-length-container, .segment-row {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .segments-section {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .segments-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;
        }

        .segments-header h3 { margin: 0; font-size: 1.15rem; color: var(--accent-cyan); }

        .total-length-container {
            display: flex; align-items: flex-start; flex-direction: column; gap: 15px; margin-bottom: 20px;
            padding: 18px; border: 1px solid rgba(249, 115, 22, 0.3);
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.05), transparent);
        }

        /* Glassmorphism Buttons */
        .btn-add-segment {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .btn-add-segment:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }

        .segments-input-area { display: flex; flex-direction: column; gap: 10px; }
        .segment-row { display: flex; gap: 10px; align-items: center; padding: 12px; }
        .segment-row input.brace-elev { width: 130px; }
        .segment-row select.k-factor-dropdown { flex-grow: 1; }
        .segment-row select.axis-dropdown { width: 120px; }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-remove:hover { background: var(--danger-red); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.4); }

        .segments-visualizer-area {
            position: relative;
            min-height: 400px;
            border-left: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Gradient Action Buttons */
        .btn-calculate {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #040914;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
            text-transform: uppercase;
        }
        .btn-calculate:hover { 
            box-shadow: 0 12px 25px rgba(34, 211, 238, 0.5); 
            transform: translateY(-2px); 
            filter: brightness(1.1);
        }

        .btn-print {
            background: transparent; 
            color: var(--text-label); 
            border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; width: 100%; margin-top: 15px; 
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .btn-print:hover { background: rgba(255,255,255,0.05); color: white; border-color: rgba(255,255,255,0.2); }

        /* ADVANCED RESULTS PANEL (Glass Cards) */
        .results-panel {
            margin-top: 35px; 
            display: none; 
            animation: fadeIn 0.5s ease-out;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .summary-header {
            font-size: 1.25rem; font-weight: bold; color: #ffffff; margin-bottom: 20px;
            display: inline-block; border-bottom: 2px solid var(--accent-cyan); padding-bottom: 5px;
        }

        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .summary-item { display: flex; flex-direction: column; gap: 6px; }
        .summary-label { font-size: 0.8rem; color: var(--text-label); text-transform: uppercase; letter-spacing: 1px;}
        .summary-value { font-size: 1.3rem; font-weight: bold; color: white; }
        
        /* Neon Accents */
        .val-cyan { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        .val-yellow { color: var(--accent-yellow); text-shadow: 0 0 10px rgba(253, 224, 71, 0.4); }
        .val-green { color: var(--accent-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        .k-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.95rem; color: var(--text-main); }
        .k-table th { text-align: left; padding: 15px 10px; color: var(--text-label); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; border-bottom: 1px solid var(--glass-border); }
        .k-table td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .k-table tr:hover td { background: rgba(255,255,255,0.02); }

        .analyzed-section-panel {
            text-align: center; padding: 40px;
            background: radial-gradient(circle at top, rgba(34, 211, 238, 0.08), transparent 70%);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .section-subtitle { font-size: 0.85rem; color: var(--accent-cyan); text-transform: uppercase; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .section-title { font-size: 4rem; font-weight: 900; color: white; margin: 0; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .section-props { font-size: 1rem; color: var(--text-label); margin: 20px 0 35px 0; }

        .section-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 450px; margin: 0 auto; }
        .stat-item { display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { font-size: 1.8rem; font-weight: bold; }

        #print-report { display: none; }

        /* Ensure Print Report stays plain white */
        @media print {
            body { background-color: white; background-image: none; color: black; padding: 0; margin: 0; display: block; }
            .bg-blob, .calculator-container { display: none !important; } 
            #print-report { display: block; width: 100%; font-family: 'Times New Roman', Times, serif; }
            .print-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 15px; }
            .print-header h1 { margin: 0; font-size: 24pt; letter-spacing: 2px; }
            .print-header h2 { margin: 5px 0 0 0; font-size: 14pt; color: #333; font-weight: normal; }
            .print-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 11pt; }
            .print-table th, .print-table td { border: 1px solid #000; padding: 10px; text-align: left; }
            .print-table th { background-color: #f2f2f2; font-weight: bold; width: 40%; }
        }
    </style>
</head>

<div class="calculator-container">

    <div class="form-grid">
        <div class="left-column-container">
            <div class="sub-form-group">
                <label>Design Method</label>
                <select id="method">
                    <option value="LRFD">LRFD</option>
                    <option value="ASD">ASD</option>
                </select>
            </div>
            <div class="sub-form-group">
                <label>Analyzed Section (W-Shape)</label>
                <select id="w_shape_select"></select>
            </div>
        </div>

        <div class="right-column-container">
            <div class="sub-form-group">
                <label>ASTM Designation</label>
                <select id="astm_select" onchange="handleASTMChange()"></select>
            </div>
            <div class="sub-form-group">
                <label>Grade</label>
                <select id="grade_select" onchange="handleGradeChange()"></select>
            </div>

                <label>Yield Strength (Fy)</label>
                <div class="input-wrapper">
                    <input type="number" id="fy_value" class="value-input" value="50" step="1" readonly>

                </div>
            </div>
        </div>
    </div>

    <div class="segments-section">
        <div class="segments-input-area">
            <div class="segments-header">
                <h3>Column Geometry & Bracing</h3>
                <button class="btn-add-segment" onclick="addSegment()">+ Add Brace Point</button>
            </div>
            
            <div class="total-length-container">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <label style="width: 135px;">Total Column Length:</label>
                    <div class="input-wrapper" style="width:130px;">
                        <input type="number" id="total-length" value="30" step="0.1" oninput="updateVisualizer()">
                        <span class="unit-label">ft</span>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <label style="width: 135px;">Base (0 ft):</label>
                    <select id="base_condition" onchange="updateVisualizer()" style="width: 130px;">
                        <option value="Fixed">Fixed</option>
                        <option value="Pinned">Pinned</option>
                        <option value="Free">Free</option>
                    </select>
                </div>
            </div>

            <label style="margin-bottom: 5px; display: block; color: var(--accent-cyan);">Intermediate & Top Bracing Points:</label>
            <div id="segments-container">
                <div class="segment-row">
                    <input type="number" class="brace-elev" placeholder="Elev from 0 (ft)" value="15" step="0.1" onchange="sortSegmentsAndUpdate()">
                    <select class="k-factor-dropdown" onchange="updateVisualizer()">
                        <option value="1.0" data-desc="Pinned - Pinned">K = 1.0 (Pinned)</option>
                        <option value="0.65" data-desc="Fixed - Fixed">K = 0.65 (Fixed-Fixed)</option>
                        <option value="0.8" data-desc="Fixed - Pinned">K = 0.8 (Fixed-Pinned)</option>
                        <option value="1.2" data-desc="Sway">K = 1.2 (Sway)</option>
                        <option value="2.1" data-desc="Cantilever">K = 2.1 (Cantilever)</option>
                    </select>
                    <select class="axis-dropdown" onchange="updateVisualizer()">
                        <option value="Both">Both Axes</option>
                        <option value="X">X-Axis (Left)</option>
                        <option value="Y">Y-Axis (Right)</option>
                    </select>
                    <button class="btn-remove" onclick="removeSegment(this)">X</button>
                </div>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-label); margin-top: 5px; font-style: italic;">
                * Type the elevation, then click away to automatically sort it from bottom to top.
            </p>
        </div>
        
        <div id="visualizer-svg-container" class="segments-visualizer-area"></div>
    </div>

    <button class="btn-calculate" onclick="calculate()">Analyze Capacity</button>
    <button class="btn-print" onclick="window.print()">Print / Save PDF</button>

    <div id="results-wrapper"></div>
</div>

        }

    function resolveOverlap(labels, spacing) {
        labels.sort((a,b) => a.rawY - b.rawY);
        labels.forEach(l => l.adjY = l.rawY);
        for(let iter=0; iter<5; iter++) { 
            for(let i=0; i<labels.length-1; i++) {
                let diff = labels[i+1].adjY - labels[i].adjY;
                if(diff < spacing) {
                    let overlap = spacing - diff;
                    labels[i].adjY -= overlap / 2;
                    labels[i+1].adjY += overlap / 2;
                }
            }
        }
    }

    function updateVisualizer() {
        const svgContainer = document.getElementById('visualizer-svg-container');
        let totalLength = parseFloat(document.getElementById('total-length').value) || 10;
        const baseCondition = document.getElementById('base_condition').value;

        let braces = [];
        document.querySelectorAll('.segment-row').forEach(row => {
            let elev = parseFloat(row.querySelector('.brace-elev').value);
            let K = parseFloat(row.querySelector('.k-factor-dropdown').value);
            let axis = row.querySelector('.axis-dropdown').value;
            if (!isNaN(elev) && elev > 0 && elev <= totalLength) {
                braces.push({ elev, K, axis });
            }
        });
        braces.sort((a,b) => a.elev - b.elev);

        const svgWidth = 400; const svgHeight = 400;
        const colX = 200; const topY = 40; const baseY = 360;
        const pixelPerFt = (baseY - topY) / totalLength;

        let svgHTML = `<svg viewBox="0 0 ${svgWidth} ${svgHeight}" width="100%" height="100%">`;

        svgHTML += `<line x1="${colX}" y1="${topY}" x2="${colX}" y2="${baseY}" stroke="var(--accent-cyan)" stroke-width="6" stroke-linecap="round" style="filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.5));"/>`;

        if (baseCondition === 'Fixed') {
            svgHTML += `<line x1="${colX-25}" y1="${baseY+3}" x2="${colX+25}" y2="${baseY+3}" stroke="var(--text-main)" stroke-width="3"/>`;
            for(let i=-20; i<=20; i+=10) {
                svgHTML += `<line x1="${colX+i}" y1="${baseY+3}" x2="${colX+i-10}" y2="${baseY+13}" stroke="var(--text-label)" stroke-width="2"/>`;
            }
        } else if (baseCondition === 'Pinned') {
            svgHTML += `<polygon points="${colX},${baseY} ${colX-15},${baseY+15} ${colX+15},${baseY+15}" fill="none" stroke="var(--text-main)" stroke-width="2"/>`;
            svgHTML += `<line x1="${colX-25}" y1="${baseY+15}" x2="${colX+25}" y2="${baseY+15}" stroke="var(--text-main)" stroke-width="2"/>`;
        }

        let rightLabels = [];
        rightLabels.push({ rawY: baseY, text: `Base (0 ft)`, isBase: true });
        
        braces.forEach(b => {
            let isTop = (b.elev === totalLength);
            let text = isTop ? `@ ${b.elev.toFixed(1)} ft (Top)` : `@ ${b.elev.toFixed(1)} ft`;
            rightLabels.push({ rawY: baseY - b.elev * pixelPerFt, text: text, isTop: isTop });
        });
        
        if (!braces.some(b => b.elev === totalLength)) {
            rightLabels.push({ rawY: topY, text: `@ ${totalLength.toFixed(1)} ft (Top)`, isTop: true });
        }

        let leftLabels = [];
        let allPoints = [0];
        braces.forEach(b => { if(!allPoints.includes(b.elev)) allPoints.push(b.elev); });
        if (!allPoints.includes(totalLength)) allPoints.push(totalLength);
        allPoints.sort((a,b) => a - b);
        
        for(let i=1; i<allPoints.length; i++) {
            let midElev = (allPoints[i] + allPoints[i-1]) / 2;
            let L = allPoints[i] - allPoints[i-1];
            let rawY = baseY - midElev * pixelPerFt;
            leftLabels.push({ rawY, text: `L = ${L.toFixed(1)} ft` });
        }

        resolveOverlap(rightLabels, 20);
        resolveOverlap(leftLabels, 20);

        svgHTML += `<line x1="${colX-10}" y1="${topY}" x2="${colX+10}" y2="${topY}" stroke="var(--text-main)" stroke-width="2"/>`;
        
        braces.forEach(b => {
            let y = baseY - b.elev * pixelPerFt;
            svgHTML += `<line x1="${colX-10}" y1="${y}" x2="${colX+10}" y2="${y}" stroke="var(--text-main)" stroke-width="2"/>`;

            if(b.axis === 'X' || b.axis === 'Both') {
                if(b.K === 1.0) { 
                    svgHTML += `<polygon points="${colX-10},${y} ${colX-25},${y-8} ${colX-25},${y+8}" fill="var(--text-main)"/>`;
                } else { 
                    svgHTML += `<circle cx="${colX-15}" cy="${y}" r="5" fill="var(--text-main)"/>`;
                }
            }
            if(b.axis === 'Y' || b.axis === 'Both') {
                if(b.K === 1.0) { 
                    svgHTML += `<polygon points="${colX+10},${y} ${colX+25},${y-8} ${colX+25},${y+8}" fill="var(--text-main)"/>`;
                } else { 
                    svgHTML += `<circle cx="${colX+15}" cy="${y}" r="5" fill="var(--text-main)"/>`;
                }
            }
        });

        rightLabels.forEach(l => {
            svgHTML += `<polyline points="${colX+30},${l.rawY} ${colX+45},${l.rawY} ${colX+55},${l.adjY} ${colX+65},${l.adjY}" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,3"/>`;
            let color = l.isBase ? "var(--text-label)" : "var(--accent-orange)";
            let weight = l.isBase ? "normal" : "bold";
            svgHTML += `<text x="${colX+70}" y="${l.adjY + 4}" fill="${color}" font-size="12" font-weight="${weight}">${l.text}</text>`;
        });

        leftLabels.forEach(l => {
            svgHTML += `<polyline points="${colX-30},${l.rawY} ${colX-45},${l.rawY} ${colX-55},${l.adjY} ${colX-65},${l.adjY}" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,3"/>`;
            svgHTML += `<text x="${colX-70}" y="${l.adjY + 4}" fill="var(--text-label)" font-size="12" text-anchor="end">${l.text}</text>`;
        });

        svgHTML += `</svg>`;
        svgContainer.innerHTML = svgHTML;
    }

    function sortSegmentsAndUpdate() {
        const container = document.getElementById('segments-container');
        const rows = Array.from(container.querySelectorAll('.segment-row'));
        
        rows.sort((a, b) => {
            const valA = parseFloat(a.querySelector('.brace-elev').value) || 0;
            const valB = parseFloat(b.querySelector('.brace-elev').value) || 0;
            return valA - valB;
        });
        
        rows.forEach(row => container.appendChild(row));
        updateVisualizer();
    }

    function calculate() {
        const method = document.getElementById('method').value;
        const E = 29000; 
        
        const sectionIndex = document.getElementById('w_shape_select').value;
        const section = sectionDatabase[sectionIndex];

        const astmVal = document.getElementById('astm_select').value;
        const gradeVal = document.getElementById('grade_select').value;
        let displaySteelName = astmVal === "Custom" ? "Custom Steel Grade" : `ASTM ${astmVal}`;
        const Fy = parseFloat(document.getElementById('fy_value').value); 

        let totalLength = parseFloat(document.getElementById('total-length').value) || 0;

        if (isNaN(Fy) || Fy <= 0 || totalLength <= 0) {
            alert("Please ensure Yield Strength and Total Length are valid positive numbers.");
            return;
        }

        let allBraces = [];
        let tableData = []; 

        document.querySelectorAll('.segment-row').forEach(row => {
            let elev = parseFloat(row.querySelector('.brace-elev').value);
            let kDropdown = row.querySelector('.k-factor-dropdown');
            let K = parseFloat(kDropdown.value);
            let kDesc = kDropdown.options[kDropdown.selectedIndex].getAttribute('data-desc') || "Pinned - Pinned";
            let axis = row.querySelector('.axis-dropdown').value;
            
            if (!isNaN(elev) && elev > 0 && elev <= totalLength) {
                allBraces.push({ elev, K, axis, kDesc });
            }
        });
        allBraces.sort((a,b) => a.elev - b.elev);

        let maxKLx = 0; let maxKLy = 0;

        let bracesX = allBraces.filter(b => b.axis === 'X' || b.axis === 'Both');
        if (!bracesX.some(b => b.elev === totalLength)) { bracesX.push({ elev: totalLength, K: 1.0, axis: 'X', kDesc: "Pinned - Pinned" }); }
        let prevX = 0;
        bracesX.forEach((b, idx) => {
            let L = b.elev - prevX;
            let KL = b.K * L * 12; 
            if (KL > maxKLx) maxKLx = KL;
            tableData.push({ element: `Element ${idx + 1}`, length: L, axis: 'X', kDesc: b.kDesc, kVal: b.K, KL: KL });
            prevX = b.elev;
        });

        let bracesY = allBraces.filter(b => b.axis === 'Y' || b.axis === 'Both');
        if (!bracesY.some(b => b.elev === totalLength)) { bracesY.push({ elev: totalLength, K: 1.0, axis: 'Y', kDesc: "Pinned - Pinned" }); }
        let prevY = 0;
        bracesY.forEach((b, idx) => {
            let L = b.elev - prevY;
            let KL = b.K * L * 12; 
            if (KL > maxKLy) maxKLy = KL;
            tableData.push({ element: `Element ${idx + 1}`, length: L, axis: 'Y', kDesc: b.kDesc, kVal: b.K, KL: KL });
            prevY = b.elev;
        });

        let slendernessX = maxKLx / section.rx;
        let slendernessY = maxKLy / section.ry;
        
        let gov_slenderness = 0; let axisCtrl = "Y";

        if (maxKLx <= maxKLy) {
            gov_slenderness = slendernessY; axisCtrl = "Y";
        } else {
            let KLeff = maxKLx / (section.rx / section.ry);
            if (KLeff > maxKLy) { gov_slenderness = KLeff / section.ry; axisCtrl = "X"; } 
            else { gov_slenderness = maxKLy / section.ry; axisCtrl = "Y"; }
        }

        let Fe = (Math.pow(Math.PI, 2) * E) / Math.pow(gov_slenderness, 2);
        let lambda_c = 4.71 * Math.sqrt(E / Fy);
        let Fcr = gov_slenderness <= lambda_c ? Math.pow(0.658, (Fy / Fe)) * Fy : 0.877 * Fe;
        
        let Pn = Fcr * section.Ag;
        let capacity = method === "LRFD" ? 0.9 * Pn : Pn / 1.67; 
        
        let limitWarning = gov_slenderness > 200 ? `<br><span style="color:var(--danger-red); font-size: 0.9rem;">SLENDERNESS LIMIT EXCEEDED (>200)</span>` : '';

        const wrapper = document.getElementById('results-wrapper');
        
        let tableHTML = "";
        tableData.forEach(row => {
            tableHTML += `
                <tr>
                    <td>${row.element}</td>
                    <td>${row.length.toFixed(2)}</td>
                    <td>${row.axis}</td>
                    <td>${row.kDesc}</td>
                    <td>${row.kVal.toFixed(2)}</td>
                    <td class="val-cyan">${row.KL.toFixed(1)}</td>
                </tr>
            `;
        });

        wrapper.innerHTML = `
            <div class="results-panel">
                
                <div class="result-card">
                    <div class="summary-header">Analysis Summary</div>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <span class="summary-label">Steel Grade</span>
                            <span class="summary-value">${displaySteelName} Fy=${Fy}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Max (KL)x</span>
                            <span class="summary-value val-yellow">${maxKLx.toFixed(1)} in</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Max (KL)y</span>
                            <span class="summary-value val-yellow">${maxKLy.toFixed(1)} in</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Controlling</span>
                            <span class="summary-value">(KL)${axisCtrl.toLowerCase()}</span>
                        </div>
                    </div>
                </div>

                <div class="result-card k-factor-panel">
                    <div class="summary-header">Elements with K Factors</div>
                    <table class="k-table">
                        <thead>
                            <tr>
                                <th>Element</th>
                                <th>Length (ft)</th>
                                <th>Axis</th>
                                <th>K Factor</th>
                                <th>K Value</th>
                                <th>(KL) (in)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableHTML}
                        </tbody>
                    </table>
                </div>

                <div class="result-card analyzed-section-panel">
                    <div class="section-subtitle">ANALYZED SECTION</div>
                    <div class="section-title">${section.name}</div>
                    <div class="section-props">Fy=${Fy} ksi | rx/ry=${(section.rx/section.ry).toFixed(2)} | ${axisCtrl} controls</div>
                    
                    <div class="section-stats-grid">
                        <div class="stat-item">
                            <span class="summary-label">KL/r</span>
                            <span class="stat-val val-cyan">${gov_slenderness.toFixed(1)}</span>
                        </div>
                        <div class="stat-item">
                            <span class="summary-label">Capacity</span>
                            <span class="stat-val val-green">${capacity.toFixed(1)} kips</span>
                        </div>
                    </div>
                    ${limitWarning}
                </div>

            </div>
        `;

        const printDiv = document.getElementById('print-report');
        printDiv.innerHTML = `
            <div class="print-header">
                <h1>STEEL ANALYSIS REPORT</h1>
                <h2>AXIAL COMPRESSION</h2>
            </div>
            
            <h3>1. Input Parameters</h3>
            <table class="print-table">
                <tr><th>Analyzed Section</th><td>${section.name} (Ag = ${section.Ag} in², rx = ${section.rx} in, ry = ${section.ry} in)</td></tr>
                <tr><th>Material Grade</th><td>${displaySteelName}, Fy = ${Fy} ksi</td></tr>
                <tr><th>Design Method</th><td>${method}</td></tr>
                <tr><th>Total Column Length</th><td>${totalLength.toFixed(1)} ft</td></tr>
            </table>

            <h3>2. Unbraced Segments & K-Factors</h3>
            <table class="print-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Element</th>
                        <th style="width: 15%;">Length (ft)</th>
                        <th style="width: 15%;">Axis</th>
                        <th style="width: 20%;">K Factor Desc.</th>
                        <th style="width: 15%;">K Value</th>
                        <th style="width: 15%;">(KL) (in)</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableHTML}
                </tbody>
            </table>

            <h3>3. Analysis Results</h3>
            <table class="print-table">
                <tr><th>Maximum (KL)x</th><td>${maxKLx.toFixed(1)} in</td></tr>
                <tr><th>Maximum (KL)y</th><td>${maxKLy.toFixed(1)} in</td></tr>
                <tr><th>Controlling Axis</th><td>${axisCtrl}</td></tr>
                <tr><th>Controlling Slenderness (KL/r)</th><td>${gov_slenderness.toFixed(1)} ${gov_slenderness > 200 ? ' (EXCEEDS LIMIT OF 200)' : ''}</td></tr>
                <tr><th>Nominal Compressive Strength (Pn)</th><td>${Pn.toFixed(1)} kips</td></tr>
                <tr><th>Available Capacity (${method})</th><td><strong>${capacity.toFixed(1)} kips</strong></td></tr>
            </table>
        `;
        wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
</body>
</html>
