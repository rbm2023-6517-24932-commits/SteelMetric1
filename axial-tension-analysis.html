<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Analysis - Axial Tension</title>
    <style>

                .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: #3b82f6; 
            transform: translateX(-3px); 
        }

        /* --- Boot-Up Animation Styles --- */
        #boot-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-page); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .boot-logo {
            font-size: 2.5rem; font-weight: 900; letter-spacing: 6px; color: #ffffff;
            text-transform: uppercase; background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse-glow 1.5s infinite alternate; margin-bottom: 20px;
        }

        .boot-line {
            width: 0; height: 2px; background: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan); animation: load-line 1.8s ease-in-out forwards;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.2)); transform: scale(0.98); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px #00FFFF); transform: scale(1.02); }
        }

        @keyframes load-line { 0% { width: 0; opacity: 0; } 50% { opacity: 1; } 100% { width: 300px; opacity: 1; } }
        .hide-boot { opacity: 0; visibility: hidden; pointer-events: none; }
        
        @media print { #boot-overlay { display: none !important; } }

        /* --- Base Variables & Glassmorphism --- */
        :root {
            --bg-page: #040914; --text-main: #f3f4f6; --text-label: #9ca3af;
            --accent-blue: #38bdf8; --accent-cyan: #22d3ee; --accent-orange: #f97316;
            --accent-yellow: #fde047; --accent-green: #10b981; --danger-red: #ef4444;
            --glass-bg: rgba(17, 24, 39, 0.55); --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08); --glass-input: rgba(0, 0, 0, 0.25);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-page); color: var(--text-main); display: flex;
            justify-content: center; align-items: flex-start; min-height: 100vh;
            margin: 0; padding: 40px 20px; overflow-x: hidden; position: relative;
        }

        .bg-blob { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.6; pointer-events: none; }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(249, 115, 22, 0.15); }
        .blob-2 { bottom: -10%; right: -5%; width: 45vw; height: 45vw; background: rgba(34, 211, 238, 0.12); }

        .calculator-container {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 100%; max-width: 1050px; padding: 40px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
        }

        .header { text-align: center; margin-bottom: 35px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .header h1 { font-size: 1.8rem; letter-spacing: 4px; margin: 0; background: linear-gradient(to right, #ffffff, var(--accent-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .badge { background: linear-gradient(135deg, var(--accent-cyan), #0284c7); color: white; padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(34, 211, 238, 0.3); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 30px; margin-bottom: 25px; align-items: start; }
        .form-group, .sub-form-group { display: flex; flex-direction: column; gap: 6px; }
        .column-container { display: flex; flex-direction: column; gap: 18px; }
        .input-wrapper { display: flex; align-items: center; gap: 10px; }
        label { font-size: 0.85rem; color: var(--text-label); font-weight: 500; }

        input, select {
            background-color: var(--glass-input); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: white; padding: 12px 14px;
            border-radius: 8px; font-size: 0.95rem; transition: all 0.3s ease; width: 100%;
        }
        input.value-input { width: 100px; text-align: center; }
        input[readonly], select:disabled { background-color: rgba(0, 0, 0, 0.4); color: #6b7280; cursor: not-allowed; border-color: rgba(255,255,255,0.03); }

        select {
            appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 10px auto; padding-right: 35px;
        }
        
        select option { background-color: #ffffff; color: #000000; }
        
        input:focus, select:focus { outline: none; border-color: var(--accent-orange); box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15); }
        .unit-label { color: var(--text-label); font-size: 0.95rem; }

        .glass-panel { background: var(--glass-panel); border: 1px solid var(--glass-border); border-radius: 12px; backdrop-filter: blur(10px); padding: 25px; margin-bottom: 25px; }
        .panel-header { margin: 0 0 15px 0; font-size: 1.15rem; color: var(--accent-orange); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .toggle-container { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 10px; }
        .toggle-container input[type="checkbox"] { width: auto; cursor: pointer; transform: scale(1.2); accent-color: var(--accent-orange); }
        .conditional-panel { background: rgba(249, 115, 22, 0.05); border: 1px dashed rgba(249, 115, 22, 0.3); border-radius: 8px; padding: 15px; margin-top: 15px; display: none; }
        .conditional-panel.active { display: block; }

        .hole-grid { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 10px; align-items: center; margin-bottom: 10px; }
        .btn-small { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 6px; cursor: pointer; }
        .btn-small:hover { background: rgba(255,255,255,0.2); }
        .btn-remove { background: rgba(239, 68, 68, 0.2); color: var(--danger-red); border: 1px solid rgba(239,68,68,0.4); padding: 8px; border-radius: 6px; cursor: pointer; }
        
        .svg-container { width: 100%; min-height: 250px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; margin-top: 20px; position: relative; overflow: hidden; display: block; margin-left: auto; margin-right: auto; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn-calculate { background: linear-gradient(135deg, var(--accent-orange), #ea580c); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 16px; border-radius: 8px; font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; cursor: pointer; width: 100%; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3); text-transform: uppercase; margin-bottom: 10px; }
        .btn-calculate:hover { box-shadow: 0 12px 25px rgba(249, 115, 22, 0.5); transform: translateY(-2px); filter: brightness(1.1); }

        .results-panel { margin-top: 35px; display: none; animation: fadeIn 0.5s ease-out; flex-direction: column; align-items: center; justify-content: center; gap: 25px; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-card { background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid var(--glass-border); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px 30px; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); width: 100%; max-width: 900px; }
        .summary-header { font-size: 1.25rem; font-weight: bold; color: #ffffff; margin-bottom: 20px; display: inline-block; border-bottom: 2px solid var(--accent-orange); padding-bottom: 5px; }
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .summary-item { display: flex; flex-direction: column; gap: 6px; }
        .summary-label { font-size: 0.8rem; color: var(--text-label); text-transform: uppercase; letter-spacing: 1px;}
        .summary-value { font-size: 1.3rem; font-weight: bold; color: white; }

        .val-cyan { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        .val-orange { color: var(--accent-orange); text-shadow: 0 0 10px rgba(249, 115, 22, 0.4); }
        .val-green { color: var(--accent-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .val-red { color: var(--danger-red); text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        .analyzed-section-panel { text-align: center; padding: 40px; background: radial-gradient(circle at top, rgba(34, 211, 238, 0.08), transparent 70%); border: 1px solid rgba(34, 211, 238, 0.2); }
        .section-subtitle { font-size: 0.85rem; color: var(--accent-cyan); text-transform: uppercase; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .section-title { font-size: 3rem; font-weight: 900; color: white; margin: 0; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .section-props { font-size: 1rem; color: var(--text-label); margin: 20px 0 35px 0; }
        .section-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 0 auto; }
        .stat-item { display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { font-size: 1.4rem; font-weight: bold; }
        
        .visual-tabs { display: flex; gap: 10px; }
        .v-tab { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 6px; cursor: pointer; color: var(--text-label); }
        .v-tab.active { background: rgba(34, 211, 238, 0.15); border-color: var(--accent-cyan); color: white; font-weight: bold; }
        
        .btn-rotate { background: rgba(249, 115, 22, 0.15); color: var(--accent-orange); border: 1px solid var(--accent-orange); font-weight: bold; }
        .btn-rotate:hover { background: rgba(249, 115, 22, 0.3); }
    </style>

</head>
<body>

    <a href="index.html" class="back-btn">тЖР Back to Home</a>
    
    <div id="boot-overlay">
        <div class="boot-logo">STEEL ANALYSIS</div>
        <div class="boot-line"></div>
    </div>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="calculator-container">
        <div class="header">
            <h1>STEEL ANALYSIS</h1>
            <span class="badge">AXIAL TENSION</span>
        </div>

        <div class="form-grid">
            <div class="column-container">
                <div class="sub-form-group">
                    <label>Shape Category</label>
                    <select id="shape_type" onchange="populateSpecificShapes()"></select>
                </div>
                
                <div class="sub-form-group" id="specific_shape_container">
                    <label>Specific Shape</label>
                    <select id="specific_shape" onchange="updateShapeProperties()"></select>
                </div>

                <div class="sub-form-group" id="conn_part_container">
                    <label style="color: var(--accent-cyan);">Connected Part</label>
                    <select id="conn_part" onchange="updateShapeProperties()"></select>
                </div>

                <div class="form-grid" id="shape_props_container" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); margin-top: 5px; margin-bottom: 0;">
                    <div class="sub-form-group">
                        <label>Conn. Thickness, t (in)</label>
                        <input type="number" id="shape_t" value="0.5" readonly style="color: var(--accent-cyan); font-weight: bold;">
                    </div>
                    <div class="sub-form-group" id="t_web_container" style="display:none;">
                        <label>Web Thickness, tw (in)</label>
                        <input type="number" id="shape_tw" value="0.5" readonly style="color: var(--accent-orange); font-weight: bold;">
                    </div>
                    <div class="sub-form-group">
                        <label>Gross Area (in┬▓)</label>
                        <input type="number" id="shape_ag" readonly>
                    </div>
                    <div class="sub-form-group">
                        <label>Eccentricity (in)</label>
                        <input type="number" id="shape_ecc" value="0" readonly>
                    </div>
                </div>

                <div class="form-grid" id="plate_dim_container" style="display: none; margin-bottom: 0;">
                    <div class="sub-form-group">
                        <label>Plate Width (in)</label>
                        <input type="number" id="plate_width" value="6.0" step="0.5">
                    </div>
                    <div class="sub-form-group">
                        <label>Thickness (in)</label>
                        <input type="number" id="plate_thickness" value="0.5" step="0.125" onchange="document.getElementById('shape_t').value=this.value;">
                    </div>
                </div>
            </div>

            <div class="column-container">
                <div class="sub-form-group">
                    <label>ASTM Designation</label>
                    <select id="astm_select" onchange="handleASTM()"></select>
                </div>
                <div class="sub-form-group">
                    <label>Grade</label>
                    <select id="grade_select" onchange="handleGrade()"></select>
                </div>
                <div class="form-grid" style="margin-bottom: 0;">
                    <div class="sub-form-group">
                        <label>Yield (Fy)</label>
                        <div class="input-wrapper"><input type="number" id="fy" class="value-input" value="50" readonly><span class="unit-label">ksi</span></div>
                    </div>
                    <div class="sub-form-group">
                        <label>Ultimate (Fu)</label>
                        <div class="input-wrapper"><input type="number" id="fu" class="value-input" value="65" readonly><span class="unit-label">ksi</span></div>
                    </div>
                </div>
                
                <div class="sub-form-group" style="margin-top: 15px;">
                    <label>Design Output Format</label>
                    <select id="method">
                        <option value="LRFD">LRFD (Design Strength, ╧ЖPn)</option>
                        <option value="ASD">ASD (Allowable Strength, Pn/╬й)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <h3 class="panel-header">Connection Details & Visualization</h3>
            
            <div class="form-grid" style="margin-bottom: 15px;">
                <div class="column-container">
                    <div class="sub-form-group">
                        <label>Diameter Input Type</label>
                        <select id="diameter_type">
                            <option value="bolt">Bolt Diameter (+1/8" for hole)</option>
                            <option value="hole">Hole Diameter (+1/16" for damage)</option>
                        </select>
                    </div>
                    <div class="form-grid" style="margin-bottom: 0;">
                        <div class="sub-form-group">
                            <label>Diameter Value (in)</label>
                            <select id="diameter_val" onchange="handleDiameter(); drawVisuals();">
                                <option value="0.5">1/2"</option>
                                <option value="0.625">5/8"</option>
                                <option value="0.75" selected>3/4"</option>
                                <option value="0.875">7/8"</option>
                                <option value="1.0">1"</option>
                                <option value="custom">Custom...</option>
                            </select>
                        </div>
                        <div class="sub-form-group" id="custom_dia_container" style="display: none;">
                            <label style="color: var(--accent-orange);">Custom Dia. (in)</label>
                            <input type="number" id="custom_dia_input" value="1.125" step="0.0625" onchange="drawVisuals()">
                        </div>
                    </div>
                    <div class="sub-form-group" id="gage_spacing_container" style="margin-top: 10px;">
                        <label style="color: var(--accent-cyan);">Transverse Gage Spacing, g (in)</label>
                        <input type="number" id="gage_spacing" value="3.5" step="0.5" onchange="drawVisuals()">
                    </div>
                </div>

                <div class="column-container">
                    <div class="sub-form-group">
                        <label>Shear Lag Factor (U)</label>
                        <select id="shear_lag" onchange="handleShearLag()">
                            <option value="auto">Auto-Calculate (Case 2 / Case 7)</option>
                            <option value="1.0">Case 1 - 1.0 (All elements connected)</option>
                            <option value="0.80">Case 8a - 0.80 (тЙе 4 fasteners per line)</option>
                            <option value="0.60">Case 8b - 0.60 (3 fasteners per line)</option>
                        </select>
                    </div>
                    
                    <div class="sub-form-group" id="manual_l_container" style="display: none;">
                        <label style="color: var(--accent-orange);">Connection Length L (in) <small>(For Case 2)</small></label>
                        <input type="number" id="manual_l" value="5.0" step="0.5">
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="visual-tabs">
                    <div class="v-tab active" id="tab_cross" onclick="switchTab('cross')">Cross-Section View</div>
                    <div class="v-tab" id="tab_flat" onclick="switchTab('flat')">Flattened 2D Layout</div>
                </div>
                <button class="btn-small btn-rotate" onclick="rotateVisuals()">тЖ╗ Rotate View 90┬░</button>
            </div>

            <div id="view_cross">
                <svg id="svg-cross" class="svg-container" preserveAspectRatio="xMidYMid meet"></svg>
            </div>

            <div id="view_flat" style="display: none;">
                <label class="toggle-container" style="margin: 0 0 20px 0;" id="stagger_toggle_container">
                    <input type="checkbox" id="is_staggered" onchange="toggleStaggerPanel()">
                    <span style="font-size: 1.05rem; font-weight: bold; color: var(--accent-cyan);">Path is Staggered (Enable Manual 2D Grid)</span>
                </label>

                <div id="simple_holes_panel" class="form-grid">
                    <div class="sub-form-group">
                        <label id="lbl_holes_1">Number of Holes in Critical Path</label>
                        <input type="number" id="num_holes_simple" value="2" step="1" min="0" onchange="drawVisuals()">
                    </div>
                    <div class="sub-form-group" id="simple_holes_web_container" style="display: none;">
                        <label id="lbl_holes_2" style="color: var(--accent-orange);">Number of Holes in Web/Leg 2</label>
                        <input type="number" id="num_holes_web" value="2" step="1" min="0" onchange="drawVisuals()">
                    </div>
                </div>

                <div class="conditional-panel" id="stagger_panel">
                    <p style="color: var(--text-label); font-size: 0.85rem; margin-top: 0;">
                        Add your staggered bolt coordinates below. X=0 and Y=0 represents the top-left edge of the flattened plate.
                    </p>
                    <div id="hole-list">
                        <div class="hole-grid"><input type="number" class="hx" value="0" onchange="drawVisuals()"><input type="number" class="hy" value="0" onchange="drawVisuals()"><button class="btn-remove" onclick="removeHole(this)">X</button></div>
                        <div class="hole-grid"><input type="number" class="hx" value="3" onchange="drawVisuals()"><input type="number" class="hy" value="3" onchange="drawVisuals()"><button class="btn-remove" onclick="removeHole(this)">X</button></div>
                    </div>
                    <button class="btn-small" onclick="addHoleRow()" style="margin-bottom: 0;">+ Add Hole</button>
                </div>

                <button class="btn-small" onclick="drawVisuals()" style="background: var(--accent-orange); color: #000; font-weight: bold; margin-top: 15px; margin-bottom: 10px;">Force Update Graphic</button>
                <svg id="svg-flat" class="svg-container" preserveAspectRatio="xMidYMid meet"></svg>
            </div>
        </div>

        <div class="glass-panel">
            <label class="toggle-container" style="margin-top:0;">
                <input type="checkbox" id="calc_block_shear" onchange="document.getElementById('block_shear_panel').classList.toggle('active', this.checked)">
                <span style="font-size: 1.05rem; font-weight: bold; color: var(--accent-orange);">Calculate Block Shear</span>
            </label>
            <div class="conditional-panel" id="block_shear_panel">
                <div class="form-grid" style="margin-bottom: 0;">
                    <div class="sub-form-group"><label>Gross Shear Area (Agv) in┬▓</label><input type="number" id="agv" value="5.0" step="0.1"></div>
                    <div class="sub-form-group"><label>Net Shear Area (Anv) in┬▓</label><input type="number" id="anv" value="3.5" step="0.1"></div>
                    <div class="sub-form-group"><label>Net Tension Area (Ant) in┬▓</label><input type="number" id="ant" value="1.5" step="0.1"></div>
                    <div class="sub-form-group"><label>Ubs Factor</label>
                        <select id="ubs"><option value="1.0">1.0 (Tension uniform)</option><option value="0.5">0.5 (Tension non-uniform)</option></select>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-calculate" onclick="calculate()">Calculate Capacity</button>

        <div id="results-wrapper"></div>
    </div>

<script>


    // ==========================================
    // 1. OPEN YOUR CSV FILE IN NOTEPAD
    // 2. COPY ALL THE TEXT
    // 3. PASTE IT HERE BETWEEN THE BACKTICKS (`)

    // ==========================================
    // 2. NEW DYNAMIC CSV PARSER

    const shapesDB = {};
    
    function parseCSVDatabase() {
        const lines = RAW_CSV_DATA.trim().split('\n');
        if (lines.length < 2) return; 

        const headers = lines[0].split(',').map(h => h.trim());
        const idxType = headers.indexOf('Type');
        const idxName = headers.indexOf('AISC_Manual_Label') !== -1 ? headers.indexOf('AISC_Manual_Label') : headers.indexOf('EDI_Std_Nomenclature');
        const idxArea = headers.indexOf('Area');
        const idx_d = headers.indexOf('d');
        const idx_bf = headers.indexOf('bf');
        const idx_tw = headers.indexOf('tw');
        const idx_tf = headers.indexOf('tf');
        const idx_t = headers.indexOf('t');
        const idx_xbar = headers.indexOf('xbar');
        const idx_ybar = headers.indexOf('ybar');

        for(let i = 1; i < lines.length; i++) { 
            const cols = lines[i].split(',');
            if (cols.length > Math.max(idxType, idxName, idxArea)) {
                const type = cols[idxType] ? cols[idxType].trim() : "Other";
                const name = cols[idxName] ? cols[idxName].trim() : "Unknown";
                const area = parseFloat(cols[idxArea]) || 0;
                
                let xbar = parseFloat(cols[idx_xbar]); if (isNaN(xbar)) xbar = 0;
                let ybar = parseFloat(cols[idx_ybar]); if (isNaN(ybar)) ybar = 0;
                let d = parseFloat(cols[idx_d]); if (isNaN(d)) d = 0;
                let bf = parseFloat(cols[idx_bf]); if (isNaN(bf)) bf = 0;
                let tw = parseFloat(cols[idx_tw]); if (isNaN(tw)) tw = 0;
                let tf = parseFloat(cols[idx_tf]); if (isNaN(tf)) tf = 0;
                let t = parseFloat(cols[idx_t]); if (isNaN(t)) t = 0;

                if (!shapesDB[type]) shapesDB[type] = [];
                shapesDB[type].push({ name, Ag: area, xbar, ybar, d, bf, tw, tf, t });
            }
        }

        // Fallback dummy data if no CSV is pasted
        if (Object.keys(shapesDB).length === 0) {
            shapesDB["W"] = [ { name: "W14x90", Ag: 26.5, d: 14.0, bf: 14.5, tw: 0.44, tf: 0.711, xbar: 0, ybar: 0 } ];
            shapesDB["M"] = [ { name: "M12x11.8", Ag: 3.47, d: 12.0, bf: 4.0, tw: 0.177, tf: 0.225, xbar: 0, ybar: 0 } ];
            shapesDB["L"] = [ { name: "L6x4x3/8", Ag: 3.61, d: 6, bf: 4, tw: 0, tf: 0, t: 0.375, xbar: 0.941, ybar: 1.93 }, { name: "L4x4x1/2", Ag: 3.75, d: 4, bf: 4, tw: 0, tf: 0, t: 0.5, xbar: 1.18, ybar: 1.18 } ];
            shapesDB["C"] = [ { name: "C10x30", Ag: 8.82, d: 10, bf: 3.03, tw: 0.673, tf: 0.436, xbar: 0.649, ybar: 0 } ];
        }
    }

    // Rotation Engine State
    let currentRotation = 0;
    function rotateVisuals() {
        currentRotation = (currentRotation + 90) % 360;
        drawVisuals();
    }

    function init() {
        parseCSVDatabase();

        const astmSelect = document.getElementById('astm_select');
        for (let astm in steelData) {
            astmSelect.add(new Option(astm === "Custom" ? astm : `ASTM ${astm}`, astm));
        }
        
        astmSelect.value = "A992";
        handleASTM(); 
        
        const typeSelect = document.getElementById('shape_type');
        Object.keys(shapesDB).forEach(type => {
            typeSelect.add(new Option(`${type}-Shape`, type));
        });
        typeSelect.add(new Option("Steel Plate (PL)", "PL"));

        populateSpecificShapes(); 
        updateFlatTabVisibility();
        handleDiameter();
    }

    function updateFlatTabVisibility() {
        const type = document.getElementById('shape_type').value;
        const flatTab = document.getElementById('tab_flat');
        const isAllowed = (type === 'PL' || type.includes('L'));

        if (isAllowed) {
            flatTab.style.display = 'block';
        } else {
            flatTab.style.display = 'none';
            // If currently on flat view, switch back to cross
            if (document.getElementById('tab_flat').classList.contains('active')) {
                switchTab('cross');
            }
        }
    }

    function switchTab(tab) {
        document.getElementById('tab_cross').classList.remove('active');
        document.getElementById('tab_flat').classList.remove('active');
        document.getElementById('view_cross').style.display = 'none';
        document.getElementById('view_flat').style.display = 'none';

        document.getElementById('tab_' + tab).classList.add('active');
        document.getElementById('view_' + tab).style.display = 'block';
        drawVisuals();
    }

    function handleASTM() {
        const astmSelect = document.getElementById('astm_select').value;
        const gradeSelect = document.getElementById('grade_select');
        gradeSelect.innerHTML = '';
        for (let gr in steelData[astmSelect]) { gradeSelect.add(new Option(gr, gr)); }
        handleGrade();
    }

    function handleGrade() {
        const astmSelect = document.getElementById('astm_select').value;
        const gradeSelect = document.getElementById('grade_select').value;
        const isCustom = astmSelect === "Custom";
        
        document.getElementById('fy').readOnly = !isCustom;
        document.getElementById('fu').readOnly = !isCustom;
        
        if (!isCustom) {
            document.getElementById('fy').value = steelData[astmSelect][gradeSelect].fy;
            document.getElementById('fu').value = steelData[astmSelect][gradeSelect].fu;
        }
    }

    function populateSpecificShapes() {
        const type = document.getElementById('shape_type').value;
        const specificContainer = document.getElementById('specific_shape_container');
        const connPartContainer = document.getElementById('conn_part_container');
        const propsContainer = document.getElementById('shape_props_container');
        const plateContainer = document.getElementById('plate_dim_container');
        const specific = document.getElementById('specific_shape');
        const connPart = document.getElementById('conn_part');
        const shearLagSelect = document.getElementById('shear_lag');

        if (type === 'PL') {
            specificContainer.style.display = 'none';
            connPartContainer.style.display = 'none';
            propsContainer.style.display = 'none';
            plateContainer.style.display = 'grid'; 
            shearLagSelect.value = "1.0";          
            shearLagSelect.disabled = true;  
            document.getElementById('shape_ecc').value = 0;      
        } else {
            specificContainer.style.display = 'flex';
            connPartContainer.style.display = 'flex';
            propsContainer.style.display = 'grid';
            plateContainer.style.display = 'none';
            shearLagSelect.disabled = false;
            
            connPart.innerHTML = '';
            if (type.includes('C')) {
                connPart.add(new Option("Web", "web"));
                connPart.add(new Option("Flanges", "flange"));
                connPart.add(new Option("Both", "both"));
            } else if (type.includes('W') || type.includes('M') || type.includes('HP') || type.includes('S')) {
                connPart.add(new Option("Flanges", "flange"));
                connPart.add(new Option("Web", "web"));
                connPart.add(new Option("Both (Flanges + Web)", "both"));
            } else if (type.includes('L')) {
                connPart.add(new Option("Longer Leg", "longer"));
                connPart.add(new Option("Shorter Leg", "shorter"));
                connPart.add(new Option("Both Legs", "both"));
            } else {
                connPart.add(new Option("Default", "default"));
            }

            specific.innerHTML = '';
            if (shapesDB[type]) {
                shapesDB[type].forEach((s, i) => specific.add(new Option(s.name, i)));
            }
            updateShapeProperties();
        }
        updateFlatTabVisibility();
        handleShearLag();
    }

    function updateShapeProperties() {
        const type = document.getElementById('shape_type').value;
        const conn = document.getElementById('conn_part') ? document.getElementById('conn_part').value : 'plate';
        const tWebContainer = document.getElementById('t_web_container');
        
        if (type === 'PL') {
            document.getElementById('shape_t').value = document.getElementById('plate_thickness').value;
            tWebContainer.style.display = 'none';
            drawVisuals();
            return;
        }

        const secIndex = document.getElementById('specific_shape').value;
        const section = shapesDB[type][secIndex];

        if (section) {
            let t = 0; let tw = 0; let ecc = 0;
            tWebContainer.style.display = (conn === 'both') ? 'flex' : 'none';

            if (type.includes('W') || type.includes('M') || type.includes('HP') || type.includes('S')) {
                if (conn === 'flange') { t = section.tf; ecc = 0; }
                else if (conn === 'web') { t = section.tw; ecc = 0; }
                else if (conn === 'both') { t = section.tf; tw = section.tw; ecc = 0; }
            } else if (type.includes('L')) {
                t = section.t; tw = section.t;
                if (conn === 'longer') { ecc = section.xbar; } 
                else if (conn === 'shorter') { ecc = section.ybar; }
                else { ecc = 0; }
            } else if (type.includes('C')) {
                if (conn === 'web') { t = section.tw; ecc = section.xbar; }
                else if (conn === 'flange') { t = section.tf; ecc = section.ybar || 0; }
                else if (conn === 'both') { t = section.tf; tw = section.tw; ecc = 0; }
            }

            document.getElementById('shape_ag').value = section.Ag || 0;
            document.getElementById('shape_t').value = t || 0;
            document.getElementById('shape_tw').value = tw || 0;
            document.getElementById('shape_ecc').value = ecc || 0;
        }
        updateFlatTabVisibility();
        handleShearLag();
        drawVisuals();
    }

    function handleDiameter() {
        const val = document.getElementById('diameter_val').value;
        document.getElementById('custom_dia_container').style.display = (val === 'custom') ? 'flex' : 'none';
    }

    function toggleStaggerPanel() {
        const isStag = document.getElementById('is_staggered').checked;
        document.getElementById('stagger_panel').style.display = isStag ? 'block' : 'none';
        document.getElementById('simple_holes_panel').style.display = isStag ? 'none' : 'flex';
        document.getElementById('gage_spacing_container').style.display = isStag ? 'none' : 'flex'; // Hides Gage Spacing when staggered
        drawVisuals();
    }

    function handleShearLag() {
        const val = document.getElementById('shear_lag').value;
        const isStag = document.getElementById('is_staggered').checked;
        const type = document.getElementById('shape_type').value;
        const isPL = type === 'PL';
        const conn = document.getElementById('conn_part') ? document.getElementById('conn_part').value : '';

        const staggerToggle = document.getElementById('is_staggered');
        const staggerContainer = document.getElementById('stagger_toggle_container');
        if (conn === 'both') {
            staggerToggle.checked = false;
            staggerToggle.disabled = true;
            staggerContainer.style.opacity = '0.4';
            document.getElementById('stagger_panel').style.display = 'none';
            document.getElementById('gage_spacing_container').style.display = 'flex'; // Show Gage Spacing since staggered is off
            
            document.getElementById('simple_holes_panel').style.display = 'flex';
            document.getElementById('simple_holes_web_container').style.display = 'flex';
            document.getElementById('lbl_holes_1').innerText = (type.includes('L')) ? "Holes in Leg 1" : "Holes in Flanges";
            document.getElementById('lbl_holes_2').innerText = (type.includes('L')) ? "Holes in Leg 2" : "Holes in Web";
        } else {
            staggerToggle.disabled = false;
            staggerContainer.style.opacity = '1';
            document.getElementById('simple_holes_web_container').style.display = 'none';
            document.getElementById('lbl_holes_1').innerText = "Number of Holes in Critical Path";
            if (!isStag) document.getElementById('simple_holes_panel').style.display = 'flex';
        }

        document.getElementById('manual_l_container').style.display = (val === 'auto' && !isStag && !isPL && conn !== 'both') ? 'flex' : 'none';
    }

    function addHoleRow() {
        const list = document.getElementById('hole-list');
        const div = document.createElement('div');
        div.className = 'hole-grid';
        div.innerHTML = `<input type="number" class="hx" value="0" onchange="drawVisuals()"><input type="number" class="hy" value="0" onchange="drawVisuals()"><button class="btn-remove" onclick="removeHole(this)">X</button>`;
        list.appendChild(div);
    }
    
    function removeHole(btn) { 
        btn.parentElement.remove(); 
        drawVisuals(); 
    }

    // --- DYNAMIC RENDERING ENGINE ---
    function drawVisuals() {
        drawCrossSection();
        if (document.getElementById('view_flat').style.display !== 'none') {
            drawFlattenedLayout();
        }
    }

    function drawCrossSection() {
        const svg = document.getElementById('svg-cross');
        svg.innerHTML = '';
        
        const type = document.getElementById('shape_type').value;
        if (type === 'PL') {
            svg.innerHTML = `<text x="50%" y="50%" fill="var(--text-label)" text-anchor="middle">Cross-section not applicable for flat plates.</text>`;
            return;
        }

        const secIndex = document.getElementById('specific_shape').value;
        const section = shapesDB[type][secIndex];
        if (!section) return;

        const conn = document.getElementById('conn_part').value;
        const g = parseFloat(document.getElementById('gage_spacing').value) || 3.5;
        
        const diaVal = document.getElementById('diameter_val').value;
        let diaInches = diaVal === 'custom' ? parseFloat(document.getElementById('custom_dia_input').value) : parseFloat(diaVal);

        const scale = 25; 
        const margin = 50;
        let maxDim = Math.max(section.d || 10, section.bf || 10);
        let svgSize = (maxDim * scale) + (margin * 2);
        
        // Square Viewport Anti-Clipping
        svg.setAttribute("viewBox", `0 0 ${svgSize} ${svgSize}`);
        svg.style.height = "400px";

        let cx = svgSize / 2; let cy = svgSize / 2;
        let d = (section.d || 10) * scale; let bf = (section.bf || 10) * scale;
        let tw = (section.tw || section.t || 0.5) * scale;
        let tf = (section.tf || section.t || 0.5) * scale;
        let r = (diaInches || 0.75) * scale / 2;
        const g_px = g * scale;

        // Apply visual rotation to the entire group
        const rotationGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        rotationGroup.setAttribute("transform", `rotate(${currentRotation}, ${cx}, ${cy})`);
        rotationGroup.style.transition = "transform 0.4s ease";
        svg.appendChild(rotationGroup);

        function drawRect(x, y, w, h) {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", x); rect.setAttribute("y", y);
            rect.setAttribute("width", w); rect.setAttribute("height", h);
            rect.setAttribute("fill", "rgba(255, 255, 255, 0.1)");
            rect.setAttribute("stroke", "var(--accent-cyan)");
            rect.setAttribute("stroke-width", "2");
            rotationGroup.appendChild(rect);
        }

        function drawBoltProfile(bx, by, dia, length, isVertical) {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            if (isVertical) {
                rect.setAttribute("x", bx - dia/2); rect.setAttribute("y", by - length/2);
                rect.setAttribute("width", dia); rect.setAttribute("height", length);
            } else {
                rect.setAttribute("x", bx - length/2); rect.setAttribute("y", by - dia/2);
                rect.setAttribute("width", length); rect.setAttribute("height", dia);
            }
            rect.setAttribute("fill", "rgba(249, 115, 22, 0.3)");
            rect.setAttribute("stroke", "var(--accent-orange)");
            rect.setAttribute("stroke-width", "1.5");
            rotationGroup.appendChild(rect);
            
            const head = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            if (isVertical) {
                head.setAttribute("x", bx - dia*0.8); head.setAttribute("y", by - length/2 - 4);
                head.setAttribute("width", dia*1.6); head.setAttribute("height", 4);
            } else {
                head.setAttribute("x", bx - length/2 - 4); head.setAttribute("y", by - dia*0.8);
                head.setAttribute("width", 4); head.setAttribute("height", dia*1.6);
            }
            head.setAttribute("fill", "var(--accent-orange)");
            rotationGroup.appendChild(head);
            
            const nut = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            if (isVertical) {
                nut.setAttribute("x", bx - dia*0.7); nut.setAttribute("y", by + length/2);
                nut.setAttribute("width", dia*1.4); nut.setAttribute("height", 5);
            } else {
                nut.setAttribute("x", bx + length/2); nut.setAttribute("y", by - dia*0.7);
                nut.setAttribute("width", 5); nut.setAttribute("height", dia*1.4);
            }
            nut.setAttribute("fill", "var(--accent-orange)");
            rotationGroup.appendChild(nut);
        }

        if (type.includes('C')) {
            drawRect(cx - bf/2, cy - d/2, bf, tf); 
            drawRect(cx - bf/2, cy + d/2 - tf, bf, tf); 
            drawRect(cx - bf/2, cy - d/2 + tf, tw, d - 2*tf); 

            if (conn === 'flange' || conn === 'both') {
                let boltLen = tf + 12;
                drawBoltProfile(cx - bf/2 + g_px, cy - d/2 + tf/2, r*2, boltLen, true);
                drawBoltProfile(cx - bf/2 + g_px, cy + d/2 - tf/2, r*2, boltLen, true);
            }
            if (conn === 'web' || conn === 'both') {
                let boltLen = tw + 12;
                drawBoltProfile(cx - bf/2 + tw/2, cy, r*2, boltLen, false); 
            }
        } 
        else if (type.includes('L')) {
            drawRect(cx - bf/2, cy - d/2, tw, d); 
            drawRect(cx - bf/2 + tw, cy + d/2 - tw, bf - tw, tw); 

            if (conn === 'longer' || conn === 'both') {
                let boltLen = tw + 12;
                drawBoltProfile(cx - bf/2 + tw/2, cy - d/2 + g_px, r*2, boltLen, false);
            }
            if (conn === 'shorter' || conn === 'both') {
                let boltLen = tw + 12;
                drawBoltProfile(cx - bf/2 + g_px, cy + d/2 - tw/2, r*2, boltLen, true);
            }
        }
        else if (type.includes('T')) {
            drawRect(cx - bf/2, cy - d/2, bf, tf); 
            drawRect(cx - tw/2, cy - d/2 + tf, tw, d - tf); 
            if (conn === 'flange' || conn === 'both') {
                let boltLen = tf + 12;
                drawBoltProfile(cx - g_px/2, cy - d/2 + tf/2, r*2, boltLen, true);
                drawBoltProfile(cx + g_px/2, cy - d/2 + tf/2, r*2, boltLen, true);
            }
            if (conn === 'web' || conn === 'both') {
                let boltLen = tw + 12;
                drawBoltProfile(cx, cy + d/4, r*2, boltLen, false);
            }
        }
        else {
            drawRect(cx - bf/2, cy - d/2, bf, tf); 
            drawRect(cx - bf/2, cy + d/2 - tf, bf, tf); 
            drawRect(cx - tw/2, cy - d/2 + tf, tw, d - 2*tf); 

            if (conn === 'flange' || conn === 'both') {
                let boltLen = tf + 12;
                drawBoltProfile(cx - g_px/2, cy - d/2 + tf/2, r*2, boltLen, true);
                drawBoltProfile(cx + g_px/2, cy - d/2 + tf/2, r*2, boltLen, true);
                drawBoltProfile(cx - g_px/2, cy + d/2 - tf/2, r*2, boltLen, true);
                drawBoltProfile(cx + g_px/2, cy + d/2 - tf/2, r*2, boltLen, true);
            }
            if (conn === 'web' || conn === 'both') {
                let boltLen = tw + 12;
                drawBoltProfile(cx, cy, r*2, boltLen, false);
            }
        }
    }

    function drawFlattenedLayout() {
        const svg = document.getElementById('svg-flat');
        svg.innerHTML = `

        const scale = 25; const marginX = 90; const marginY = 90; const plateVisualMargin = 1.5;

        let flattenedWidth = 0; let foldX_inches = -1;

        if (type === 'PL') {
            flattenedWidth = parseFloat(document.getElementById('plate_width').value) || 6;
        } else if (type.includes('L')) {
            let leg1 = section.d || 0; let leg2 = section.bf || 0; let t = section.t || 0;
            flattenedWidth = leg1 + leg2 - t;
            if (conn === 'longer') foldX_inches = Math.max(leg1, leg2);
            else if (conn === 'shorter') foldX_inches = Math.min(leg1, leg2);
            else foldX_inches = Math.max(leg1, leg2); 
        } else {
            if (conn === 'flange') flattenedWidth = section.bf || 0;
            else if (conn === 'web') flattenedWidth = section.d || 0;

            n1 = Math.min(n1, 20); n2 = Math.min(n2, 20); 

            let startX = Math.min(g, flattenedWidth / 2);
            if (type.includes('L') && foldX_inches > 0) {
                startX = foldX_inches / 2; 
            } else if ((type.includes('W') || type.includes('M')) && conn === 'flange') {
                startX = (flattenedWidth / 2) - (g / 2);
            }

            for (let i = 0; i < n1; i++) {
                xs.push(startX); ys.push(i * pitch);
            }
            
            if (conn === 'both' && n2 > 0) {
                let startX2 = flattenedWidth - g; 
                if (foldX_inches > 0) startX2 = foldX_inches + g; 
                else if (type.includes('W')) startX2 = startX + g;

                for (let i = 0; i < n2; i++) {
                    xs.push(startX2); ys.push(i * pitch);
                }
            }
        }

        xs = xs.map(x => isNaN(x) ? 0 : x); ys = ys.map(y => isNaN(y) ? 0 : y);
        let min_x = 0; let min_y = 0; 
        let max_x = flattenedWidth; let max_y = Math.max(3, (ys.length > 0 ? Math.max(...ys) : 3));

        if (xs.length > 0) {
            min_x = Math.min(min_x, ...xs);
            max_x = Math.max(max_x, ...xs);
        }

        flattenedWidth = Math.max(flattenedWidth, max_x - min_x);
        let plateWidth = flattenedWidth * scale;
        let plateHeight = ((max_y - min_y) + (2 * plateVisualMargin)) * scale;

        function getBx(val) { return marginX + (val - min_x + plateVisualMargin) * scale; }
        function getBy(val) { return marginY + (val - min_y + plateVisualMargin) * scale; }

        let totalSvgWidth = plateWidth + (2 * marginX); let totalSvgHeight = plateHeight + (2 * marginY);
        let maxSpan = Math.max(totalSvgWidth, totalSvgHeight);

        // Square Viewport Anti-Clipping
        svg.setAttribute("viewBox", `0 0 ${maxSpan} ${maxSpan}`);
        let domContainerWidth = svg.parentElement.clientWidth || 800;
        let calculatedHeight = domContainerWidth * (maxSpan / maxSpan);
        svg.style.height = Math.max(250, Math.min(calculatedHeight, 600)) + "px";

        // Center elements mathematically within square viewport
        let offsetX = (maxSpan - totalSvgWidth) / 2;
        let offsetY = (maxSpan - totalSvgHeight) / 2;

        const masterGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        masterGroup.setAttribute("transform", `translate(${offsetX}, ${offsetY})`);

        // Create Rotation Group
        const rotationGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        rotationGroup.setAttribute("transform", `rotate(${currentRotation}, ${totalSvgWidth/2}, ${totalSvgHeight/2})`);
        rotationGroup.style.transition = "transform 0.4s ease";
        
        masterGroup.appendChild(rotationGroup);

        const plate = document.createElementNS("http://www.w3.org/2000/svg", "rect");

        plate.setAttribute("width", plateWidth); plate.setAttribute("height", plateHeight);
        plate.setAttribute("fill", "rgba(255, 255, 255, 0.05)"); plate.setAttribute("stroke", "var(--accent-cyan)"); plate.setAttribute("stroke-width", "2");
        rotationGroup.appendChild(plate);

        if (foldX_inches > 0) {
            let foldX_px = foldX_inches * scale;
            const fold = document.createElementNS("http://www.w3.org/2000/svg", "line");
            fold.setAttribute("x1", marginX + foldX_px); fold.setAttribute("y1", marginY);
            fold.setAttribute("x2", marginX + foldX_px); fold.setAttribute("y2", marginY + plateHeight);
            fold.setAttribute("stroke", "rgba(249, 115, 22, 0.5)"); fold.setAttribute("stroke-dasharray", "8,4"); fold.setAttribute("stroke-width", "2");
            rotationGroup.appendChild(fold);
            
            // SMART UPRIGHT TEXT
            let textX = marginX + foldX_px; let textY = marginY - 15;

            text.setAttribute("x", textX); text.setAttribute("y", textY);
            text.setAttribute("fill", "rgba(249, 115, 22, 0.8)"); text.setAttribute("font-size", "12"); 
            text.setAttribute("text-anchor", "middle"); text.setAttribute("dominant-baseline", "middle"); 
            text.setAttribute("transform", `rotate(${-currentRotation}, ${textX}, ${textY})`);
            text.style.transition = "transform 0.4s ease";
            text.textContent = "Heel (Fold)"; rotationGroup.appendChild(text);
        }

        let uniqueX = [...new Set(xs)].filter(n => !isNaN(n)).sort((a,b)=>a-b);
        let uniqueY = [...new Set(ys)].filter(n => !isNaN(n)).sort((a,b)=>a-b);

        for(let i = 0; i < uniqueX.length - 1; i++){
            let bx1 = getBx(uniqueX[i]), bx2 = getBx(uniqueX[i+1]), dist = uniqueX[i+1] - uniqueX[i];
            if (dist === 0) continue;
            let gLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            gLine.setAttribute("x1", bx2); gLine.setAttribute("y1", marginY - 10); gLine.setAttribute("x2", bx2); gLine.setAttribute("y2", marginY - 55); gLine.setAttribute("stroke", "rgba(255,255,255,0.15)"); rotationGroup.appendChild(gLine);
            let dLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            dLine.setAttribute("x1", bx1); dLine.setAttribute("y1", marginY - 45); dLine.setAttribute("x2", bx2); dLine.setAttribute("y2", marginY - 45); dLine.setAttribute("stroke", "var(--accent-orange)"); dLine.setAttribute("marker-start", "url(#arrowstart)"); dLine.setAttribute("marker-end", "url(#arrowhead)"); rotationGroup.appendChild(dLine);
            
            // SMART UPRIGHT TEXT
            let textX = (bx1+bx2)/2; let textY = marginY - 55;
            let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", textX); text.setAttribute("y", textY); 
            text.setAttribute("fill", "var(--accent-orange)"); text.setAttribute("font-size", "14"); text.setAttribute("font-weight", "bold"); 
            text.setAttribute("text-anchor", "middle"); text.setAttribute("dominant-baseline", "middle");
            text.setAttribute("transform", `rotate(${-currentRotation}, ${textX}, ${textY})`);
            text.style.transition = "transform 0.4s ease";
            text.textContent = dist.toFixed(2) + '"'; rotationGroup.appendChild(text);
        }

        for(let i = 0; i < uniqueY.length - 1; i++){
            let by1 = getBy(uniqueY[i]), by2 = getBy(uniqueY[i+1]), dist = uniqueY[i+1] - uniqueY[i];
            if (dist === 0) continue;
            let gLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            gLine.setAttribute("x1", marginX - 10); gLine.setAttribute("y1", by2); gLine.setAttribute("x2", marginX - 55); gLine.setAttribute("y2", by2); gLine.setAttribute("stroke", "rgba(255,255,255,0.15)"); rotationGroup.appendChild(gLine);
            let dLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            dLine.setAttribute("x1", marginX - 45); dLine.setAttribute("y1", by1); dLine.setAttribute("x2", marginX - 45); dLine.setAttribute("y2", by2); dLine.setAttribute("stroke", "var(--accent-orange)"); dLine.setAttribute("marker-start", "url(#arrowstart)"); dLine.setAttribute("marker-end", "url(#arrowhead)"); rotationGroup.appendChild(dLine);
            
            // SMART UPRIGHT TEXT
            let textX = marginX - 65; let textY = (by1+by2)/2;
            let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", textX); text.setAttribute("y", textY); 
            text.setAttribute("fill", "var(--accent-orange)"); text.setAttribute("font-size", "14"); text.setAttribute("font-weight", "bold"); 
            text.setAttribute("text-anchor", "middle"); text.setAttribute("dominant-baseline", "middle");

        let diaRadius = ((diaInches || 0.75) * scale) / 2;

            let points = xs.map((x, idx) => `${getBx(x)},${getBy(ys[idx])}`).join(" ");
            pathLine.setAttribute("points", points); pathLine.setAttribute("fill", "none"); pathLine.setAttribute("stroke", "var(--danger-red)"); pathLine.setAttribute("stroke-width", "3"); pathLine.setAttribute("stroke-dasharray", "6,6"); rotationGroup.appendChild(pathLine);

    // Calculation Logic
    function calculate() {
        const method = document.getElementById('method').value;
        const Fy = parseFloat(document.getElementById('fy').value);
        const Fu = parseFloat(document.getElementById('fu').value);
        const shapeType = document.getElementById('shape_type').value;
        const connPart = document.getElementById('conn_part') ? document.getElementById('conn_part').value : '';

        let Ag = 0, t = 0, tw = 0, xbar = 0, shapeName = "", section = null;

        if (shapeType === 'PL') {
            const pw = parseFloat(document.getElementById('plate_width').value) || 0;
            const pt = parseFloat(document.getElementById('plate_thickness').value) || 0;
            Ag = pw * pt; t = pt; xbar = 0; 
            shapeName = `PL ${pt}" x ${pw}"`;
        } else {
            const secIndex = document.getElementById('specific_shape').value;
            section = shapesDB[shapeType][secIndex];
            Ag = parseFloat(document.getElementById('shape_ag').value) || 0;
            t = parseFloat(document.getElementById('shape_t').value) || 0;
            tw = parseFloat(document.getElementById('shape_tw').value) || 0;
            xbar = parseFloat(document.getElementById('shape_ecc').value) || 0;
            shapeName = section.name;
        }

        const holeType = document.getElementById('diameter_type').value;
        const diaVal = document.getElementById('diameter_val').value;
        const dia = diaVal === 'custom' ? parseFloat(document.getElementById('custom_dia_input').value) : parseFloat(diaVal);
        let dh = holeType === 'bolt' ? dia + 0.125 : dia + 0.0625;

        let An = Ag;
        let isStaggered = document.getElementById('is_staggered').checked;
        let L_val = parseFloat(document.getElementById('manual_l').value) || 1;

        if (connPart === 'both') {
            const n_holes_1 = parseFloat(document.getElementById('num_holes_simple').value) || 0;
            const n_holes_2 = parseFloat(document.getElementById('num_holes_web').value) || 0;
            An = Ag - (n_holes_1 * dh * t) - (n_holes_2 * dh * tw);
        } else if (isStaggered) {
            const xs = Array.from(document.querySelectorAll('.hx')).map(el => parseFloat(el.value));
            const ys = Array.from(document.querySelectorAll('.hy')).map(el => parseFloat(el.value));
            
            let holes = [];
            for (let i = 0; i < xs.length; i++) {
                if(!isNaN(xs[i]) && !isNaN(ys[i])) holes.push({x: xs[i], y: ys[i], id: i});
            }
            
            if (holes.length > 0) {
                let minX = Math.min(...holes.map(h => h.x));
                let maxX = Math.max(...holes.map(h => h.x));
                L_val = maxX - minX;
                if(L_val === 0) L_val = 0.001; 
            }

            let maxDeduction = 0;
            let n = holes.length;
            
            for (let i = 1; i < (1 << n); i++) {
                let subset = [];
                for (let j = 0; j < n; j++) { if (i & (1 << j)) subset.push(holes[j]); }
                subset.sort((a, b) => a.y - b.y);
                
                let valid = true;
                for(let k=1; k<subset.length; k++){ if(subset[k].y === subset[k-1].y) { valid = false; break; } }
                if(!valid) continue;

                let deduction = subset.length * dh;
                for (let k = 1; k < subset.length; k++) {
                    let s = Math.abs(subset[k].x - subset[k-1].x);
                    let g = subset[k].y - subset[k-1].y;
                    deduction -= (s * s) / (4 * g);
                }

                if (deduction > maxDeduction) { maxDeduction = deduction; }
            }

            An = Ag - (maxDeduction * t);
            if (An > Ag) An = Ag;
        } else {
            const n_holes = parseFloat(document.getElementById('num_holes_simple').value) || 0;
            An = Ag - (n_holes * dh * t);
        }

        let U = 1.0;
        let u_select = document.getElementById('shear_lag').value;
        
        if (shapeType === 'PL' || connPart === 'both') {
            U = 1.0; 
        } else if (u_select === 'auto') {
            if (shapeType.includes('W') || shapeType.includes('M') || shapeType.includes('HP') || shapeType.includes('S')) {
                if (connPart === 'flange') {
                    if (section.bf >= (2/3) * section.d) { U = 0.90; } else { U = 0.85; }
                } else {
                    U = 0.70; 
                }
            } else {
                U = 1 - (xbar / L_val);
                if (U < 0) U = 0;
            }
        } else {
            U = parseFloat(u_select);
        }
        
        let Ae = An * U;

        let Pn_yield = Fy * Ag;
        let Pn_rupture = Fu * Ae;
        let capacity_y = method === "LRFD" ? 0.90 * Pn_yield : Pn_yield / 1.67;
        let capacity_r = method === "LRFD" ? 0.75 * Pn_rupture : Pn_rupture / 2.00;
        
        let final_capacity = Math.min(capacity_y, capacity_r);
        let control = capacity_y < capacity_r ? "Gross Yielding" : "Net Section Rupture";

        let cap_bs = Infinity;
        let bs_text = "Not Calculated";
        if (document.getElementById('calc_block_shear').checked) {
            const Agv = parseFloat(document.getElementById('agv').value) || 0;
            const Anv = parseFloat(document.getElementById('anv').value) || 0;
            const Ant = parseFloat(document.getElementById('ant').value) || 0;
            const Ubs = parseFloat(document.getElementById('ubs').value);

            let Rn = Math.min(0.6 * Fy * Agv + Ubs * Fu * Ant, 0.6 * Fu * Anv + Ubs * Fu * Ant);
            cap_bs = method === "LRFD" ? 0.75 * Rn : Rn / 2.00;
            
            if (cap_bs < final_capacity) { final_capacity = cap_bs; control = "Block Shear Rupture"; }
            bs_text = `${cap_bs.toFixed(1)} kips`;
        }

        const wrap = document.getElementById('results-wrapper');
        wrap.innerHTML = `
            <div class="results-panel" style="display:flex;">
                <div class="result-card">
                    <div class="summary-header">Area & Parameter Summary</div>
                    <div class="summary-grid">
                        <div class="summary-item"><span class="summary-label">Gross Area (Ag)</span><span class="summary-value">${Ag.toFixed(2)} in┬▓</span></div>
                        <div class="summary-item"><span class="summary-label">Connected Thick. (t)</span><span class="summary-value">${t.toFixed(3)} in</span></div>
                        <div class="summary-item"><span class="summary-label">Net Area (An)</span><span class="summary-value val-cyan">${An.toFixed(2)} in┬▓</span></div>
                        <div class="summary-item"><span class="summary-label">Shear Lag U (Auto/Manual)</span><span class="summary-value val-cyan">${U.toFixed(3)}</span></div>
                        <div class="summary-item"><span class="summary-label">Yield Capacity (${method})</span><span class="summary-value">${capacity_y.toFixed(1)} k</span></div>
                        <div class="summary-item"><span class="summary-label">Rupture Capacity (${method})</span><span class="summary-value">${capacity_r.toFixed(1)} k</span></div>
                        <div class="summary-item"><span class="summary-label">Block Shear (${method})</span><span class="summary-value">${bs_text}</span></div>
                    </div>
                </div>

                <div class="result-card analyzed-section-panel">
                    <div class="section-subtitle">ANALYSIS SUMMARY</div>
                    <div class="section-title">${shapeName}</div>
                    <div class="section-props">Controlling Limit State: <strong>${control}</strong></div>
                    
                    <div class="section-stats-grid" style="grid-template-columns: 1fr 1fr;">
                        <div class="stat-item"><span class="summary-label">Nominal Strength (Pn)</span><span class="stat-val">${Math.min(Pn_yield, Pn_rupture).toFixed(1)} k</span></div>
                        <div class="stat-item" style="border-color: var(--accent-cyan);"><span class="summary-label" style="color:var(--accent-cyan);">Available Capacity (${method})</span><span class="stat-val val-cyan">${final_capacity.toFixed(1)} k</span></div>
                    </div>
                </div>
            </div>
        `;
        wrap.style.display = "flex";
        wrap.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
