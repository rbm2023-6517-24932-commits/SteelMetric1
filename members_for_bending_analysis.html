<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Design App - Bending Analysis</title>
    <style>
        /* --- Boot-Up Animation Styles --- */
        #boot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-page); /* Matches your dark background */
            z-index: 9999; /* Keeps it above everything else */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .boot-logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-glow 1.5s infinite alternate;
            margin-bottom: 20px;
        }

        .boot-line {
            width: 0;
            height: 2px;
            background: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan);
            animation: load-line 1.8s ease-in-out forwards;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.2)); transform: scale(0.98); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.6)); transform: scale(1.02); }
        }

        @keyframes load-line {
            0% { width: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 300px; opacity: 1; }
        }

        .hide-boot {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        /* Ensure it doesn't show up when printing */
        @media print {
            #boot-overlay { display: none !important; }
        }
        /* --- End Boot-Up Animation Styles --- */
        /* --- Back Button Styles --- */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: #3b82f6; 
            transform: translateX(-3px); 
        }

        :root {
            --bg-page: #040914;
            --text-main: #f3f4f6;
            --text-label: #9ca3af;
            --accent-blue: #38bdf8;
            --accent-cyan: #22d3ee;
            --accent-orange: #f97316;
            --accent-yellow: #fde047;
            --accent-green: #10b981;
            --danger-red: #ef4444;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(17, 24, 39, 0.55);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-input: rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: rgba(34, 211, 238, 0.15); /* Cyan glow */
        }
        .blob-2 {
            bottom: -10%; right: -5%;
            width: 45vw; height: 45vw;
            background: rgba(249, 115, 22, 0.12); /* Orange glow */
        }

        /* Main Glass Container */
        .calculator-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 900px; 
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .badge {
            background: linear-gradient(135deg, var(--accent-orange), #ea580c);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 30px;
            margin-bottom: 25px;
            align-items: start;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .left-column-container, .right-column-container {
            display: flex; 
            flex-direction: column; 
            gap: 18px;
        }

        .sub-form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem; color: var(--text-label); font-weight: 500;
        }

        /* Glass Inputs */
        input, select {
            background-color: var(--glass-input);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        input[readonly], select:disabled {
            background-color: rgba(0, 0, 0, 0.4);
            color: #6b7280;
            cursor: not-allowed;
            border-color: rgba(255,255,255,0.03);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 10px auto;
            padding-right: 35px;
        }
        
        select option { background-color: #111827; color: white; }

        input:focus, select:focus { 
            outline: none; 
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        /* Gradient Action Buttons */
        .btn-calculate {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #040914;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
            text-transform: uppercase;
            margin-top: 15px;
        }
        .btn-calculate:hover { 
            box-shadow: 0 12px 25px rgba(34, 211, 238, 0.5); 
            transform: translateY(-2px); 
            filter: brightness(1.1);
        }

        /* ADVANCED RESULTS PANEL (Glass Cards) */
        #results-area {
            display: none; 
        }

        .results-panel {
            margin-top: 35px; 
            animation: fadeIn 0.5s ease-out;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .summary-header {
            font-size: 1.25rem; font-weight: bold; color: #ffffff; margin-bottom: 20px;
            display: inline-block; border-bottom: 2px solid var(--accent-cyan); padding-bottom: 5px;
        }

        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .summary-item { display: flex; flex-direction: column; gap: 6px; }
        .summary-label { font-size: 0.8rem; color: var(--text-label); text-transform: uppercase; letter-spacing: 1px;}
        .summary-value { font-size: 1.3rem; font-weight: bold; color: white; }
        
        /* Neon Accents */
        .val-cyan { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        .val-yellow { color: var(--accent-yellow); text-shadow: 0 0 10px rgba(253, 224, 71, 0.4); }
        .val-green { color: var(--accent-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .val-orange { color: var(--accent-orange); text-shadow: 0 0 10px rgba(249, 115, 22, 0.4); }

        .analyzed-section-panel {
            text-align: center; padding: 30px;
            background: radial-gradient(circle at top, rgba(34, 211, 238, 0.08), transparent 70%);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 12px;
            margin-top: 20px;
        }

        .section-subtitle { font-size: 0.85rem; color: var(--accent-cyan); text-transform: uppercase; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .section-title { font-size: 3rem; font-weight: 900; color: white; margin: 0; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }

    </style>
</head>

    <div id="boot-overlay">
        <div class="boot-logo">STEEL ANALYSIS</div>
        <div class="boot-line"></div>

    <div class="calculator-container">
        <div class="header">
            <h1>STEEL ANALYSIS</h1>
            <span class="badge">BENDING</span>
        </div>

        <div class="form-grid">
            <div class="left-column-container">
                <div class="sub-form-group">
                    <label>Unit System</label>
                    <select id="unit-toggle" onchange="updateUnits()">
                        <option value="imperial">Imperial (ksi, in)</option>
                        <option value="metric">Metric (MPa, mm)</option>
                    </select>
                </div>

                <div class="sub-form-group">
                    <label>W-Shape Section</label>
                    <select id="w-shape" onchange="autofillProperties()">
                        <option value="">-- Select a Shape --</option>
                    </select>
                </div>

                <div class="sub-form-group">
                    <label>Design Method</label>
                    <select id="design-method">
                        <option value="LRFD">LRFD</option>
                        <option value="ASD">ASD</option>
                    </select>
                </div>

                <div class="sub-form-group">
                    <label id="sx-label">Section Modulus, Sx (in³)</label>
                    <input type="number" id="sx" readonly>
                </div>

                <div class="sub-form-group">
                    <label id="zx-label">Plastic Modulus, Zx (in³)</label>
                    <input type="number" id="zx" readonly>
                </div>
            </div>

            <div class="right-column-container">
                <div class="sub-form-group">
                    <label>Steel Designation</label>
                    <select id="steel-base" onchange="handleBaseChange()">
                        <option value="">-- Select Designation --</option>
                        <option value="Custom">Custom</option>
                    </select>
                </div>

                <div class="sub-form-group" id="subgrade-group" style="display: none;">
                    <label>Specific Grade</label>
                    <select id="steel-subgrade" onchange="handleSubgradeChange()">
                        <option value="">-- Select Grade --</option>
                    </select>
                </div>

                <div class="sub-form-group">
                    <label id="fy-label">Yield Strength, Fy (ksi)</label>
                    <input type="number" id="fy" readonly>
                </div>

                <div class="sub-form-group">
                    <label>Lambda Flange (λf)</label>
                    <input type="number" id="lf" readonly>
                </div>

                <div class="sub-form-group">
                    <label>Lambda Web (λw)</label>
                    <input type="number" id="lw" readonly>
                </div>
            </div>
        </div>

        <button class="btn-calculate" onclick="calculateBending()">Analyze Capacity</button>

        <div id="results-area"></div>
    </div>

        function handleBaseChange() {
            const base = document.getElementById('steel-base').value;
            const subgradeGroup = document.getElementById('subgrade-group');
            const subgradeSelect = document.getElementById('steel-subgrade');
            const fyInput = document.getElementById('fy');
            const unit = document.getElementById('unit-toggle').value;

            // Reset subgrade options
            subgradeSelect.innerHTML = '<option value="">-- Select Grade --</option>';

            if (base === "Custom") {
                // If custom, hide subgrades and unlock Fy
                subgradeGroup.style.display = "none";
                unlockFyInput(fyInput);
                fyInput.value = "";
            } else if (base === "") {
                // If nothing is selected
                subgradeGroup.style.display = "none";
                lockFyInput(fyInput);
                fyInput.value = "";
            } else {
                // Get subgrades for selected designation
                const subgrades = Object.keys(gradeDB[base]);

                if (subgrades.length === 1 && subgrades[0] === "default") {
                    // It has no sub-grades (like A36 or A992), hide secondary dropdown and auto-fill
                    subgradeGroup.style.display = "none";
                    lockFyInput(fyInput);
                    fyInput.value = gradeDB[base]["default"][unit];
                } else {
                    // It has multiple grades (like A572), show secondary dropdown
                    subgradeGroup.style.display = "flex";
                    lockFyInput(fyInput);
                    fyInput.value = ""; // Clear until they pick a subgrade

                    subgrades.forEach(grade => {
                        const option = document.createElement('option');
                        option.value = grade;
                        option.textContent = grade;
                        subgradeSelect.appendChild(option);
                    });
                }
            }
        }

        function handleSubgradeChange() {
            const base = document.getElementById('steel-base').value;
            const subgrade = document.getElementById('steel-subgrade').value;
            const unit = document.getElementById('unit-toggle').value;
            const fyInput = document.getElementById('fy');

            if (subgrade !== "") {
                lockFyInput(fyInput);
                fyInput.value = gradeDB[base][subgrade][unit];
            } else {
                fyInput.value = "";
            }
        }

        // Updated styles to match glass theme
        function unlockFyInput(input) {
            input.readOnly = false;
            input.style.backgroundColor = "var(--glass-input)";
            input.style.border = "1px solid var(--accent-cyan)";
            input.style.boxShadow = "0 0 0 3px rgba(34, 211, 238, 0.15)";
        }
        function lockFyInput(input) {
            input.readOnly = true;
            input.style.backgroundColor = "rgba(0, 0, 0, 0.4)";
            input.style.border = "1px solid rgba(255,255,255,0.03)";
            input.style.boxShadow = "none";
        }

        function updateUnits() {
            const unit = document.getElementById('unit-toggle').value;
            const fyInput = document.getElementById('fy');
            const base = document.getElementById('steel-base').value;
            const subgrade = document.getElementById('steel-subgrade').value;

            if (unit === 'imperial') {
                document.getElementById('fy-label').innerText = "Yield Strength, Fy (ksi)";
                document.getElementById('sx-label').innerText = "Section Modulus, Sx (in³)";
                document.getElementById('zx-label').innerText = "Plastic Modulus, Zx (in³)";
            } else {
                document.getElementById('fy-label').innerText = "Yield Strength, Fy (MPa)";
                document.getElementById('sx-label').innerText = "Section Modulus, Sx (mm³)";
                document.getElementById('zx-label').innerText = "Plastic Modulus, Zx (mm³)";
            }

            if (base === "Custom") {
                let currentFy = parseFloat(fyInput.value);
                if (currentFy) {
                    if (unit === 'metric') { fyInput.value = (currentFy * 6.89476).toFixed(0); }
                    else { fyInput.value = (currentFy / 6.89476).toFixed(2); }
                }
            } else if (base !== "") {
                // Determine which database value to pull
                if (gradeDB[base]["default"]) {
                    fyInput.value = gradeDB[base]["default"][unit];
                } else if (subgrade !== "") {
                    fyInput.value = gradeDB[base][subgrade][unit];
                }
            }
            autofillProperties(); 
        }

        function autofillProperties() {
            const shape = document.getElementById('w-shape').value;
            const unit = document.getElementById('unit-toggle').value;
            if (!shape) {
                document.getElementById('zx').value = ''; document.getElementById('sx').value = '';
                document.getElementById('lf').value = ''; document.getElementById('lw').value = '';
                return;
            }
            let data = shapeDB[shape];
            let Zx = data.Zx_imp; let Sx = data.Sx_imp;
            if (unit === 'metric') {
                Zx = Zx * Math.pow(25.4, 3); Sx = Sx * Math.pow(25.4, 3);
            }
            document.getElementById('zx').value = Zx.toFixed(2);
            document.getElementById('sx').value = Sx.toFixed(2);
            document.getElementById('lf').value = data.lf;
            document.getElementById('lw').value = data.lw;
        }

        function calculateBending() {
            const unit = document.getElementById('unit-toggle').value;
            const Fy = parseFloat(document.getElementById('fy').value);
            const Sx = parseFloat(document.getElementById('sx').value);
            const Zx = parseFloat(document.getElementById('zx').value);
            const lf = parseFloat(document.getElementById('lf').value);
            const lw = parseFloat(document.getElementById('lw').value);
            const method = document.getElementById('design-method').value;
            const shape = document.getElementById('w-shape').value;

            if (!Fy || !Sx || !Zx || !lf || !lw) {
                alert("Please fill out all inputs or select a shape."); return;
            }

            const E = (unit === 'imperial') ? 29000 : 200000;
            const lambda_compact = 0.38 * Math.sqrt(E / Fy);
            const lambda_noncompact = 1.0 * Math.sqrt(E / Fy);

            let classification = (lf <= lambda_compact) ? "Compact" : (lf <= lambda_noncompact) ? "Noncompact" : "Slender";

            let Mn = 0;
            if (classification === "Compact") { Mn = Fy * Zx; }
            else if (classification === "Noncompact") {
                const Mp = Fy * Zx; const Mr = 0.7 * Fy * Sx;
                Mn = Mp - (Mp - Mr) * ((lf - lambda_compact) / (lambda_noncompact - lambda_compact));
            } else { Mn = (0.9 * E * (4 / Math.sqrt(lw)) * Sx) / Math.pow(lf, 2); }

            let displayMn = (unit === 'imperial') ? Mn / 12 : Mn / 1000000;
            let unitLabel = (unit === 'imperial') ? "kip-ft" : "kN-m";
            
            let finalValue = (method === "LRFD") ? (0.9 * displayMn).toFixed(2) : (displayMn / 1.67).toFixed(2);
            let finalMethodTitle = (method === "LRFD") ? "Design Moment (Mu = 0.9 * Mn)" : "Allowable Moment (Ma = Mn / 1.67)";

            const resultsArea = document.getElementById('results-area');
            resultsArea.style.display = 'block';
            
            // Re-formatted to use the Glass Card Design
            resultsArea.innerHTML = `
                <div class="results-panel">
                    <div class="result-card">
                        <div class="summary-header">Analysis Summary</div>
                        <div class="summary-grid">
                            <div class="summary-item">
                                <span class="summary-label">λ compact limit</span>
                                <span class="summary-value val-cyan">${lambda_compact.toFixed(2)}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">λ noncompact limit</span>
                                <span class="summary-value val-yellow">${lambda_noncompact.toFixed(2)}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Classification</span>
                                <span class="summary-value val-orange">${classification}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Nominal Moment (Mn)</span>
                                <span class="summary-value">${displayMn.toFixed(2)} <span style="font-size:0.8rem; font-weight:normal; color:var(--text-label);">${unitLabel}</span></span>
                            </div>
                        </div>
                    </div>

                    <div class="analyzed-section-panel">
                        <div class="section-subtitle">${finalMethodTitle}</div>
                        <div class="section-title val-green">${finalValue} <span style="font-size:1.5rem; color:white;">${unitLabel}</span></div>
                    </div>
                </div>
            `;
            
            resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
