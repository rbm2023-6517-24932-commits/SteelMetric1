<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Analysis - Iterative Beam Solver</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- Boot-Up Animation Styles --- */
        #boot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-page);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .boot-logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-glow 1.5s infinite alternate;
            margin-bottom: 20px;
        }

        .boot-line {
            width: 0;
            height: 2px;
            background: var(--accent-orange);
            box-shadow: 0 0 15px var(--accent-orange);
            animation: load-line 1.8s ease-in-out forwards;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.2)); transform: scale(0.98); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px #FFA500); transform: scale(1.02); }
        }

        @keyframes load-line {
            0% { width: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 300px; opacity: 1; }
        }

        .hide-boot {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @media print {
            #boot-overlay { display: none !important; }
        }
        /* --- End Boot-Up Animation Styles --- */

        /* --- Back Button Styles --- */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: #3b82f6;
            transform: translateX(-3px);
        }

        :root {
            --bg-page: #040914;
            --text-main: #f3f4f6;
            --text-label: #9ca3af;
            --accent-blue: #38bdf8;
            --accent-cyan: #22d3ee;
            --accent-orange: #f97316;
            --accent-yellow: #fde047;
            --accent-green: #10b981;
            --danger-red: #ef4444;

            --glass-bg: rgba(17, 24, 39, 0.55);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-input: rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: rgba(34, 211, 238, 0.15);
        }
        .blob-2 {
            bottom: -10%; right: -5%;
            width: 45vw; height: 45vw;
            background: rgba(249, 115, 22, 0.12);
        }

        /* Main Glass Container */
        .calculator-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 1050px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .badge {
            background: linear-gradient(135deg, var(--accent-orange), #ea580c);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 30px;
            margin-bottom: 25px;
            align-items: start;
        }

        .form-group, .sub-form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .left-column-container, .right-column-container {
            display: flex; flex-direction: column; gap: 18px;
        }

        .input-wrapper {
            display: flex; align-items: center; gap: 10px;
        }

        label {
            font-size: 0.85rem; color: var(--text-label); font-weight: 500;
        }

        /* Glass Inputs */
        input, select {
            background-color: var(--glass-input);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        input.value-input { width: 100px; text-align: center; }

        input[readonly], select:disabled {
            background-color: rgba(0, 0, 0, 0.4);
            color: #6b7280;
            cursor: not-allowed;
            border-color: rgba(255,255,255,0.03);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 10px auto;
            padding-right: 35px;
        }

        select option { background-color: #111827; color: white; }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        .unit-label { color: var(--text-label); font-size: 0.95rem; }

        /* Glass Panels */
        .segments-section, .total-length-container, .segment-row {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .segments-section {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .segments-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;
        }

        .segments-header h3 { margin: 0; font-size: 1.15rem; color: var(--accent-cyan); }

        .total-length-container {
            display: flex; align-items: flex-start; flex-direction: column; gap: 15px; margin-bottom: 20px;
            padding: 18px; border: 1px solid rgba(249, 115, 22, 0.3);
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.05), transparent);
        }

        /* Glassmorphism Buttons */
        .btn-add-segment {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .btn-add-segment:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }

        .segments-input-area { display: flex; flex-direction: column; gap: 10px; }
        .segment-row { display: flex; gap: 10px; align-items: center; padding: 12px; }
        .segment-row input.brace-elev { width: 130px; }
        .segment-row select.k-factor-dropdown { flex-grow: 1; }
        .segment-row select.axis-dropdown { width: 120px; }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-remove:hover { background: var(--danger-red); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.4); }

        /* Gradient Action Buttons */
        .btn-calculate {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #040914;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
            text-transform: uppercase;
        }
        .btn-calculate:hover {
            box-shadow: 0 12px 25px rgba(34, 211, 238, 0.5);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-print {
            background: transparent;
            color: var(--text-label);
            border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; width: 100%; margin-top: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .btn-print:hover { background: rgba(255,255,255,0.05); color: white; border-color: rgba(255,255,255,0.2); }

        /* ADVANCED RESULTS PANEL (Glass Cards) */
        .results-panel {
            margin-top: 35px;
            display: none;
            animation: fadeIn 0.5s ease-out;
            flex-direction: column;
            gap: 25px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .summary-header {
            font-size: 1.25rem; font-weight: bold; color: #ffffff; margin-bottom: 20px;
            display: inline-block; border-bottom: 2px solid var(--accent-cyan); padding-bottom: 5px;
        }

        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .summary-item { display: flex; flex-direction: column; gap: 6px; }
        .summary-label { font-size: 0.8rem; color: var(--text-label); text-transform: uppercase; letter-spacing: 1px;}
        .summary-value { font-size: 1.3rem; font-weight: bold; color: white; }

        /* Neon Accents */
        .val-cyan { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        .val-yellow { color: var(--accent-yellow); text-shadow: 0 0 10px rgba(253, 224, 71, 0.4); }
        .val-green { color: var(--accent-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .val-orange { color: var(--accent-orange); text-shadow: 0 0 10px rgba(249, 115, 22, 0.4); }

        .k-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.95rem; color: var(--text-main); }
        .k-table th { text-align: left; padding: 15px 10px; color: var(--text-label); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; border-bottom: 1px solid var(--glass-border); }
        .k-table td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .k-table tr:hover td { background: rgba(255,255,255,0.02); }

        .analyzed-section-panel {
            text-align: center; padding: 40px;
            background: radial-gradient(circle at top, rgba(34, 211, 238, 0.08), transparent 70%);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .section-subtitle { font-size: 0.85rem; color: var(--accent-cyan); text-transform: uppercase; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .section-title { font-size: 4rem; font-weight: 900; color: white; margin: 0; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .section-props { font-size: 1rem; color: var(--text-label); margin: 20px 0 35px 0; }

        .section-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 450px; margin: 0 auto; }
        .stat-item { display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { font-size: 1.8rem; font-weight: bold; }

        /* Shear-design specific styling within new theme */
        .shear-inputs-panel {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .shear-inputs-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;
        }

        .shear-inputs-header h3 { margin: 0; font-size: 1.15rem; color: var(--accent-cyan); }

        .small-props {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.4rem;
            padding-left: 0.2rem;
            min-height: 1.2em;
        }

        .stiffener-group {
            display: none;
            flex-direction: column;
            margin-top: 0.75rem;
            margin-left: 1rem;
            border-left: 2px solid rgba(255,255,255,0.1);
            padding-left: 1rem;
        }

        .stiffener-group label {
            font-size: 0.75rem;
            color: var(--text-label);
        }

        .stiffener-group input {
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            width: 100%;
        }

        .solution-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .solution-box span.highlight {
            color: var(--accent-orange);
            font-weight: 600;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            border-left: 4px solid var(--accent-orange);
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .btn-calc {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #040914;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            width: 180px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
            text-transform: uppercase;
        }
        .btn-calc:hover {
            box-shadow: 0 12px 25px rgba(34, 211, 238, 0.5);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-reset {
            background: transparent;
            color: var(--text-label);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 180px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .btn-reset:hover { background: rgba(255,255,255,0.05); color: white; border-color: rgba(255,255,255,0.2); }

        .btn-pdf {
            background: linear-gradient(135deg, var(--accent-orange), #ea580c);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            width: 180px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
            text-transform: uppercase;
            display: none;
        }
        .btn-pdf:hover {
            box-shadow: 0 12px 25px rgba(249, 115, 22, 0.5);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Canvas styling */
        canvas {
            background-color: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            box-sizing: border-box;
            cursor: crosshair;
        }

        /* Item chips */
        .item-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .item-chip {
            background-color: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
        }
        .item-chip button {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            padding: 0;
            cursor: pointer;
            font-weight: bold;
            margin: 0;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        .item-chip button:hover { background: #dc2626; }

        /* Log list */
        .log-list {
            font-size: 13px;
            color: var(--text-label);
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        .pass-text { color: var(--accent-green); font-weight: bold; }
        .fail-text { color: var(--danger-red); font-weight: bold; }

        /* PDF template */
        #pdf-template {
            display: none;
            background: #ffffff;
            color: #000000;
            padding: 40px;
            font-family: 'Helvetica', 'Arial', sans-serif;
            line-height: 1.6;
            width: 800px;
            margin: 0 auto;
        }

        #pdf-template .pdf-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #000;
        }

        #pdf-template .pdf-title {
            font-size: 24px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
        }

        #pdf-template .pdf-badge {
            display: inline-block;
            background-color: #f97316;
            color: #ffffff !important;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        #pdf-template .pdf-row {
            margin-bottom: 8px;
            font-size: 14px;
        }

        #pdf-template .pdf-label {
            font-weight: bold;
            display: inline-block;
            width: 260px;
        }

        #pdf-template .pdf-value {
            display: inline-block;
        }

        #pdf-template .pdf-section-title {
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: underline;
        }

        /* Print styles */
        @media print {
            body { background-color: white; background-image: none; color: black; padding: 0; margin: 0; display: block; }
            .bg-blob, .calculator-container { display: none !important; }
            #pdf-template { display: block; width: 100%; font-family: 'Times New Roman', Times, serif; }
            .pdf-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 15px; }
            .pdf-header h1 { margin: 0; font-size: 24pt; letter-spacing: 2px; }
            .pdf-header h2 { margin: 5px 0 0 0; font-size: 14pt; color: #333; font-weight: normal; }
        }
    </style>

</head>
<body>
    <div id="boot-overlay">
        <div class="boot-logo">STEEL DESIGN</div>
        <div class="boot-line"></div>
    </div>
    <a href="index.html" class="back-btn">&#8592; Back to Home</a>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="calculator-container" id="mainContainer">
        <div class="header">
            <h1>STEEL DESIGN</h1>
            <span class="badge">SHEAR</span>
        </div>

        <!-- Top Settings Row -->
        <div class="form-grid">
            <div class="left-column-container">
                <div class="sub-form-group">
                    <label>Design Method</label>
                    <select id="method" onchange="updateCanvas()">
                        <option value="LRFD">LRFD</option>
                        <option value="ASD">ASD</option>
                    </select>
                </div>
                <div class="sub-form-group">
                    <label>Steel Designation</label>
                    <select id="steelBase" onchange="handleBaseChange()"></select>
                </div>
            </div>
            <div class="right-column-container">
                <div class="sub-form-group">
                    <label>Steel Grade</label>
                    <select id="steelGrade" onchange="handleGradeChange()" disabled>
                        <option value="">N/A</option>
                    </select>
                </div>
                <div class="sub-form-group">
                    <label>Yield Strength, Fy</label>
                    <div class="input-wrapper">
                        <input type="number" id="fy" readonly placeholder="ksi" style="width: 100%;">
                        <span class="unit-label">ksi</span>
                    </div>
                </div>
                <div class="sub-form-group">
                    <label>Include Self-Weight?</label>
                    <select id="includeSelfWeight">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Beam & Load Setup Panel -->
        <div class="shear-inputs-panel">
            <div class="shear-inputs-header">
                <h3>Beam & Load Setup</h3>
            </div>

            <div class="form-grid">
                <div class="left-column-container">
                    <div class="sub-form-group">
                        <label>Total Beam Length (ft)</label>
                        <input type="number" id="beamLength" value="20" onchange="updateCanvas()">
                    </div>
                    <div class="sub-form-group">
                        <label>Add Support</label>
                        <div style="display:flex; gap:10px;">
                            <select id="supportType" style="flex:1;">
                                <option value="pin">Pin</option>
                                <option value="roller">Roller</option>
                                <option value="cantilever">Cantilever (Fixed End)</option>
                            </select>
                            <input type="number" id="supportPos" placeholder="Pos (ft)" style="flex:1;">
                            <button class="btn-add-segment" onclick="addSupport()" style="margin:0; width:auto;">Add</button>
                        </div>
                    </div>
                </div>
                <div class="right-column-container">
                    <div class="sub-form-group">
                        <label>Load Type</label>
                        <select id="loadType" onchange="updateLoadUI()">
                            <option value="point">Point Load</option>
                            <option value="uniform">Uniform Load</option>
                            <option value="triangular">Triangular / Trapezoidal</option>
                            <option value="moment">Concentrated Moment</option>
                        </select>
                    </div>
                    <div class="sub-form-group">
                        <label>Load Entry Method</label>
                        <select id="loadEntry" onchange="updateLoadUI()">
                            <option value="separate">Separate Dead & Live</option>
                            <option value="combined">Already Combined / Factored</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="dynamicLoadInputs"></div>
            <button class="btn-add-segment" onclick="addLoad()" style="margin-top: 10px; width: auto;">Add Load to Beam</button>

            <div id="supportList" class="item-list"></div>
            <div id="loadList" class="item-list"></div>

            <canvas id="beamCanvas" width="800" height="250" style="cursor: default;"></canvas>
            <button class="btn-remove" onclick="clearBeam()" style="width: auto; margin-top: 10px;">Clear Beam Data</button>
        </div>

        <div class="button-group">
            <button class="btn-calc" onclick="calculateDesign()" id="calcBtn">CALCULATE</button>
            <button class="btn-pdf" id="btnPdf" onclick="generatePDF()">Save PDF Report</button>
        </div>

            </div>
        </div>
    </div>

    // FACTOR LOADS FOR SOLVER
    function getFactoredLoads(baseLoads, method) {
        return baseLoads.map(l => {
            let fl = { ...l };
            if (l.entry === 'combined') {
                if (fl.type === 'point' || fl.type === 'moment' || fl.type === 'uniform') fl.mag = fl.magD;
                else { fl.magStart = fl.magD_start; fl.magEnd = fl.magD_end; }
            } else {
                if (method === 'LRFD') {
                    if (fl.type === 'point' || fl.type === 'moment' || fl.type === 'uniform') {
                        let c1 = 1.4 * fl.magD; let c2 = 1.2 * fl.magD + 1.6 * fl.magL;
                        fl.mag = Math.abs(c1) > Math.abs(c2) ? c1 : c2;
                    } else {
                        let s1 = 1.4 * fl.magD_start; let s2 = 1.2 * fl.magD_start + 1.6 * fl.magL_start;
                        fl.magStart = Math.abs(s1) > Math.abs(s2) ? s1 : s2;
                        let e1 = 1.4 * fl.magD_end; let e2 = 1.2 * fl.magD_end + 1.6 * fl.magL_end;
                        fl.magEnd = Math.abs(e1) > Math.abs(e2) ? e1 : e2;
                    }
                } else {
                    if (fl.type === 'point' || fl.type === 'moment' || fl.type === 'uniform') fl.mag = fl.magD + fl.magL;
                    else { fl.magStart = fl.magD_start + fl.magL_start; fl.magEnd = fl.magD_end + fl.magL_end; }
                }
            }
            if (fl.type === 'point' || fl.type === 'moment' || fl.type === 'uniform') fl.dispMag = parseFloat(fl.mag.toFixed(2));
            else { fl.dispMagStart = parseFloat(fl.magStart.toFixed(2)); fl.dispMagEnd = parseFloat(fl.magEnd.toFixed(2)); }
            return fl;
        });
    }

    function updateCanvas() {
        const method = document.getElementById("method").value;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const L = parseFloat(document.getElementById("beamLength").value) || 20;
        const scale = (canvas.width - 100) / L;

        ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(startX + (L * scale), startY);
        ctx.lineWidth = 6; ctx.strokeStyle = "#ffffff"; ctx.stroke();

        ctx.fillStyle = "#f97316"; ctx.strokeStyle = "#f97316";
        supports.forEach(sup => {
            const px = startX + (sup.pos * scale);
            if(sup.type === 'pin') {
                ctx.beginPath(); ctx.moveTo(px, startY + 3); ctx.lineTo(px - 10, startY + 20); ctx.lineTo(px + 10, startY + 20); ctx.fill();
            } else if(sup.type === 'roller') {
                ctx.beginPath(); ctx.arc(px, startY + 12, 8, 0, Math.PI*2); ctx.fill();
            } else if(sup.type === 'cantilever') {
                ctx.fillStyle = "#334155";
                ctx.fillRect(px - 10, startY - 30, 20, 60);
                ctx.strokeStyle = "#f97316"; 
                for(let i=0; i<60; i+=10) {
                    ctx.beginPath();
                    if (sup.pos < L/2) { ctx.moveTo(px - 10, startY - 30 + i); ctx.lineTo(px - 20, startY - 20 + i); }
                    else { ctx.moveTo(px + 10, startY - 30 + i); ctx.lineTo(px + 20, startY - 20 + i); }
                    ctx.lineWidth = 2; ctx.stroke();

                ctx.fillStyle = "#f97316"; 
            }
        });

        ctx.strokeStyle = "#ffffff"; ctx.fillStyle = "#ffffff";
        ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";

        let dynamicFactoredLoads = getFactoredLoads(loads, method);

        dynamicFactoredLoads.forEach(load => {
            if(load.type === 'point') {
                const px = startX + (load.pos * scale);
                ctx.beginPath(); ctx.moveTo(px, startY - 50); ctx.lineTo(px, startY - 5); ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(px, startY - 5); ctx.lineTo(px - 5, startY - 15); ctx.lineTo(px + 5, startY - 15); ctx.fill();
                ctx.fillText(load.dispMag + " k", px, startY - 55);
            } 
            else if(load.type === 'moment') {
                const px = startX + (load.pos * scale);
                ctx.beginPath(); ctx.arc(px, startY, 25, Math.PI, 2 * Math.PI); ctx.lineWidth = 3; ctx.stroke();
                if (load.dispMag >= 0) {
                    ctx.beginPath(); ctx.moveTo(px + 25, startY); ctx.lineTo(px + 18, startY - 10); ctx.lineTo(px + 32, startY - 10); ctx.fill();
                } else {
                    ctx.beginPath(); ctx.moveTo(px - 25, startY); ctx.lineTo(px - 32, startY - 10); ctx.lineTo(px - 18, startY - 10); ctx.fill();
                }
                ctx.fillText(Math.abs(load.dispMag) + " kip-ft", px, startY - 35);
            }
            else if(load.type === 'uniform') {
                let yLine = startY - 30;
                ctx.beginPath(); ctx.lineWidth = 2; ctx.moveTo(startX + load.start * scale, yLine); ctx.lineTo(startX + load.end * scale, yLine); ctx.stroke();
                let loadLenPx = (load.end - load.start) * scale;
                let numArrows = Math.max(2, Math.floor(loadLenPx / 20));
                for(let i=0; i<=numArrows; i++) {
                    let px = startX + load.start * scale + (i * loadLenPx / numArrows);
                    ctx.beginPath(); ctx.moveTo(px, yLine); ctx.lineTo(px, startY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(px, startY); ctx.lineTo(px - 4, startY - 6); ctx.lineTo(px + 4, startY - 6); ctx.fill();
                }
                ctx.fillText(load.dispMag + " k/ft", startX + ((load.start + load.end) / 2) * scale, yLine - 8);
                ctx.globalAlpha = 0.25; ctx.fillRect(startX + load.start * scale, yLine, loadLenPx, 30); ctx.globalAlpha = 1.0;
            }
            else if(load.type === 'triangular') {
                let maxMag = Math.max(Math.abs(load.dispMagStart), Math.abs(load.dispMagEnd));
                if (maxMag === 0) maxMag = 1;
                let h1 = (load.dispMagStart / maxMag) * 45; let h2 = (load.dispMagEnd / maxMag) * 45;

                ctx.beginPath(); ctx.lineWidth = 2;
                ctx.moveTo(startX + load.start * scale, startY - h1); ctx.lineTo(startX + load.end * scale, startY - h2); ctx.stroke();

                let loadLenPx = (load.end - load.start) * scale;
                let numArrows = Math.max(2, Math.floor(loadLenPx / 20));
                for(let i=0; i<=numArrows; i++) {
                    let ratio = i / numArrows;
                    let px = startX + load.start * scale + (ratio * loadLenPx);
                    let pyTop = (startY - h1) - ratio * (h2 - h1);
                    ctx.beginPath(); ctx.moveTo(px, pyTop); ctx.lineTo(px, startY); ctx.stroke();
                    if (startY - pyTop > 5) {
                        ctx.beginPath(); ctx.moveTo(px, startY); ctx.lineTo(px - 4, startY - 6); ctx.lineTo(px + 4, startY - 6); ctx.fill();
                    }
                }
                if (load.dispMagStart > 0) ctx.fillText(load.dispMagStart + " k/ft", startX + load.start * scale, startY - h1 - 8);
                if (load.dispMagEnd > 0) ctx.fillText(load.dispMagEnd + " k/ft", startX + load.end * scale, startY - h2 - 8);
                
                ctx.globalAlpha = 0.25; ctx.beginPath();
                ctx.moveTo(startX + load.start * scale, startY); ctx.lineTo(startX + load.start * scale, startY - h1);
                ctx.lineTo(startX + load.end * scale, startY - h2); ctx.lineTo(startX + load.end * scale, startY);
                ctx.fill(); ctx.globalAlpha = 1.0;
            }
        });
    }

    // --- MATH ENGINE CORE ---
    function solveLinearSystem(A, B) {
        let n = B.length;
        for (let i = 0; i < n; i++) {
            let maxEl = Math.abs(A[i][i]), maxRow = i;
            for (let k = i + 1; k < n; k++) if (Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
            for (let k = i; k < n; k++) { let tmp = A[maxRow][k]; A[maxRow][k] = A[i][k]; A[i][k] = tmp; }
            let tmpB = B[maxRow]; B[maxRow] = B[i]; B[i] = tmpB;
            for (let k = i + 1; k < n; k++) {
                let c = -A[k][i] / A[i][i];
                for (let j = i; j < n; j++) { if (i === j) A[k][j] = 0; else A[k][j] += c * A[i][j]; }
                B[k] += c * B[i];
            }
        }
        let X = new Array(n).fill(0);
        for (let i = n - 1; i >= 0; i--) {
            X[i] = B[i] / A[i][i];
            for (let k = i - 1; k >= 0; k--) B[k] -= A[k][i] * X[i];
        }
        return X;
    }

    function getLoadIntensityAt(x, fLoads) {
        let w = 0;
        fLoads.forEach(l => { 
            if (l.type === 'uniform' && x >= l.start && x <= l.end) w += l.mag; 
            else if (l.type === 'triangular' && x >= l.start && x <= l.end) {
                let ratio = (x - l.start) / (l.end - l.start);
                w += l.magStart + ratio * (l.magEnd - l.magStart);
            }
        });
        return w;
    }

    function getStaticsLeftOf(x, fLoads) {
        let M = 0, steps = 300, dx = x / steps;
        if(x <= 0) return 0;
        for (let i=0; i<steps; i++) { let px = (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); M -= (w * dx) * (x - px); }
        fLoads.forEach(l => { 
            if (l.type === 'point' && l.pos < x) M -= l.mag * (x - l.pos); 
            if (l.type === 'moment' && l.pos < x) M += l.mag;
        });
        return M;
    }

    function getStaticsRightOf(x, BeamLength, fLoads) {
        let M = 0, steps = 300, dx = (BeamLength - x) / steps;
        if(x >= BeamLength) return 0;
        for (let i=0; i<steps; i++) { let px = x + (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); M -= (w * dx) * (px - x); }
        fLoads.forEach(l => { 
            if (l.type === 'point' && l.pos > x) M -= l.mag * (l.pos - x); 
            if (l.type === 'moment' && l.pos > x) M -= l.mag;
        });
        return M;
    }

    function getSimpleMoment(xA, xB, x_eval, fLoads) {
        let VA = 0, steps = 400, L = xB - xA, dx = L / steps;
        for(let i=0; i<steps; i++) { let px = xA + (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); VA += (w * dx) * (xB - px) / L; }
        fLoads.forEach(l => { 
            if(l.type === 'point' && l.pos > xA && l.pos < xB) VA += l.mag * (xB - l.pos) / L; 
            if(l.type === 'moment' && l.pos > xA && l.pos < xB) VA -= l.mag / L;
        });

        let M0 = VA * (x_eval - xA);
        let dx2 = (x_eval - xA) / steps;
        if (dx2 > 0) { for(let i=0; i<steps; i++) { let px = xA + (i + 0.5)*dx2; let w = getLoadIntensityAt(px, fLoads); M0 -= (w * dx2) * (x_eval - px); } }
        fLoads.forEach(l => { 
            if(l.type === 'point' && l.pos > xA && l.pos < x_eval) M0 -= l.mag * (x_eval - l.pos); 
            if(l.type === 'moment' && l.pos > xA && l.pos < x_eval) M0 += l.mag;
        });
        return M0;
    }

    function getSimpleShear(xA, xB, x_eval, fLoads) {
        let VA = 0, steps = 400, L = xB - xA, dx = L / steps;
        for(let i=0; i<steps; i++) { let px = xA + (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); VA += (w * dx) * (xB - px) / L; }
        fLoads.forEach(l => { 
            if(l.type === 'point' && l.pos > xA && l.pos < xB) VA += l.mag * (xB - l.pos) / L; 
            if(l.type === 'moment' && l.pos > xA && l.pos < xB) VA -= l.mag / L;
        });
        
        let Vx = VA;
        let dx2 = (x_eval - xA) / steps;
        if (dx2 > 0) { for(let i=0; i<steps; i++) { let px = xA + (i + 0.5)*dx2; let w = getLoadIntensityAt(px, fLoads); Vx -= (w * dx2); } }
        fLoads.forEach(l => { if(l.type === 'point' && l.pos > xA && l.pos < x_eval) Vx -= l.mag; });
        return Vx;
    }

    function getC(xA, xB, fLoads) {
        let CL = 0, CR = 0, steps = 200, L = xB - xA, dx = L / steps;
        for (let i=0; i<steps; i++) {
            let px = xA + (i + 0.5)*dx; let m = getSimpleMoment(xA, xB, px, fLoads);
            CL += m * (xB - px) / L * dx; CR += m * (px - xA) / L * dx;
        }
        return { CL, CR }; 
    }

    function runEngine(fLoads, beamLength, currentSupports) {
        let n = currentSupports.length;
        if (n === 0) return; 

        if (n === 1) {
            if (currentSupports[0].type === 'cantilever') currentSupports[0].M = getStaticsLeftOf(currentSupports[0].pos, fLoads) + getStaticsRightOf(currentSupports[0].pos, beamLength, fLoads);
        } else {
            let A = Array(n).fill(0).map(() => Array(n).fill(0)); let B = Array(n).fill(0);
            for (let i = 0; i < n; i++) {
                if (i === 0) {
                    if (currentSupports[i].type === 'cantilever') { let L1 = currentSupports[1].pos - currentSupports[0].pos; let C = getC(currentSupports[0].pos, currentSupports[1].pos, fLoads); A[0][0] = 2 * L1; A[0][1] = L1; B[0] = -6 * (C.CL); } 
                    else { A[0][0] = 1; B[0] = getStaticsLeftOf(currentSupports[0].pos, fLoads); }
                } else if (i === n - 1) { 
                    if (currentSupports[i].type === 'cantilever') { let L_prev = currentSupports[i].pos - currentSupports[i-1].pos; let C = getC(currentSupports[i-1].pos, currentSupports[i].pos, fLoads); A[i][i-1] = L_prev; A[i][i] = 2 * L_prev; B[i] = -6 * (C.CR); } 
                    else { A[i][i] = 1; B[i] = getStaticsRightOf(currentSupports[i].pos, beamLength, fLoads); }
                } else { 
                    let L_prev = currentSupports[i].pos - currentSupports[i-1].pos; let L_next = currentSupports[i+1].pos - currentSupports[i].pos;
                    let C_prev = getC(currentSupports[i-1].pos, currentSupports[i].pos, fLoads); let C_next = getC(currentSupports[i].pos, currentSupports[i+1].pos, fLoads);
                    A[i][i-1] = L_prev; A[i][i] = 2 * (L_prev + L_next); A[i][i+1] = L_next; B[i] = -6 * (C_prev.CR + C_next.CL);
                }
            }
            let M_solved = solveLinearSystem(A, B);
            for(let i=0; i<n; i++) currentSupports[i].M = M_solved[i];
        }
    }

    function calculateMaxForces(fLoads, L, currentSupports) {
        runEngine(fLoads, L, currentSupports);
        
        let evalPts = new Set();
        let slices = 500; let dx = L / slices;
        for(let i=0; i<=slices; i++) evalPts.add(parseFloat((i*dx).toFixed(6)));
        
        currentSupports.forEach(s => {
            evalPts.add(parseFloat(s.pos.toFixed(6)));
            if (s.pos > 0) evalPts.add(parseFloat((s.pos - 1e-5).toFixed(6)));
            if (s.pos < L) evalPts.add(parseFloat((s.pos + 1e-5).toFixed(6)));
        });
        
        fLoads.forEach(l => {
            if(l.type === 'point' || l.type === 'moment') {
                evalPts.add(parseFloat(l.pos.toFixed(6)));
                if (l.pos > 0) evalPts.add(parseFloat((l.pos - 1e-5).toFixed(6)));
                if (l.pos < L) evalPts.add(parseFloat((l.pos + 1e-5).toFixed(6)));
            } else {
                evalPts.add(parseFloat(l.start.toFixed(6))); evalPts.add(parseFloat(l.end.toFixed(6)));
            }
        });

        let X_arr = Array.from(evalPts).filter(x => x >= 0 && x <= L).sort((a,b) => a-b);
        let V_arr = [], M_arr = [];
        let maxV = 0, maxM = 0;

        for (let x of X_arr) {
            let mx = 0, vx = 0;

            if (x <= currentSupports[0].pos) mx = getStaticsLeftOf(x, fLoads);
            else if (x >= currentSupports[currentSupports.length-1].pos) mx = getStaticsRightOf(x, L, fLoads);
            else {
                for (let j = 1; j < currentSupports.length; j++) {
                    if (x <= currentSupports[j].pos) {
                        let L_span = currentSupports[j].pos - currentSupports[j-1].pos;
                        if (L_span > 0) {
                            let M0 = getSimpleMoment(currentSupports[j-1].pos, currentSupports[j].pos, x, fLoads);
                            mx = M0 + currentSupports[j-1].M + (x - currentSupports[j-1].pos) / L_span * (currentSupports[j].M - currentSupports[j-1].M);
                        } else mx = currentSupports[j].M;
                        break;
                    }
                }
            }

            if (x < currentSupports[0].pos) {
                fLoads.forEach(l => { 
                    if (l.type === 'point' && l.pos < x) vx -= l.mag; 
                    if (l.type === 'uniform' && l.start < x) vx -= l.mag * (Math.min(x, l.end) - l.start); 
                });
            } else if (x > currentSupports[currentSupports.length-1].pos) {
                fLoads.forEach(l => { 
                    if (l.type === 'point' && l.pos > x) vx += l.mag; 
                    if (l.type === 'uniform' && l.end > x) vx += l.mag * (l.end - Math.max(x, l.start)); 
                });
            } else {
                for (let j = 1; j < currentSupports.length; j++) {
                    if (x <= currentSupports[j].pos) {
                        let L_span = currentSupports[j].pos - currentSupports[j-1].pos;
                        if (L_span > 0) {
                            let V_simple = getSimpleShear(currentSupports[j-1].pos, currentSupports[j].pos, x, fLoads);
                            vx = V_simple - (currentSupports[j-1].M - currentSupports[j].M) / L_span;
                        }
                        break;
                    }
                }
            }

            M_arr.push(mx); V_arr.push(vx);
            if (Math.abs(mx) > maxM) maxM = Math.abs(mx);
            if (Math.abs(vx) > maxV) maxV = Math.abs(vx);
        }

        return { maxV, maxM, X_arr, V_arr, M_arr };
    }

    // --- AISC CALCULATION ENGINE ---
    function getShearCapacity(sec, Fy, method) {
        let isLRFD = method === "LRFD";
        let kv = 5.0; // Unstiffened web default
        let Aw = sec.d * sec.tw;

        let lim1 = 2.24 * Math.sqrt(E / Fy);
        let Cv = 1.0; let phi_v = 1.0; let Omega_v = 1.5;

        if (sec.h_tw <= lim1) {
            Cv = 1.0; phi_v = 1.0; Omega_v = 1.5;
        } else {
            phi_v = 0.9; Omega_v = 1.67;
            let c1 = 1.10 * Math.sqrt((kv * E) / Fy);
            let c2 = 1.37 * Math.sqrt((kv * E) / Fy);
            if (sec.h_tw <= c1) Cv = 1.0;
            else if (sec.h_tw <= c2) Cv = c1 / sec.h_tw;
            else Cv = (1.51 * E * kv) / (Math.pow(sec.h_tw, 2) * Fy);
        }

        let Vn = 0.6 * Fy * Aw * Cv;
        return isLRFD ? phi_v * Vn : Vn / Omega_v;
    }

    function getMomentCapacity(sec, Fy, method) {
        let isLRFD = method === "LRFD";
        let Mn = Fy * sec.zx; 
        return isLRFD ? (0.9 * Mn) / 12 : (Mn / 1.67) / 12; // Output in kip-ft
    }

    function calculateDesign() {
        if (supports.length < 2 && !(supports.length === 1 && supports[0].type === 'cantilever')) {
            return alert("Invalid supports. Add at least 2 simple supports or 1 cantilever to analyze the beam.");
        }

        const method = document.getElementById("method").value;
        const L = parseFloat(document.getElementById("beamLength").value);
        const checkSW = document.getElementById("includeSelfWeight").value === "yes";
        let fyInput = document.getElementById("fy").value;
        
        if (!fyInput) return alert("Please select a Steel Grade or enter custom Fy.");
        const Fy = parseFloat(fyInput);

        // Update Labels based on toggle
        document.getElementById("vLabelExt").innerText = checkSW ? "- with self weight" : "- applied loads only";
        document.getElementById("mLabelExt").innerText = checkSW ? "- with self weight" : "- applied loads only";

        // 1. Initial Statics (No self weight)
        let fLoadsInitial = getFactoredLoads(loads, method);
        let initialSups = JSON.parse(JSON.stringify(supports)).sort((a,b) => a.pos - b.pos);
        
        let initialCalcData = calculateMaxForces(fLoadsInitial, L, initialSups);
        let initialMaxV = initialCalcData.maxV;
        let initialMaxM = initialCalcData.maxM;

        let Zreq = method === "LRFD" ? (initialMaxM * 12) / (0.9 * Fy) : (initialMaxM * 12 * 1.67) / Fy;
        
        let iterationLog = [];
        let finalSection = null;
        let finalCalcData = null;
        let areaReq = 0;

        // 2. Iterate through sections
        for (let i = 0; i < wDB.length; i++) {
            let sec = wDB[i];
            
            // Step 2a: Check Moment Capacity (Required Zx)
            if (sec.zx < Zreq) continue; 
            
            // Step 2b: Check Area Web Requirement (If previously triggered)
            if (areaReq > 0 && (sec.d * sec.tw) < areaReq) continue;

            // Step 3: Check Shear Capacity (Initial test)
            let vCap = getShearCapacity(sec, Fy, method);
            if (vCap < initialMaxV) {
                iterationLog.push(`<span class="fail-text">✗ ${sec.name}</span>: Initial Shear Failed (Cap: ${vCap.toFixed(2)}k < Req: ${initialMaxV.toFixed(2)}k)`);
                
                // Calculate Area Web Req for next iter
                let kv = 5.0;
                let c1 = 1.10 * Math.sqrt((kv * E) / Fy);
                let isCompact = sec.h_tw <= c1;
                
                if (method === "LRFD") {
                    areaReq = isCompact ? initialMaxV / (1.0 * 0.6 * Fy) : initialMaxV / (0.9 * 0.6 * Fy);
                } else {
                    areaReq = isCompact ? initialMaxV / ((0.6/1.5) * Fy) : initialMaxV / ((0.6/1.67) * Fy);
                }
                continue;
            }

            let newMaxV, newMaxM, finalData;

            // Step 4: Include Self Weight (If toggled ON)
            if (checkSW) {
                let swMag = method === "LRFD" ? (1.2 * (sec.weight / 1000)) : (sec.weight / 1000);
                let swLoad = { type: 'uniform', start: 0, end: L, mag: swMag, dispMag: swMag };
                let fLoadsFinal = [...fLoadsInitial, swLoad];
                
                let testSups = JSON.parse(JSON.stringify(supports)).sort((a,b) => a.pos - b.pos);
                finalData = calculateMaxForces(fLoadsFinal, L, testSups);
                newMaxV = finalData.maxV;
                newMaxM = finalData.maxM;
            } else {
                // Skip self-weight calculation
                finalData = initialCalcData;
                newMaxV = initialMaxV;
                newMaxM = initialMaxM;
            }

            // Step 5: Final Capacity Check with New Forces
            let mCapFinal = getMomentCapacity(sec, Fy, method);
            let vCapFinal = getShearCapacity(sec, Fy, method);

            if (mCapFinal >= newMaxM && vCapFinal >= newMaxV) {
                finalSection = sec;
                finalCalcData = { ...finalData, mCapFinal, vCapFinal };
                if (checkSW) {
                    iterationLog.push(`<span class="pass-text">✓ ${sec.name}</span>: Selected! (Safely supports self-weight)`);
                } else {
                    iterationLog.push(`<span class="pass-text">✓ ${sec.name}</span>: Selected!`);
                }
                break;
            } else {
                if (checkSW) {
                    iterationLog.push(`<span class="fail-text">✗ ${sec.name}</span>: Capacity failed after adding self-weight.`);
                } else {
                    iterationLog.push(`<span class="fail-text">✗ ${sec.name}</span>: Capacity failed.`);
                }
            }
        }

        // --- Store Data for PDF ---
        if (finalSection) {
            window.pdfData = {
                method, L, checkSW, fyInput,
                steelBase: document.getElementById("steelBase").value,
                steelGrade: document.getElementById("steelGrade").value,
                finalSection, Zreq, finalCalcData
            };
        }

        // --- OUTPUT DISPLAY ---
        let resDiv = document.getElementById("outputLog");
        
        if (!finalSection) {
            resDiv.innerHTML = `<div class="result-card"><h3 class="fail-text">No section from the database is adequate.</h3></div>`;
        } else {
            let logHTML = iterationLog.map(l => `<div>${l}</div>`).join('');
            
            resDiv.innerHTML = `
                <div class="result-card" style="border-left: 4px solid var(--green);">
                    <h3 style="margin-top:0; color: var(--green);">Selected Section: ${finalSection.name}</h3>
                    <div class="grid-2">
                        <div>
                            <span style="color: var(--text-label);">Design Method:</span> <b>${method}</b><br>
                            <span style="color: var(--text-label);">Steel Yield (Fy):</span> <b>${Fy} ksi</b><br>
                            <span style="color: var(--text-label);">Required Zx:</span> <b>${Zreq.toFixed(2)} in³</b><br>
                        </div>
                        <div>
                            <span style="color: var(--text-label);">Section Zx:</span> <b>${finalSection.zx} in³</b><br>
                            <span style="color: var(--text-label);">Section Depth (d):</span> <b>${finalSection.d}"</b><br>
                            <span style="color: var(--text-label);">Web Thickness (tw):</span> <b>${finalSection.tw}"</b><br>
                        </div>
                    </div>
                    <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
                    <div class="grid-2">
                        <div>
                            <span style="color: var(--moment-color); font-weight: bold;">Moment (M)</span><br>
                            Applied Max: <b>${finalCalcData.maxM.toFixed(2)} kip-ft</b><br>
                            Capacity: <b>${finalCalcData.mCapFinal.toFixed(2)} kip-ft</b>
                        </div>
                        <div>
                            <span style="color: var(--shear-color); font-weight: bold;">Shear (V)</span><br>
                            Applied Max: <b>${finalCalcData.maxV.toFixed(2)} kips</b><br>
                            Capacity: <b>${finalCalcData.vCapFinal.toFixed(2)} kips</b>
                        </div>
                    </div>
                </div>
                <h4 style="margin-bottom: 5px;">Iteration Log</h4>
                <div class="log-list">${logHTML}</div>
            `;
            
            document.getElementById("results").style.display = "block";
            document.getElementById("btnPdf").style.display = "block";
            drawDiagram("shearCanvas", finalCalcData.X_arr, finalCalcData.V_arr, "#ef4444", L, "kips");
            drawDiagram("momentCanvas", finalCalcData.X_arr, finalCalcData.M_arr, "#3b82f6", L, "kip-ft");
            document.getElementById("results").scrollIntoView({ behavior: "smooth" });
        }
    }

    // --- DRAWING ENGINE ---
    function drawDiagram(canvasId, xVals, yVals, strokeColor, L, labelUnit) {
        const canvas = document.getElementById(canvasId); 
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const padX = 50, padY = 40;
        const width = canvas.width - padX * 2; const height = canvas.height - padY * 2;
        
        let maxVal = Math.max(...yVals); let minVal = Math.min(...yVals);
        let absMax = Math.max(Math.abs(maxVal), Math.abs(minVal));
        if (absMax === 0) absMax = 1; 
        
        function getX(x) { return padX + (x / L) * width; }
        function getY(y) { return padY + (height / 2) - ((y / absMax) * (height / 2)); }
        
        ctx.beginPath(); ctx.moveTo(padX, padY + height / 2); ctx.lineTo(padX + width, padY + height / 2);
        ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1; ctx.stroke();
        
        ctx.beginPath(); ctx.moveTo(getX(xVals[0]), getY(yVals[0]));
        for (let i = 1; i < xVals.length; i++) ctx.lineTo(getX(xVals[i]), getY(yVals[i]));
        ctx.strokeStyle = strokeColor; ctx.lineWidth = 3; ctx.stroke();
        
        ctx.lineTo(getX(xVals[xVals.length - 1]), getY(0)); ctx.lineTo(getX(xVals[0]), getY(0));
        ctx.fillStyle = strokeColor; ctx.globalAlpha = 0.45; ctx.fill(); ctx.globalAlpha = 1.0;
        
        let peakIdx = 0;
        for(let i = 1; i < yVals.length; i++) {
            if(Math.abs(yVals[i]) > Math.abs(yVals[peakIdx])) peakIdx = i;
        }
        
        let px = getX(xVals[peakIdx]); let py = getY(yVals[peakIdx]);
        ctx.beginPath(); ctx.arc(px, py, 5, 0, 2*Math.PI); ctx.fillStyle = "white"; ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = strokeColor; ctx.stroke();
        
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
        let valText = "Max: " + Math.abs(yVals[peakIdx]).toFixed(2) + " " + labelUnit;
        let labelY = yVals[peakIdx] >= 0 ? py - 12 : py + 22;
        ctx.fillText(valText, px, labelY);
    }

        html2pdf().set(opt).from(pdfContainer).save().then(() => {
            // Restore the app UI and hide the PDF template once the file downloads
            pdfContainer.style.display = 'none';
            mainWrapper.style.display = 'block';
        });
    }

    </script>
</body>
