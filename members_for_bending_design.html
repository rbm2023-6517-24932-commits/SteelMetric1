<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Design - Continuous Beams</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- Boot-Up Animation Styles --- */
        #boot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-page); /* Matches your dark background */
            z-index: 9999; /* Keeps it above everything else */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .boot-logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-glow 1.5s infinite alternate;
            margin-bottom: 20px;
        }

        .boot-line {
            width: 0;
            height: 2px;
            background: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan);
            animation: load-line 1.8s ease-in-out forwards;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.2)); transform: scale(0.98); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.6)); transform: scale(1.02); }
        }

        @keyframes load-line {
            0% { width: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 300px; opacity: 1; }
        }

        .hide-boot {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        /* Ensure it doesn't show up when printing */
        @media print {
            #boot-overlay { display: none !important; }
        }
        /* --- End Boot-Up Animation Styles --- */
        /* --- Back Button Styles --- */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: #3b82f6; 
            transform: translateX(-3px); 
        }

        :root {
            --bg-page: #040914;
            --text-main: #f3f4f6;
            --text-label: #9ca3af;
            --accent-blue: #38bdf8;
            --accent-cyan: #22d3ee;
            --accent-orange: #f97316;
            --accent-yellow: #fde047;
            --accent-green: #10b981;
            --danger-red: #ef4444;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(17, 24, 39, 0.55);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-input: rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: rgba(34, 211, 238, 0.15); /* Cyan glow */
        }
        .blob-2 {
            bottom: -10%; right: -5%;
            width: 45vw; height: 45vw;
            background: rgba(249, 115, 22, 0.12); /* Orange glow */
        }

        /* Main Glass Container */
        .calculator-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 900px; 
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .badge {
            background: linear-gradient(135deg, var(--accent-orange), #ea580c);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }

        /* Grid Layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 30px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        
        label { font-size: 0.85rem; color: var(--text-label); font-weight: 500; }

        /* Glass Inputs */
        input, select {
            background-color: var(--glass-input);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        input[readonly], select:disabled {
            background-color: rgba(0, 0, 0, 0.4);
            color: #6b7280;
            cursor: not-allowed;
            border-color: rgba(255,255,255,0.03);
            box-shadow: none;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 10px auto;
            padding-right: 35px;
        }
        
        select option { background-color: #111827; color: white; }

        input:focus:not([readonly]), select:focus { 
            outline: none; 
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        /* Buttons */
        .btn-calculate {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #040914;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
            text-transform: uppercase;
            margin-top: 25px;
        }
        .btn-calculate:hover { 
            box-shadow: 0 12px 25px rgba(34, 211, 238, 0.5); 
            transform: translateY(-2px); 
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            width: 100%;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover { background: var(--danger-red); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.4); }

        /* Result Panel & Action Buttons */
        .action-buttons {
            display: flex; gap: 15px; margin-top: 20px;
        }
        .action-buttons button {
            flex: 1; padding: 14px; font-weight: bold; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; margin-top: 0; backdrop-filter: blur(5px);
        }
        .btn-print { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-print:hover { background: var(--accent-green); color: #040914; transform: translateY(-2px); }
        .btn-reset { background: rgba(239, 68, 68, 0.1); color: var(--danger-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-reset:hover { background: var(--danger-red); color: white; transform: translateY(-2px); }

        .section-title {
            margin-top: 35px; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px; color: var(--accent-cyan); font-size: 1.15rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
        }

        canvas {
            background-color: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--glass-border);
            border-radius: 12px; 
            width: 100%; 
            margin-top: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        #results {
            margin-top: 35px; padding: 30px; 
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border); 
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; 
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Item Chips */
        .item-list {
            display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; margin-bottom: 20px;
        }
        .item-chip {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; 
            display: flex; align-items: center; gap: 10px; border: 1px solid var(--glass-border); color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .item-chip button {
            background: rgba(239, 68, 68, 0.2); color: var(--danger-red); border: 1px solid rgba(239, 68, 68, 0.4); 
            border-radius: 50%; width: 22px; height: 22px; padding: 0; cursor: pointer; font-weight: bold; 
            margin: 0; font-size: 11px; display: flex; justify-content: center; align-items: center; transition: all 0.2s;
        }
        .item-chip button:hover { background: var(--danger-red); color: white; }
    </style>
</head>

<div class="calculator-container" id="mainContainer">
    <div class="header">
        <h1>STEEL DESIGN</h1>
        <span class="badge">BEAMS</span>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Design Method</label>
            <select id="method" onchange="updateCanvas()">
                <option value="LRFD">LRFD</option>
                <option value="ASD">ASD</option>
            </select>
        </div>
        <div class="form-group">
            <label>Steel Type (ASTM)</label>
            <select id="steelBaseType" onchange="updateGrades()"></select>
        </div>
    </div>
    <div class="grid-2">
        <div class="form-group" id="steelGradeGroup" style="display:none;">
            <label>Specific Grade</label>
            <select id="steelSpecificGrade" onchange="updateFy()"></select>
        </div>
        <div class="form-group">
            <label>Yield Strength, Fy (ksi)</label>
            <input type="number" id="fy" value="50" readonly>
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Consider Serviceability (Deflection)?</label>
            <select id="checkServiceability" onchange="toggleServiceability()">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>
        </div>
        <div class="form-group" id="deflectionLimitGroup" style="display:none;">
            <label>Deflection Limit (L / x)</label>
            <input type="number" id="deflectionLimit" value="360" placeholder="e.g. 360">
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Are Max Moment & Deflection already given?</label>
            <select id="givenForces" onchange="toggleGivenForces()">
                <option value="no">No, help me solve it</option>
                <option value="yes">Yes</option>
            </select>
        </div>
        <div class="form-group">
            <label>Consider Self-Weight in Final Check?</label>
            <select id="considerSelfWeight">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>
    </div>

    <div id="givenForcesPanel" style="display:none;">
        <h3 class="section-title">Given Data</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Factored Max Moment (kip-ft)</label>
                <input type="number" id="givenMoment" value="0">
            </div>
            <div class="form-group" id="givenDeflectionGroup" style="display:none;">
                <label>Actual Max Deflection (feet)</label>
                <input type="number" id="givenDeflection" value="0">
            </div>
        </div>
    </div>

    <div id="solverPanel">
        <h3 class="section-title">Beam Solver</h3>
        
        <div class="grid-2">
            <div class="form-group">
                <label>Total Beam Length (ft)</label>
                <input type="number" id="beamLength" value="20" onchange="updateCanvas()">
            </div>
            <div class="form-group">
                <label>Add Support</label>
                <div style="display:flex; gap:10px;">
                    <select id="supportType" style="flex:1;">
                        <option value="pin">Pin</option>
                        <option value="roller">Roller</option>
                        <option value="cantilever">Cantilever (Fixed End)</option>
                    </select>
                    <input type="number" id="supportPos" placeholder="Pos (ft)" style="flex:1;">
                    <button class="btn-secondary" onclick="addSupport()" style="margin:0; width:auto; padding: 0 20px;">Add</button>
                </div>
            </div>
        </div>
        
        <div id="supportList" class="item-list"></div>
        
        <h4 style="margin-top: 15px; margin-bottom: 5px; color: var(--accent-cyan); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Add Loading</h4>
        <div class="grid-2" style="margin-bottom: 10px;">
            <div class="form-group">
                <label>Load Type</label>
                <select id="loadType" onchange="updateLoadUI()">
                    <option value="point">Point Load</option>
                    <option value="uniform">Uniform Load</option>
                    <option value="triangular">Triangular / Trapezoidal Load</option>
                    <option value="moment">Concentrated Moment</option>
                </select>
            </div>
            <div class="form-group">
                <label>Load Entry Method</label>
                <select id="loadEntry" onchange="updateLoadUI()">
                    <option value="separate">Separate Dead & Live</option>
                    <option value="combined">Already Combined / Factored</option>
                </select>
            </div>
        </div>

        <div id="dynamicLoadInputs"></div>
        <button class="btn-secondary" onclick="addLoad()" style="margin-top: 10px;">Add Load to Beam</button>

        <div id="loadList" class="item-list"></div>

        <canvas id="beamCanvas" width="800" height="250"></canvas>
        <button class="btn-secondary btn-danger" onclick="clearBeam()" style="width: auto; margin-top: 15px;">Clear All Data</button>
    </div>

    <button class="btn-calculate" onclick="calculateDesign()" id="calcBtn">Calculate Result</button>

    <div id="results">
        <h3 class="section-title" style="margin-top:0;">Design Results</h3>
        <div id="outputLog" style="line-height: 1.8; overflow-x: auto; color: white;"></div>
        
        <div class="action-buttons">
            <button onclick="printReport()" id="printBtn" class="btn-print">🖨️ Print / Save PDF</button>
            <button onclick="solveAgain()" id="resetBtn" class="btn-reset">🔄 Solve Again</button>
        </div>
    </div>
</div>

    window.onload = function() {
        const baseSelect = document.getElementById("steelBaseType");
        Object.keys(steelGroups).forEach(type => {
            let opt = document.createElement("option"); opt.value = type; opt.text = `ASTM ${type}`; baseSelect.appendChild(opt);
        });
        let customOpt = document.createElement("option"); customOpt.value = "custom"; customOpt.text = "Custom Input..."; baseSelect.appendChild(customOpt);
        
        updateGrades(); updateLoadUI(); updateCanvas(); updateLists();
    };

    function updateGrades() {
        const baseType = document.getElementById("steelBaseType").value;
        const gradeGroup = document.getElementById("steelGradeGroup");
        const gradeSelect = document.getElementById("steelSpecificGrade");
        const fyInput = document.getElementById("fy");

        if (baseType === "custom") {
            gradeGroup.style.display = "none";
            fyInput.readOnly = false; fyInput.value = ""; fyInput.placeholder = "Enter Fy..."; fyInput.focus();
            return;
        }

        const grades = steelGroups[baseType];
        gradeSelect.innerHTML = "";
        if (grades.length === 1 && grades[0].grade === "-") {
            gradeGroup.style.display = "none";
            let opt = document.createElement("option"); opt.value = grades[0].fy; opt.text = "Standard"; gradeSelect.appendChild(opt);
        } else {
            gradeGroup.style.display = "flex";
            grades.forEach(g => { let opt = document.createElement("option"); opt.value = g.fy; opt.text = g.grade; gradeSelect.appendChild(opt); });
        }
        updateFy();
    }

    function updateFy() {
        if (document.getElementById("steelBaseType").value !== "custom") {
            document.getElementById("fy").readOnly = true;
            document.getElementById("fy").value = document.getElementById("steelSpecificGrade").value;
        }
    }

    function updateLists() {
        const sList = document.getElementById("supportList");
        sList.innerHTML = "";
        supports.forEach((s, i) => {
            let label = s.type === 'cantilever' ? 'Fixed End' : s.type.charAt(0).toUpperCase() + s.type.slice(1);
            sList.innerHTML += `<div class="item-chip">${label} @ ${s.pos}ft <button onclick="removeSupport(${i})">X</button></div>`;
        });

        const lList = document.getElementById("loadList");
        lList.innerHTML = "";
        loads.forEach((l, i) => {
            let val = l.entry === 'combined' ? l.magD : `${l.magD}D + ${l.magL}L`;
            let desc = l.type === 'point' ? `Point: ${val} k @ ${l.pos}ft` :
                       l.type === 'moment' ? `Moment: ${val} kip-ft @ ${l.pos}ft` :
                       l.type === 'uniform' ? `Uniform: ${val} k/ft from ${l.start} to ${l.end}ft` :
                       `Triangular: ${l.entry === 'combined' ? l.magD_start + ' to ' + l.magD_end : 'DL/LL'} k/ft from ${l.start} to ${l.end}ft`;
            lList.innerHTML += `<div class="item-chip">${desc} <button onclick="removeLoad(${i})">X</button></div>`;
        });
    }

    function removeSupport(index) {
        supports.splice(index, 1);
        updateCanvas();
        updateLists();
    }

    function removeLoad(index) {
        loads.splice(index, 1);
        updateCanvas();
        updateLists();
    }

    // Load-by-Load Maximum Evaluator
    function getFactoredLoads() {
        const method = document.getElementById("method").value;
        return loads.map(l => {
            let fl = { ...l };
            if (l.entry === 'combined') {
                if (fl.type === 'point' || fl.type === 'uniform' || fl.type === 'moment') fl.mag = fl.magD;
                else { fl.magStart = fl.magD_start; fl.magEnd = fl.magD_end; }
            } else {
                if (method === 'LRFD') {
                    if (fl.type === 'point' || fl.type === 'uniform' || fl.type === 'moment') {
                        let c1 = 1.4 * fl.magD;
                        let c2 = 1.2 * fl.magD + 1.6 * fl.magL;
                        fl.mag = Math.abs(c1) > Math.abs(c2) ? c1 : c2;
                    } else {
                        let s1 = 1.4 * fl.magD_start;
                        let s2 = 1.2 * fl.magD_start + 1.6 * fl.magL_start;
                        fl.magStart = Math.abs(s1) > Math.abs(s2) ? s1 : s2;

                        let e1 = 1.4 * fl.magD_end;
                        let e2 = 1.2 * fl.magD_end + 1.6 * fl.magL_end;
                        fl.magEnd = Math.abs(e1) > Math.abs(e2) ? e1 : e2;
                    }
                } else {
                    if (fl.type === 'point' || fl.type === 'uniform' || fl.type === 'moment') fl.mag = fl.magD + fl.magL;
                    else { fl.magStart = fl.magD_start + fl.magL_start; fl.magEnd = fl.magD_end + fl.magL_end; }
                }
            }
            
            if (fl.type === 'point' || fl.type === 'uniform' || fl.type === 'moment') fl.dispMag = parseFloat(fl.mag.toFixed(2));
            else {
                fl.dispMagStart = parseFloat(fl.magStart.toFixed(2));
                fl.dispMagEnd = parseFloat(fl.magEnd.toFixed(2));
            }
            return fl;
        });
    }

    function addSupport() {
        const pos = parseFloat(document.getElementById("supportPos").value);
        const type = document.getElementById("supportType").value;
        const beamL = parseFloat(document.getElementById("beamLength").value) || 20;
        
        if (!isNaN(pos)) { 
            supports.push({pos, type, M: 0, theta: 0}); 
            updateCanvas(); 
            updateLists(); 
        }
    }

    function addLoad() {
        const type = document.getElementById('loadType').value;
        const entry = document.getElementById('loadEntry').value;
        const beamL = parseFloat(document.getElementById("beamLength").value) || 20;
        let l = { type, entry };

        if (type === 'point' || type === 'moment') {
            l.pos = parseFloat(document.getElementById("l_pos").value) || 0;
            l.magD = parseFloat(document.getElementById(entry === 'combined' ? "l_mag" : "l_magD").value) || 0;
            l.magL = entry === 'combined' ? 0 : parseFloat(document.getElementById("l_magL").value) || 0;
        } else if (type === 'uniform') {
            l.start = parseFloat(document.getElementById("l_start").value) || 0;
            let rawEnd = parseFloat(document.getElementById("l_end").value);
            l.end = isNaN(rawEnd) ? beamL : rawEnd;
            if (l.end <= l.start) l.end = beamL;
            l.magD = parseFloat(document.getElementById(entry === 'combined' ? "l_mag" : "l_magD").value) || 0;
            l.magL = entry === 'combined' ? 0 : parseFloat(document.getElementById("l_magL").value) || 0;
        } else if (type === 'triangular') {
            l.start = parseFloat(document.getElementById("l_start").value) || 0;
            let rawEnd = parseFloat(document.getElementById("l_end").value);
            l.end = isNaN(rawEnd) ? beamL : rawEnd;
            if (l.end <= l.start) l.end = beamL;

            if (entry === 'combined') {
                l.magD_start = parseFloat(document.getElementById("l_mag_s").value) || 0;
                l.magD_end = parseFloat(document.getElementById("l_mag_e").value) || 0;
                l.magL_start = 0; l.magL_end = 0;
            } else {
                l.magD_start = parseFloat(document.getElementById("l_magD_s").value) || 0;
                l.magL_start = parseFloat(document.getElementById("l_magL_s").value) || 0;
                l.magD_end = parseFloat(document.getElementById("l_magD_e").value) || 0;
                l.magL_end = parseFloat(document.getElementById("l_magL_e").value) || 0;
            }
        }
        loads.push(l); updateCanvas(); updateLists();
    }

    function clearBeam() { loads = []; supports = []; updateCanvas(); updateLists(); }

    function updateCanvas() {
        const canvas = document.getElementById("beamCanvas"); const ctx = canvas.getContext("2d");
        
        if (isPrinting) {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        const L = parseFloat(document.getElementById("beamLength").value) || 20;
        const scale = (canvas.width - 100) / L;
        const startX = 50; const startY = 150;

        const mainColor = isPrinting ? "black" : "white";
        const supportColor = "#f97316";

        ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(startX + (L * scale), startY);
        ctx.lineWidth = 6; ctx.strokeStyle = mainColor; ctx.stroke();

        ctx.fillStyle = supportColor;
        supports.forEach(sup => {
            const px = startX + (sup.pos * scale);
            if(sup.type === 'pin') {
                ctx.beginPath(); ctx.moveTo(px, startY + 3); ctx.lineTo(px - 10, startY + 20); ctx.lineTo(px + 10, startY + 20); ctx.fill();
            } else if(sup.type === 'roller') {
                ctx.beginPath(); ctx.arc(px, startY + 12, 8, 0, Math.PI*2); ctx.fill();
            } else if(sup.type === 'cantilever') {
                ctx.fillRect(px - 10, startY - 30, 20, 60); ctx.strokeStyle = supportColor; ctx.lineWidth = 2;
                for(let i=0; i<60; i+=10) {
                    ctx.beginPath();
                    if (sup.pos < L/2) { ctx.moveTo(px - 10, startY - 30 + i); ctx.lineTo(px - 20, startY - 20 + i); }
                    else { ctx.moveTo(px + 10, startY - 30 + i); ctx.lineTo(px + 20, startY - 20 + i); }
                    ctx.stroke();
                }
            }
        });

        ctx.strokeStyle = mainColor; 
        ctx.fillStyle = mainColor;
        ctx.font = "bold 13px 'Segoe UI', Tahoma, sans-serif";
        ctx.textAlign = "center";

        let dynamicFactoredLoads = getFactoredLoads();

        dynamicFactoredLoads.forEach(load => {
            if(load.type === 'point') {
                const px = startX + (load.pos * scale);
                ctx.beginPath(); ctx.moveTo(px, startY - 50); ctx.lineTo(px, startY - 5); ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(px, startY - 5); ctx.lineTo(px - 5, startY - 15); ctx.lineTo(px + 5, startY - 15); ctx.fill();
                ctx.fillText(load.dispMag + " k", px, startY - 55);
            } 
            else if(load.type === 'moment') {
                const px = startX + (load.pos * scale);
                ctx.beginPath();
                ctx.arc(px, startY, 25, Math.PI, 2 * Math.PI);
                ctx.lineWidth = 3;
                ctx.stroke();
                
                if (load.dispMag >= 0) {
                    ctx.beginPath();
                    ctx.moveTo(px + 25, startY);
                    ctx.lineTo(px + 18, startY - 10);
                    ctx.lineTo(px + 32, startY - 10);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(px - 25, startY);
                    ctx.lineTo(px - 32, startY - 10);
                    ctx.lineTo(px - 18, startY - 10);
                    ctx.fill();
                }
                ctx.fillText(Math.abs(load.dispMag) + " kip-ft", px, startY - 35);
            }
            else if(load.type === 'uniform') {
                let yLine = startY - 30;
                
                ctx.beginPath(); ctx.lineWidth = 2;
                ctx.moveTo(startX + load.start * scale, yLine);
                ctx.lineTo(startX + load.end * scale, yLine);
                ctx.stroke();
                
                let loadLenPx = (load.end - load.start) * scale;
                let numArrows = Math.max(2, Math.floor(loadLenPx / 20));
                for(let i=0; i<=numArrows; i++) {
                    let px = startX + load.start * scale + (i * loadLenPx / numArrows);
                    ctx.beginPath(); ctx.moveTo(px, yLine); ctx.lineTo(px, startY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(px, startY); ctx.lineTo(px - 4, startY - 6); ctx.lineTo(px + 4, startY - 6); ctx.fill();
                }

                let midPointX = startX + ((load.start + load.end) / 2) * scale;
                ctx.fillText(load.dispMag + " kips/ft", midPointX, yLine - 8);
                
                ctx.globalAlpha = 0.1;
                ctx.fillRect(startX + load.start * scale, yLine, loadLenPx, 30);
                ctx.globalAlpha = 1.0;
            } 
            else if(load.type === 'triangular') {
                let maxMag = Math.max(load.dispMagStart, load.dispMagEnd);
                if (maxMag === 0) maxMag = 1;
                let h1 = (load.dispMagStart / maxMag) * 45;
                let h2 = (load.dispMagEnd / maxMag) * 45;

                ctx.beginPath(); ctx.lineWidth = 2;
                ctx.moveTo(startX + load.start * scale, startY - h1);
                ctx.lineTo(startX + load.end * scale, startY - h2);
                ctx.stroke();

                let loadLenPx = (load.end - load.start) * scale;
                let numArrows = Math.max(2, Math.floor(loadLenPx / 20));
                for(let i=0; i<=numArrows; i++) {
                    let ratio = i / numArrows;
                    let px = startX + load.start * scale + (ratio * loadLenPx);
                    let pyTop = (startY - h1) - ratio * (h2 - h1);
                    
                    ctx.beginPath(); ctx.moveTo(px, pyTop); ctx.lineTo(px, startY); ctx.stroke();
                    if (startY - pyTop > 5) {
                        ctx.beginPath(); ctx.moveTo(px, startY); ctx.lineTo(px - 4, startY - 6); ctx.lineTo(px + 4, startY - 6); ctx.fill();
                    }
                }

                if (load.dispMagStart > 0) ctx.fillText(load.dispMagStart + " kips/ft", startX + load.start * scale, startY - h1 - 8);
                if (load.dispMagEnd > 0) ctx.fillText(load.dispMagEnd + " kips/ft", startX + load.end * scale, startY - h2 - 8);
                
                ctx.globalAlpha = 0.1;
                ctx.beginPath();
                ctx.moveTo(startX + load.start * scale, startY);
                ctx.lineTo(startX + load.start * scale, startY - h1);
                ctx.lineTo(startX + load.end * scale, startY - h2);
                ctx.lineTo(startX + load.end * scale, startY);
                ctx.fill(); 
                ctx.globalAlpha = 1.0;
            }
        });
    }

    function solveLinearSystem(A, B) {
        let n = B.length;
        for (let i = 0; i < n; i++) {
            let maxEl = Math.abs(A[i][i]), maxRow = i;
            for (let k = i + 1; k < n; k++) if (Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
            for (let k = i; k < n; k++) { let tmp = A[maxRow][k]; A[maxRow][k] = A[i][k]; A[i][k] = tmp; }
            let tmpB = B[maxRow]; B[maxRow] = B[i]; B[i] = tmpB;
            for (let k = i + 1; k < n; k++) {
                let c = -A[k][i] / A[i][i];
                for (let j = i; j < n; j++) { if (i === j) A[k][j] = 0; else A[k][j] += c * A[i][j]; }
                B[k] += c * B[i];
            }
        }
        let X = new Array(n).fill(0);
        for (let i = n - 1; i >= 0; i--) {
            X[i] = B[i] / A[i][i];
            for (let k = i - 1; k >= 0; k--) B[k] -= A[k][i] * X[i];
        }
        return X;
    }

    function getLoadIntensityAt(x, fLoads) {
        let w = 0;
        fLoads.forEach(l => {
            if (l.type === 'uniform' && x >= l.start && x <= l.end) w += l.mag;
            else if (l.type === 'triangular' && x >= l.start && x <= l.end) {
                let ratio = (x - l.start) / (l.end - l.start);
                w += l.magStart + ratio * (l.magEnd - l.magStart);
            }
        });
        return w;
    }

    function getStaticsLeftOf(x, fLoads) {
        let M = 0, steps = 100, dx = x / steps;
        if(x <= 0) return 0;
        for (let i=0; i<steps; i++) {
            let px = (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); M -= (w * dx) * (x - px);
        }
        fLoads.forEach(l => { 
            if (l.type === 'point' && l.pos < x) M -= l.mag * (x - l.pos); 
            if (l.type === 'moment' && l.pos < x) M += l.mag; 
        });
        return M;
    }

    function getStaticsRightOf(x, BeamLength, fLoads) {
        let M = 0, steps = 100, dx = (BeamLength - x) / steps;
        if(x >= BeamLength) return 0;
        for (let i=0; i<steps; i++) {
            let px = x + (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); M -= (w * dx) * (px - x);
        }
        fLoads.forEach(l => { 
            if (l.type === 'point' && l.pos > x) M -= l.mag * (l.pos - x); 
            if (l.type === 'moment' && l.pos > x) M -= l.mag; 
        });
        return M;
    }

    function getSimpleMoment(xA, xB, x_eval, fLoads) {
        let VA = 0, steps = 200, L = xB - xA, dx = L / steps;
        for(let i=0; i<steps; i++) {
            let px = xA + (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); VA += (w * dx) * (xB - px) / L;
        }
        fLoads.forEach(l => { 
            if(l.type === 'point' && l.pos > xA && l.pos < xB) VA += l.mag * (xB - l.pos) / L; 
            if(l.type === 'moment' && l.pos > xA && l.pos < xB) VA -= l.mag / L;
        });

        let M0 = VA * (x_eval - xA);
        dx = (x_eval - xA) / steps;
        if (dx > 0) {
            for(let i=0; i<steps; i++) {
                let px = xA + (i + 0.5)*dx; let w = getLoadIntensityAt(px, fLoads); M0 -= (w * dx) * (x_eval - px);
            }
        }
        fLoads.forEach(l => { 
            if(l.type === 'point' && l.pos > xA && l.pos < x_eval) M0 -= l.mag * (x_eval - l.pos); 
            if(l.type === 'moment' && l.pos > xA && l.pos < x_eval) M0 += l.mag;
        });
        return M0;
    }

    function getC(xA, xB, fLoads) {
        let CL = 0, CR = 0, steps = 200, L = xB - xA, dx = L / steps;
        for (let i=0; i<steps; i++) {
            let px = xA + (i + 0.5)*dx;
            let m = getSimpleMoment(xA, xB, px, fLoads);
            CL += m * (xB - px) / L * dx; CR += m * (px - xA) / L * dx;
        }
        return { CL, CR }; 
    }

    function runEngine(fLoads, beamLength, method) {
        let sups = [...supports].sort((a,b) => a.pos - b.pos);
        
        fLoads = fLoads.map(l => {
            if (l.type === 'moment') {
                let isAtSupport = sups.some(s => Math.abs(s.pos - l.pos) < 1e-6);
                if (isAtSupport) {
                    let newPos = l.pos >= beamLength ? l.pos - 1e-4 : l.pos + 1e-4;
                    return { ...l, pos: newPos };
                }
            }
            return l;
        });

        let n = sups.length;
        if (n === 0) return 0; 

        if (n === 1) {
            if (sups[0].type !== 'cantilever') return 0; 
            sups[0].M = getStaticsLeftOf(sups[0].pos, fLoads) + getStaticsRightOf(sups[0].pos, beamLength, fLoads);
        } else {
            let A = Array(n).fill(0).map(() => Array(n).fill(0));
            let B = Array(n).fill(0);

            for (let i = 0; i < n; i++) {
                if (i === 0) {
                    if (sups[i].type === 'cantilever') {
                        let L1 = sups[1].pos - sups[0].pos; let C = getC(sups[0].pos, sups[1].pos, fLoads);
                        A[0][0] = 2 * L1; A[0][1] = L1; B[0] = -6 * (C.CL); 
                    } else { 
                        A[0][0] = 1; B[0] = getStaticsLeftOf(sups[0].pos, fLoads); 
                    }
                } else if (i === n - 1) { 
                    if (sups[i].type === 'cantilever') {
                        let L_prev = sups[i].pos - sups[i-1].pos; let C = getC(sups[i-1].pos, sups[i].pos, fLoads);
                        A[i][i-1] = L_prev; A[i][i] = 2 * L_prev; B[i] = -6 * (C.CR); 
                    } else { 
                        A[i][i] = 1; B[i] = getStaticsRightOf(sups[i].pos, beamLength, fLoads); 
                    }
                } else { 
                    let L_prev = sups[i].pos - sups[i-1].pos; let L_next = sups[i+1].pos - sups[i].pos;
                    let C_prev = getC(sups[i-1].pos, sups[i].pos, fLoads); let C_next = getC(sups[i].pos, sups[i+1].pos, fLoads);
                    
                    A[i][i-1] = L_prev; 
                    A[i][i] = 2 * (L_prev + L_next); 
                    A[i][i+1] = L_next;
                    B[i] = -6 * (C_prev.CR + C_next.CL);
                }
            }
            let M_solved = solveLinearSystem(A, B);
            for(let i=0; i<n; i++) sups[i].M = M_solved[i];
        }

        let evalPoints = new Set();
        let slices = 500;
        let dx = beamLength / slices;
        for (let i = 0; i <= slices; i++) evalPoints.add(parseFloat((i * dx).toFixed(6)));
        
        supports.forEach(s => { 
            evalPoints.add(parseFloat(s.pos.toFixed(6))); 
            if (s.pos > 0) evalPoints.add(parseFloat((s.pos - 1e-5).toFixed(6))); 
            if (s.pos < beamLength) evalPoints.add(parseFloat((s.pos + 1e-5).toFixed(6))); 
        });
        fLoads.forEach(l => {
            if(l.type === 'point') evalPoints.add(parseFloat(l.pos.toFixed(6)));
            else if(l.type === 'moment') {
                evalPoints.add(parseFloat(l.pos.toFixed(6)));
                if (l.pos > 0) evalPoints.add(parseFloat((l.pos - 1e-5).toFixed(6)));
                if (l.pos < beamLength) evalPoints.add(parseFloat((l.pos + 1e-5).toFixed(6)));
            }
            else { 
                evalPoints.add(parseFloat(l.start.toFixed(6))); 
                evalPoints.add(parseFloat(l.end.toFixed(6))); 
            }
        });
        
        let pts = Array.from(evalPoints).filter(x => x >= 0 && x <= beamLength).sort((a,b) => a-b);
        let maxMoment = 0;

        for (let x of pts) {
            let mx = 0;
            if (x < sups[0].pos) {
                mx = getStaticsLeftOf(x, fLoads);
            } else if (x > sups[n-1].pos) {
                mx = getStaticsRightOf(x, beamLength, fLoads);
            } else {
                if (n === 1) {
                    mx = sups[0].M; 
                } else {
                    for (let j = 1; j < n; j++) {
                        if (x <= sups[j].pos) { 
                            let L_span = sups[j].pos - sups[j-1].pos;
                            if (L_span > 0) {
                                let M0 = getSimpleMoment(sups[j-1].pos, sups[j].pos, x, fLoads);
                                mx = M0 + sups[j-1].M + (x - sups[j-1].pos) / L_span * (sups[j].M - sups[j-1].M);
                            } else {
                                mx = sups[j].M; 
                            }
                            break;
                        }
                    }
                }
            }
            if (Math.abs(mx) > Math.abs(maxMoment)) maxMoment = mx;
        }
        return Math.abs(maxMoment);
    }

    function getMaxDeflectionEI(fLoads, beamLength) {
        let sups = [...supports].sort((a,b) => a.pos - b.pos);
        
        fLoads = fLoads.map(l => {
            if (l.type === 'moment') {
                let isAtSupport = sups.some(s => Math.abs(s.pos - l.pos) < 1e-6);
                if (isAtSupport) {
                    let newPos = l.pos >= beamLength ? l.pos - 1e-4 : l.pos + 1e-4;
                    return { ...l, pos: newPos };
                }
            }
            return l;
        });

        let n = sups.length;
        if (n === 0) return 0;
        
        function getM_x(x) {
            if (x <= sups[0].pos) return getStaticsLeftOf(x, fLoads);
            if (x >= sups[n-1].pos) return getStaticsRightOf(x, beamLength, fLoads);
            for (let j = 1; j < n; j++) {
                if (x <= sups[j].pos) {
                    let L_span = sups[j].pos - sups[j-1].pos;
                    if (L_span > 0) {
                        let M0 = getSimpleMoment(sups[j-1].pos, sups[j].pos, x, fLoads);
                        return M0 + sups[j-1].M + (x - sups[j-1].pos) / L_span * (sups[j].M - sups[j-1].M);
                    }
                    return sups[j].M;
                }
            }
            return 0;
        }

        function integrateMoment(xA, x_eval) {
            let steps = 100;
            let dx = (x_eval - xA) / steps;
            let res = 0;
            if (dx === 0) return 0;
            for (let i = 0; i < steps; i++) {
                let u = xA + (i + 0.5) * dx;
                res += getM_x(u) * (x_eval - u) * dx;
            }
            return res;
        }

        for (let j = 0; j < n; j++) {
            if (sups[j].type === 'cantilever') {
                sups[j].theta = 0;
            } else if (j < n - 1 && sups[j+1].pos > sups[j].pos) {
                sups[j].theta = -integrateMoment(sups[j].pos, sups[j+1].pos) / (sups[j+1].pos - sups[j].pos);
            } else if (j > 0 && sups[j].pos > sups[j-1].pos) {
                let theta_A = sups[j-1].theta;
                let area = 0, steps = 100, dx = (sups[j].pos - sups[j-1].pos)/steps;
                for(let i=0; i<steps; i++) area += getM_x(sups[j-1].pos + (i+0.5)*dx) * dx;
                sups[j].theta = theta_A + area;
            } else {
                sups[j].theta = 0;
            }
        }

        let maxEIy = 0;
        let slices = 500;
        let dx = beamLength / slices;
        for (let i = 0; i <= slices; i++) {
            let x = i * dx;
            let y = 0;
            if (x < sups[0].pos) {
                y = sups[0].theta * (x - sups[0].pos) + integrateMoment(sups[0].pos, x);
            } else if (x > sups[n-1].pos) {
                y = sups[n-1].theta * (x - sups[n-1].pos) + integrateMoment(sups[n-1].pos, x);
            } else {
                for (let j = 1; j < n; j++) {
                    if (x <= sups[j].pos) {
                        y = sups[j-1].theta * (x - sups[j-1].pos) + integrateMoment(sups[j-1].pos, x);
                        break;
                    }
                }
            }
            if (Math.abs(y) > Math.abs(maxEIy)) maxEIy = Math.abs(y);
        }
        return maxEIy; 
    }

    function printReport() {
        const btn = document.getElementById("printBtn");
        const originalText = btn.innerText;
        btn.innerText = "Generating PDF...";
        btn.disabled = true;

        // Force canvas to white background
        isPrinting = true;
        updateCanvas();
        const canvas = document.getElementById("beamCanvas");
        const imgData = canvas.toDataURL("image/png");
        
        // Revert to dark mode immediately
        isPrinting = false;
        updateCanvas();

        const L = document.getElementById("beamLength").value;
        const method = document.getElementById("method").value;
        const fy = document.getElementById("fy").value;
        const limit = document.getElementById("deflectionLimit").value;
        const checkServ = document.getElementById("checkServiceability").value === "yes";
        const selfWt = document.getElementById("considerSelfWeight").value === "yes";

        // UI Swap Trick: Hide the main container
        const mainContainer = document.getElementById("mainContainer");
        mainContainer.style.display = "none";

        // Create the physical report div - styled for perfect A4/Letter size rendering
        const reportDiv = document.createElement("div");
        reportDiv.id = "pdfTempContainer";
        reportDiv.style.width = "7.5in"; // Explicit dimension for the snapshot
        reportDiv.style.margin = "0 auto";
        reportDiv.style.padding = "0.2in";
        reportDiv.style.background = "white";
        reportDiv.style.color = "black";
        reportDiv.style.fontFamily = "'Segoe UI', Tahoma, sans-serif";
        
        // Wrap each line in a clean block so html2pdf can naturally drop the self-weight to page 2 if it's too long!
        let rawLog = document.getElementById("outputLog").innerHTML;
        let formattedLog = `<div style="page-break-inside: avoid;">` + 
                           rawLog.replace(/<br\s*\/?>/gi, '</div><div style="page-break-inside: avoid; margin-bottom: 4px;">') + 
                           `</div>`;

        reportDiv.innerHTML = `
            <h2 style="color:#f97316; border-bottom:2px solid #333; padding-bottom:5px; margin-top:0;">Project Report: Steel Beam Design</h2>
            <table style="width:100%; border-collapse:collapse; margin-top:15px; font-size:14px; text-align: left;">
                <tr><td style="padding:5px;"><strong>Design Method:</strong></td><td>${method}</td>
                    <td style="padding:5px;"><strong>Beam Length:</strong></td><td>${L} ft</td></tr>
                <tr><td style="padding:5px;"><strong>Yield Strength (Fy):</strong></td><td>${fy} ksi</td>
                    <td style="padding:5px;"><strong>Serviceability Limit:</strong></td><td>${checkServ ? 'L / ' + limit : 'Ignored'}</td></tr>
                <tr><td style="padding:5px;"><strong>Self-Weight Checked:</strong></td><td>${selfWt ? 'Yes' : 'No'}</td>
                    <td style="padding:5px;"><strong>Number of Loads:</strong></td><td>${loads.length}</td></tr>
            </table>
            
            <h3 style="margin-top:30px; border-bottom:1px solid #ccc; padding-bottom:5px;">Beam Illustration</h3>
            <img src="${imgData}" style="width:100%; max-width: 100%; box-sizing: border-box; display: block; margin: 15px auto; border: 1px solid black;">
            
            <h3 style="margin-top:30px; border-bottom:1px solid #ccc; padding-bottom:5px;">Design Results</h3>
            <div style="line-height: 1.8; font-size: 14px; margin-top: 10px;">
                ${formattedLog}
            </div>
        `;

        document.body.appendChild(reportDiv);

        // Export config
        const opt = {
            margin:       [0.5, 0.5, 0.5, 0.5], // top, left, bottom, right in inches
            filename:     'Steel_Beam_Design_Report.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true }, 
            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' },
            pagebreak:    { mode: ['css', 'legacy'] }
        };

        // Take snapshot and swap UI back
        html2pdf().set(opt).from(reportDiv).save().then(() => {
            document.body.removeChild(reportDiv);
            mainContainer.style.display = ""; 
            btn.innerText = originalText;
            btn.disabled = false;
        }).catch(err => {
            console.error(err);
            alert("Something went wrong saving the PDF.");
            if(document.body.contains(reportDiv)) document.body.removeChild(reportDiv);
            mainContainer.style.display = "";
            btn.innerText = originalText;
            btn.disabled = false;
        });
    }

    function solveAgain() {
        window.scrollTo(0, 0);
        location.reload();
    }

    function calculateDesign() {
        const method = document.getElementById("method").value;
        const fy = parseFloat(document.getElementById("fy").value);
        if (isNaN(fy) || fy <= 0) return alert("Valid Yield Strength (Fy) required.");

        const isGiven = document.getElementById("givenForces").value === "yes";
        const considerServ = document.getElementById("checkServiceability").value === "yes";
        const L = parseFloat(document.getElementById("beamLength").value);
        const E = 29000;
        
        let Mu = 0, RequiredZx = 0, RequiredIx = 0;
        let logHTML = "";

        let baseFactoredLoads = getFactoredLoads(); // Uses the new load-by-load evaluator

        if (isGiven) {
            Mu = parseFloat(document.getElementById("givenMoment").value);
            logHTML += `• User Provided Max Moment = ${Mu.toFixed(2)} kip-ft<br>`;
        } else {
            if (supports.length < 2 && !(supports.length === 1 && supports[0].type === 'cantilever')) {
                return alert("Invalid supports. Add at least 2 simple supports or 1 cantilever.");
            }
            Mu = runEngine(baseFactoredLoads, L, method);
            logHTML += `• Matrix Solver Max Moment (${method}) = ${Mu.toFixed(2)} kip-ft<br>`;
        }

        if (method === "LRFD") RequiredZx = (Mu * 12) / (0.9 * fy);
        else RequiredZx = (Mu * 12 * 1.67) / fy;
        logHTML += `• Required Zx = <strong>${RequiredZx.toFixed(2)} in³</strong><br>`;

        if (considerServ) {
            let allowDeflection = 0;
            if (isGiven) {
                allowDeflection = parseFloat(document.getElementById("givenDeflection").value) * 12;
                let equivW_L = (8 * Mu) / Math.pow(L, 2); 
                RequiredIx = (5 * equivW_L * Math.pow(L*12, 4)) / (384 * E * allowDeflection);
                
                logHTML += `• Allowable Deflection = ${allowDeflection.toFixed(3)} in<br>`;
                logHTML += `• Required Ix (Uniform Load Assumption) = <strong>${RequiredIx.toFixed(2)} in⁴</strong><br>`;
            } else {
                const defLimitRaw = parseFloat(document.getElementById("deflectionLimit").value);
                allowDeflection = (L * 12) / defLimitRaw;

                // For deflection we just use pure unfactored Live Load
                let liveLoadsOnly = loads.map(l => {
                    let fl = { ...l };
                    if (l.entry === 'combined') {
                        if (fl.type === 'point' || fl.type === 'uniform' || fl.type === 'moment') fl.mag = fl.magD;
                        else { fl.magStart = fl.magD_start; fl.magEnd = fl.magD_end; }
                    } else {
                        if (fl.type === 'point' || fl.type === 'uniform' || fl.type === 'moment') fl.mag = fl.magL || 0;
                        else { fl.magStart = fl.magL_start || 0; fl.magEnd = fl.magL_end || 0; }
                    }
                    return fl;
                });
                
                runEngine(liveLoadsOnly, L, "ASD"); 
                
                let maxEIy_kip_ft3 = getMaxDeflectionEI(liveLoadsOnly, L);
                RequiredIx = (maxEIy_kip_ft3 * 1728) / (E * allowDeflection);
                
                logHTML += `• Allowable Deflection = ${allowDeflection.toFixed(3)} in<br>`;
                logHTML += `• Exact Max Deflection (EI\u0394) = ${maxEIy_kip_ft3.toFixed(2)} kip-ft³<br>`;
                logHTML += `• Required Ix = <strong>${RequiredIx.toFixed(2)} in⁴</strong><br>`;
                
                runEngine(baseFactoredLoads, L, method); 
            }
        }

        let validShapes = shapeDatabase.filter(shape => considerServ ? (shape.Zx >= RequiredZx && shape.Ix >= RequiredIx) : (shape.Zx >= RequiredZx));
        validShapes.sort((a, b) => a.weight - b.weight);

        if (validShapes.length === 0) {
            document.getElementById("outputLog").innerHTML = logHTML + `<br><strong style="color:var(--danger-red);">Error: No shapes meet criteria.</strong>`;
            document.getElementById("results").style.display = "block"; return;
        }

        let selectedShape = validShapes[0];
        logHTML += `<br>• Initial Pick (Lightest Valid Shape): <strong style="color:var(--accent-cyan);">${selectedShape.name}</strong><br>`;

        const addSelfWeight = document.getElementById("considerSelfWeight").value === "yes";
        if (addSelfWeight && !isGiven) {
            logHTML += `<br><strong style="color:var(--accent-orange);">--- Self-Weight Iteration ---</strong><br>`;
            let safe = false;
            
            while(!safe) {
                let sw = selectedShape.weight / 1000;
                // Treat self weight as Dead Load. Under your LRFD rule, 1.4 * SW governs.
                let factoredSW = method === "LRFD" ? 1.4 * sw : sw;
                
                let iterationLoads = [...baseFactoredLoads, { type: 'uniform', start: 0, end: L, mag: factoredSW }];
                let newMu = runEngine(iterationLoads, L, method);
                
                let capacity = method === "LRFD" ? (0.9 * fy * selectedShape.Zx) / 12 : (fy * selectedShape.Zx) / (1.67 * 12);

                logHTML += `Testing ${selectedShape.name}: M_max = ${newMu.toFixed(2)} kip-ft | Capacity = ${capacity.toFixed(2)} kip-ft<br>`;

                if (capacity >= newMu) {
                    safe = true; 
                    logHTML += `<div style="color:var(--accent-green); font-weight:bold; margin-top:8px; margin-bottom:15px; page-break-inside:avoid; display:block; width:100%;">Status: SAFE. ${selectedShape.name} passes.</div><br>`;
                } else {
                    logHTML += `<div style="color:var(--danger-red); font-weight:bold; margin-top:8px; margin-bottom:15px; page-break-inside:avoid; display:block; width:100%;">Status: UNSAFE. Next shape.</div><br>`;
                    validShapes.shift();
                    if(validShapes.length === 0) { logHTML += `<div style="color:var(--danger-red); font-weight:bold; margin-top:8px; margin-bottom:15px; page-break-inside:avoid; display:block; width:100%;">Error: Exceeds database limit.</div><br>`; break; }
                    selectedShape = validShapes[0];
                }
            }
        } else {
            logHTML += `<br><div style="color:var(--accent-green); font-weight:bold; margin-top:8px; margin-bottom:15px; font-size:1.1rem; page-break-inside:avoid; display:block; width:100%;">Final Selection: ${selectedShape.name}</div><br>`;
        }

        document.getElementById("outputLog").innerHTML = logHTML;
        document.getElementById("results").style.display = "block";
        document.getElementById("results").scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
