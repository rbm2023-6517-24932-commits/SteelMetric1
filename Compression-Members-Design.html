<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Analysis - Axial Compression Design</title>
    <style>
        :root {
            --bg-page: #040914;
            --bg-dark: #040914;
            --text-main: #f3f4f6;
            --text-label: #9ca3af;
            --accent-blue: #38bdf8;
            --accent-cyan: #22d3ee;
            --accent-orange: #f97316;
            --accent-yellow: #fde047;
            --accent-green: #10b981;
            --danger-red: #ef4444;
            --glass-bg: rgba(17, 24, 39, 0.55);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-input: rgba(0, 0, 0, 0.25);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Boot Overlay */
        #boot-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .boot-logo {
            font-size: 2.5rem; font-weight: 900; letter-spacing: 6px; color: #ffffff;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, var(--accent-orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse-glow 1.5s infinite alternate; margin-bottom: 20px;
        }

        .boot-line {
            width: 0; height: 2px; background: var(--accent-orange);
            box-shadow: 0 0 15px var(--accent-orange); animation: load-line 1.8s ease-in-out forwards;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; filter: drop-shadow(0 0 5px rgba(255, 115, 21, 0.2)); transform: scale(0.98); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px rgba(255, 115, 21, 0.6)); transform: scale(1.02); }
        }

        @keyframes load-line { 0% { width: 0; opacity: 0; } 50% { opacity: 1; } 100% { width: 300px; opacity: 1; } }
        .hide-boot { opacity: 0; visibility: hidden; pointer-events: none; }

        @media print { #boot-overlay { display: none !important; } }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.05); color: #e2e8f0;
            text-decoration: none; padding: 10px 16px; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease; z-index: 1000;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15); color: #ffffff;
            border-color: #3b82f6; transform: translateX(-3px);
        }

        .bg-blob {
            position: fixed; border-radius: 50%; filter: blur(120px);
            z-index: -1; opacity: 0.6; pointer-events: none;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(34, 211, 238, 0.15); }
        .blob-2 { bottom: -10%; right: -5%; width: 45vw; height: 45vw; background: rgba(249, 115, 22, 0.12); }

        .calculator-container {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 100%; max-width: 1050px; padding: 40px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .header {
            text-align: center; margin-bottom: 35px;
            display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .header h1 {
            font-size: 1.8rem; letter-spacing: 4px; margin: 0;
            background: linear-gradient(to right, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .badge {
            background: linear-gradient(135deg, var(--accent-orange), #ea580c); color: white;
            padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 30px; margin-bottom: 25px; align-items: start; }
        .form-group, .sub-form-group { display: flex; flex-direction: column; gap: 6px; }
        .left-column-container, .right-column-container { display: flex; flex-direction: column; gap: 18px; }
        .input-wrapper { display: flex; align-items: center; gap: 10px; }
        label { font-size: 0.85rem; color: var(--text-label); font-weight: 500; }

        input, select {
            background-color: var(--glass-input); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: white;
            padding: 12px 14px; border-radius: 8px; font-size: 0.95rem;
            transition: all 0.3s ease; width: 100%;
        }
        input.value-input { width: 100px; text-align: center; }
        input[readonly], select:disabled {
            background-color: rgba(0, 0, 0, 0.4); color: #6b7280; cursor: not-allowed;
            border-color: rgba(255,255,255,0.03);
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 14px top 50%;
            background-size: 10px auto; padding-right: 35px;
        }
        select option { background-color: #111827; color: white; }
        input:focus, select:focus {
            outline: none; border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }
        .unit-label { color: var(--text-label); font-size: 0.95rem; }

        .segments-section, .total-length-container, .segment-row {
            background: var(--glass-panel); border: 1px solid var(--glass-border);
            border-radius: 12px; backdrop-filter: blur(10px);
        }
        .segments-section {
            display: grid; grid-template-columns: 1fr 400px; gap: 30px;
            padding: 25px; margin-bottom: 30px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .segments-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;
        }
        .segments-header h3 { margin: 0; font-size: 1.15rem; color: var(--accent-cyan); }
        .total-length-container {
            display: flex; align-items: flex-start; flex-direction: column; gap: 15px;
            margin-bottom: 20px; padding: 18px;
            border: 1px solid rgba(249, 115, 22, 0.3);
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.05), transparent);
        }
        .btn-add-segment {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            color: white; border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-size: 0.85rem; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        .btn-add-segment:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
        .segments-input-area { display: flex; flex-direction: column; gap: 10px; }
        .segment-row { display: flex; gap: 10px; align-items: center; padding: 12px; }
        .segment-row input.brace-elev { width: 130px; }
        .segment-row select.k-factor-dropdown { flex-grow: 1; }
        .segment-row select.axis-dropdown { width: 120px; }
        .btn-remove {
            background: rgba(239, 68, 68, 0.1); color: var(--danger-red);
            border: 1px solid rgba(239, 68, 68, 0.3); padding: 10px 14px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s ease;
        }
        .btn-remove:hover { background: var(--danger-red); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.4); }

        .segments-visualizer-area {
            position: relative; min-height: 400px;
            border-left: 1px solid var(--glass-border);
            display: flex; justify-content: center; align-items: center;
        }

        .btn-calculate {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #040914; border: 1px solid rgba(255,255,255,0.2);
            padding: 16px; border-radius: 8px; font-size: 1.1rem; font-weight: 800;
            letter-spacing: 1px; cursor: pointer; width: 100%; transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3); text-transform: uppercase;
        }
        .btn-calculate:hover {
            box-shadow: 0 12px 25px rgba(34, 211, 238, 0.5);
            transform: translateY(-2px); filter: brightness(1.1);
        }
        .btn-print {
            background: transparent; color: var(--text-label); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 8px; font-size: 0.95rem; cursor: pointer;
            width: 100%; margin-top: 15px; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        .btn-print:hover { background: rgba(255,255,255,0.05); color: white; border-color: rgba(255,255,255,0.2); }

        .results-panel { margin-top: 35px; display: none; animation: fadeIn 0.5s ease-out; flex-direction: column; gap: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .results-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;
        }
        .results-header h3 { margin: 0; color: #ffffff; font-size: 1.4rem; }
        .status-badge {
            padding: 8px 16px; border-radius: 6px; font-weight: bold; font-size: 1rem;
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .status-safe-badge { background-color: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.5); }
        .status-unsafe-badge { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.5); }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .result-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border); border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 25px 30px; display: flex; flex-direction: column; gap: 12px;
            backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .result-card-header {
            font-size: 0.85rem; color: var(--text-label); text-transform: uppercase;
            letter-spacing: 1px; border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px; font-weight: 600;
        }
        .result-main-value { font-size: 2.2rem; font-weight: bold; color: var(--accent-orange); line-height: 1; text-shadow: 0 0 10px rgba(249, 115, 22, 0.4); }
        .result-main-value.blue { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        .result-main-value.green { color: var(--accent-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .result-main-value span { font-size: 1rem; font-weight: normal; color: var(--text-label); text-shadow: none; }
        .result-details { display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; color: var(--text-main); margin-top: auto;}
        .result-details-row { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 4px; }
        .result-details-row:last-child { border-bottom: none; padding-bottom: 0; }
        .detail-label { color: var(--text-label); }

        #print-report { display: none; }
        @media print {
            body { background-color: white; background-image: none; color: black; padding: 0; margin: 0; display: block; }
            .bg-blob, .calculator-container { display: none !important; }
            #print-report { display: block; width: 100%; font-family: 'Times New Roman', Times, serif; }
            .print-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 15px; }
            .print-header h1 { margin: 0; font-size: 24pt; letter-spacing: 2px; }
            .print-header h2 { margin: 5px 0 0 0; font-size: 14pt; color: #333; font-weight: normal; }
            .print-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 11pt; }
            .print-table th, .print-table td { border: 1px solid #000; padding: 10px; text-align: left; }
            .print-table th { background-color: #f2f2f2; font-weight: bold; width: 40%; }
            .table-title { font-size: 13pt; font-weight: bold; margin-bottom: 8px; color: #000; text-transform: uppercase; }
            .print-safe { color: #059669; font-weight: bold; }
            .print-unsafe { color: #dc2626; font-weight: bold; }
        }
    </style>
</head>
<body>

    <div id="boot-overlay">
        <div class="boot-logo">STEEL DESIGN</div>
        <div class="boot-line"></div>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="calculator-container">
        <div class="header">
            <h1>STEEL DESIGN</h1>
            <span class="badge">AXIAL COMPRESSION</span>
        </div>

        <div class="form-grid">
            <div class="left-column-container">
                <div class="sub-form-group">
                    <label>Design Method</label>
                    <select id="method">
                        <option value="LRFD">LRFD</option>
                        <option value="ASD">ASD</option>
                    </select>
                </div>
                <div class="sub-form-group">
                    <label>Dead Load, DL (kips)</label>
                    <input type="number" id="dl" value="100">
                </div>
                <div class="sub-form-group">
                    <label>Live Load, LL (kips)</label>
                    <input type="number" id="ll" value="100">
                </div>
            </div>

            <div class="right-column-container">
                <div class="sub-form-group">
                    <label>ASTM Designation</label>
                    <select id="astm_select" onchange="handleASTMChange()"></select>
                </div>
                <div class="sub-form-group">
                    <label>Grade</label>
                    <select id="grade_select" onchange="handleGradeChange()"></select>
                </div>
                <div class="sub-form-group">
                    <label>Yield Strength (Fy)</label>
                    <div class="input-wrapper">
                        <input type="number" id="fy_value" class="value-input" value="50" step="1" readonly>
                        <span class="unit-label">ksi</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="segments-section">
            <div class="segments-input-area">
                <div class="segments-header">
                    <h3>Column Geometry & Bracing</h3>
                    <button class="btn-add-segment" onclick="addSegment()">+ Add Brace Point</button>
                </div>
                
                <div class="total-length-container">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <label style="width: 135px;">Total Column Length:</label>
                        <div class="input-wrapper" style="width:130px;">
                            <input type="number" id="total-length" value="30" step="0.1" oninput="updateVisualizer()">
                            <span class="unit-label">ft</span>
                        </div>
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 5px;">
                        <label style="width: 135px;">Base (0 ft):</label>
                        <select id="base_condition" onchange="updateVisualizer()" style="width: 130px;">
                            <option value="Fixed">Fixed</option>
                            <option value="Pinned">Pinned</option>
                            <option value="Free">Free</option>
                        </select>
                    </div>
                </div>

                <label style="margin-bottom: 5px; display: block; color: var(--accent-cyan);">Intermediate & Top Bracing Points:</label>
                <div id="segments-container">
                    <div class="segment-row">
                        <input type="number" class="brace-elev" placeholder="Elev from 0 (ft)" value="15" step="0.1" onchange="sortSegmentsAndUpdate()">
                        <select class="k-factor-dropdown" onchange="updateVisualizer()">
                            <option value="1.0">K = 1.0 (Pinned)</option>
                            <option value="0.65">K = 0.65 (Fixed-Fixed)</option>
                            <option value="0.8">K = 0.8 (Fixed-Pinned)</option>
                            <option value="1.2">K = 1.2 (Sway)</option>
                            <option value="2.1">K = 2.1 (Cantilever)</option>
                        </select>
                        <select class="axis-dropdown" onchange="updateVisualizer()">
                            <option value="Both">Both Axes</option>
                            <option value="X">X-Axis (Left)</option>
                            <option value="Y">Y-Axis (Right)</option>
                        </select>
                        <button class="btn-remove" onclick="removeSegment(this)">X</button>
                    </div>
                </div>
                <p style="font-size: 0.8rem; color: var(--text-label); margin-top: 5px; font-style: italic;">
                    * Type the elevation, then click away to automatically sort it from bottom to top.
                </p>
            </div>
            
            <div id="visualizer-svg-container" class="segments-visualizer-area"></div>
        </div>

        <button class="btn-calculate" onclick="calculate()">Calculate Capacity</button>
        <button class="btn-print" onclick="window.print()">Print / Save PDF</button>

        <div id="results" class="results-panel"></div>
    </div>

    <div id="print-report"></div>

        function resolveOverlap(labels, spacing) {
            labels.sort((a,b) => a.rawY - b.rawY);
            labels.forEach(l => l.adjY = l.rawY);
            for(let iter=0; iter<5; iter++) {
                for(let i=0; i<labels.length-1; i++) {
                    let diff = labels[i+1].adjY - labels[i].adjY;
                    if(diff < spacing) {
                        let overlap = spacing - diff;
                        labels[i].adjY -= overlap / 2;
                        labels[i+1].adjY += overlap / 2;
                    }
                }
            }
        }

        function updateVisualizer() {
            const svgContainer = document.getElementById('visualizer-svg-container');
            let totalLength = parseFloat(document.getElementById('total-length').value) || 10;
            const baseCondition = document.getElementById('base_condition').value;

            let braces = [];
            document.querySelectorAll('.segment-row').forEach(row => {
                let elev = parseFloat(row.querySelector('.brace-elev').value);
                let K = parseFloat(row.querySelector('.k-factor-dropdown').value);
                let axis = row.querySelector('.axis-dropdown').value;
                if (!isNaN(elev) && elev > 0 && elev <= totalLength) {
                    braces.push({ elev, K, axis });
                }
            });
            braces.sort((a,b) => a.elev - b.elev);

            const svgWidth = 400; const svgHeight = 400;
            const colX = 200; const topY = 40; const baseY = 360;
            const pixelPerFt = (baseY - topY) / totalLength;

            let svgHTML = `<svg viewBox="0 0 ${svgWidth} ${svgHeight}" width="100%" height="100%">`;
            svgHTML += `<line x1="${colX}" y1="${topY}" x2="${colX}" y2="${baseY}" stroke="var(--accent-cyan)" stroke-width="6" stroke-linecap="round" style="filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.5));"/>`;

            if (baseCondition === 'Fixed') {
                svgHTML += `<line x1="${colX-25}" y1="${baseY+3}" x2="${colX+25}" y2="${baseY+3}" stroke="var(--text-main)" stroke-width="3"/>`;
                for(let i=-20; i<=20; i+=10) {
                    svgHTML += `<line x1="${colX+i}" y1="${baseY+3}" x2="${colX+i-10}" y2="${baseY+13}" stroke="var(--text-label)" stroke-width="2"/>`;
                }
            } else if (baseCondition === 'Pinned') {
                svgHTML += `<polygon points="${colX},${baseY} ${colX-15},${baseY+15} ${colX+15},${baseY+15}" fill="none" stroke="var(--text-main)" stroke-width="2"/>`;
                svgHTML += `<line x1="${colX-25}" y1="${baseY+15}" x2="${colX+25}" y2="${baseY+15}" stroke="var(--text-main)" stroke-width="2"/>`;
            }

            let rightLabels = [];
            rightLabels.push({ rawY: baseY, text: `Base (0 ft)`, isBase: true });
            
            braces.forEach(b => {
                let isTop = (b.elev === totalLength);
                let text = isTop ? `@ ${b.elev.toFixed(1)} ft (Top)` : `@ ${b.elev.toFixed(1)} ft`;
                rightLabels.push({ rawY: baseY - b.elev * pixelPerFt, text: text, isTop: isTop });
            });
            
            if (!braces.some(b => b.elev === totalLength)) {
                rightLabels.push({ rawY: topY, text: `@ ${totalLength.toFixed(1)} ft (Top)`, isTop: true });
            }

            let leftLabels = [];
            let allPoints = [0];
            braces.forEach(b => { if(!allPoints.includes(b.elev)) allPoints.push(b.elev); });
            if (!allPoints.includes(totalLength)) allPoints.push(totalLength);
            allPoints.sort((a,b) => a - b);
            
            for(let i=1; i<allPoints.length; i++) {
                let midElev = (allPoints[i] + allPoints[i-1]) / 2;
                let L = allPoints[i] - allPoints[i-1];
                let rawY = baseY - midElev * pixelPerFt;
                leftLabels.push({ rawY, text: `L = ${L.toFixed(1)} ft` });
            }

            resolveOverlap(rightLabels, 20);
            resolveOverlap(leftLabels, 20);

            svgHTML += `<line x1="${colX-10}" y1="${topY}" x2="${colX+10}" y2="${topY}" stroke="var(--text-main)" stroke-width="2"/>`;
            
            braces.forEach(b => {
                let y = baseY - b.elev * pixelPerFt;
                svgHTML += `<line x1="${colX-10}" y1="${y}" x2="${colX+10}" y2="${y}" stroke="var(--text-main)" stroke-width="2"/>`;

                if(b.axis === 'X' || b.axis === 'Both') {
                    if(b.K === 1.0) { 
                        svgHTML += `<polygon points="${colX-10},${y} ${colX-25},${y-8} ${colX-25},${y+8}" fill="var(--text-main)"/>`;
                    } else { 
                        svgHTML += `<circle cx="${colX-15}" cy="${y}" r="5" fill="var(--text-main)"/>`;
                    }
                }
                if(b.axis === 'Y' || b.axis === 'Both') {
                    if(b.K === 1.0) { 
                        svgHTML += `<polygon points="${colX+10},${y} ${colX+25},${y-8} ${colX+25},${y+8}" fill="var(--text-main)"/>`;
                    } else { 
                        svgHTML += `<circle cx="${colX+15}" cy="${y}" r="5" fill="var(--text-main)"/>`;
                    }
                }
            });

            rightLabels.forEach(l => {
                svgHTML += `<polyline points="${colX+30},${l.rawY} ${colX+45},${l.rawY} ${colX+55},${l.adjY} ${colX+65},${l.adjY}" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,3"/>`;
                let color = l.isBase ? "var(--text-label)" : "var(--accent-orange)";
                let weight = l.isBase ? "normal" : "bold";
                svgHTML += `<text x="${colX+70}" y="${l.adjY + 4}" fill="${color}" font-size="12" font-weight="${weight}">${l.text}</text>`;
            });

            leftLabels.forEach(l => {
                svgHTML += `<polyline points="${colX-30},${l.rawY} ${colX-45},${l.rawY} ${colX-55},${l.adjY} ${colX-65},${l.adjY}" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,3"/>`;
                svgHTML += `<text x="${colX-70}" y="${l.adjY + 4}" fill="var(--text-label)" font-size="12" text-anchor="end">${l.text}</text>`;
            });

            svgHTML += `</svg>`;
            svgContainer.innerHTML = svgHTML;
        }

        function calculate() {
            const DL = parseFloat(document.getElementById('dl').value) || 0;
            const LL = parseFloat(document.getElementById('ll').value) || 0;
            const method = document.getElementById('method').value;
            const E = 29000;
            
            const astmVal = document.getElementById('astm_select').value;
            const gradeVal = document.getElementById('grade_select').value;
            let displaySteelName = astmVal === "Custom" ? "Custom Steel Grade" : `ASTM ${astmVal} ${gradeVal === "Standard" ? "" : "- " + gradeVal}`;
            const Fy = parseFloat(document.getElementById('fy_value').value);

            let totalLength = parseFloat(document.getElementById('total-length').value) || 0;

            if (isNaN(Fy) || Fy <= 0 || totalLength <= 0) {
                alert("Please ensure Yield Strength and Total Length are valid positive numbers.");
                return;
            }

            let allBraces = [];
            document.querySelectorAll('.segment-row').forEach(row => {
                let elev = parseFloat(row.querySelector('.brace-elev').value);
                let K = parseFloat(row.querySelector('.k-factor-dropdown').value);
                let axis = row.querySelector('.axis-dropdown').value;
                if (!isNaN(elev) && elev > 0 && elev <= totalLength) {
                    allBraces.push({ elev, K, axis });
                }
            });
            allBraces.sort((a,b) => a.elev - b.elev);

            let maxKLx = 0; let maxKLy = 0;

            let bracesX = allBraces.filter(b => b.axis === 'X' || b.axis === 'Both');
            if (!bracesX.some(b => b.elev === totalLength)) { bracesX.push({ elev: totalLength, K: 1.0, axis: 'X' }); }
            let prevX = 0;
            bracesX.forEach(b => {
                let L = b.elev - prevX;
                let KL = b.K * L * 12;
                if (KL > maxKLx) maxKLx = KL;
                prevX = b.elev;
            });

            let bracesY = allBraces.filter(b => b.axis === 'Y' || b.axis === 'Both');
            if (!bracesY.some(b => b.elev === totalLength)) { bracesY.push({ elev: totalLength, K: 1.0, axis: 'Y' }); }
            let prevY = 0;
            bracesY.forEach(b => {
                let L = b.elev - prevY;
                let KL = b.K * L * 12;
                if (KL > maxKLy) maxKLy = KL;
                prevY = b.elev;
            });

            let RequiredLoad = method === "LRFD" ? Math.max(1.2 * DL + 1.6 * LL, 1.4 * DL) : DL + LL;

            let dbCopy = [...sectionDatabase];
            dbCopy.sort((a, b) => a.weight - b.weight);
            let finalSection = null; let finalData = {};

            for (let section of dbCopy) {
                let slendernessX = maxKLx / section.rx;
                let slendernessY = maxKLy / section.ry;
                
                let gov_slenderness = 0; let axisCtrl = "Y";

                if (maxKLx <= maxKLy) {
                    gov_slenderness = slendernessY; axisCtrl = "Y";
                } else {
                    let KLeff = maxKLx / (section.rx / section.ry);
                    if (KLeff > maxKLy) { gov_slenderness = KLeff / section.ry; axisCtrl = "X"; }
                    else { gov_slenderness = maxKLy / section.ry; axisCtrl = "Y"; }
                }

                if (gov_slenderness > 200) continue;

                let Fe = (Math.pow(Math.PI, 2) * E) / Math.pow(gov_slenderness, 2);
                let lambda_c = 4.71 * Math.sqrt(E / Fy);
                let Fcr = gov_slenderness <= lambda_c ? Math.pow(0.658, (Fy / Fe)) * Fy : 0.877 * Fe;
                
                let Pn = Fcr * section.Ag;
                let capacity = method === "LRFD" ? 0.9 * Pn : Pn / 1.67;
                
                if (capacity >= RequiredLoad) {
                    finalSection = section;
                    finalData = {
                        gov_slenderness: gov_slenderness.toFixed(2), Fe: Fe.toFixed(2),
                        Fcr: Fcr.toFixed(2), Pn: Pn.toFixed(2), capacity: capacity.toFixed(2),
                        required: RequiredLoad.toFixed(2), axis: axisCtrl
                    };
                    break;
                }
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'flex';

            if (finalSection) {
                let reqSymbol = method === 'LRFD' ? 'P<sub>u</sub>' : 'P<sub>a</sub>';
                let capSymbol = method === 'LRFD' ? '&phi;P<sub>n</sub>' : 'P<sub>n</sub>/&Omega;';
                let utilRatio = ((RequiredLoad / parseFloat(finalData.capacity)) * 100).toFixed(1);

                resultsDiv.innerHTML = `
                    <div class="results-header">
                        <h3>Analysis Results</h3>
                        <div class="status-badge status-safe-badge">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            STATUS: SAFE
                        </div>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-card-header">Required Load (${reqSymbol})</div>
                            <div class="result-main-value">${RequiredLoad.toFixed(1)} <span>kips</span></div>
                            <div class="result-details">
                                <div class="result-details-row"><span class="detail-label">Design Method:</span> <span>${method}</span></div>
                                <div class="result-details-row"><span class="detail-label">Dead Load:</span> <span>${DL} k</span></div>
                                <div class="result-details-row"><span class="detail-label">Live Load:</span> <span>${LL} k</span></div>
                            </div>
                        </div>
                        <div class="result-card">
                            <div class="result-card-header">Design Capacity (${capSymbol})</div>
                            <div class="result-main-value blue">${finalData.capacity} <span>kips</span></div>
                            <div class="result-details">
                                <div class="result-details-row"><span class="detail-label">Nominal (P<sub>n</sub>):</span> <span>${finalData.Pn} k</span></div>
                                <div class="result-details-row"><span class="detail-label">Utilization:</span> <span>${utilRatio}%</span></div>
                                <div class="result-details-row"><span class="detail-label">Steel Grade:</span> <span>${displaySteelName}</span></div>
                            </div>
                        </div>
                        <div class="result-card">
                            <div class="result-card-header">Optimal Section</div>
                            <div class="result-main-value green">${finalSection.name}</div>
                            <div class="result-details" style="margin-top: 15px;">
                                <div class="result-details-row"><span class="detail-label">Gross Area (A<sub>g</sub>):</span> <span>${finalSection.Ag} in²</span></div>
                                <div class="result-details-row"><span class="detail-label">Radius (r<sub>x</sub>):</span> <span>${finalSection.rx} in</span></div>
                                <div class="result-details-row"><span class="detail-label">Radius (r<sub>y</sub>):</span> <span>${finalSection.ry} in</span></div>
                            </div>
                        </div>
                        <div class="result-card">
                            <div class="result-card-header">Governing Limits</div>
                            <div class="result-details" style="margin-top: 5px;">
                                <div class="result-details-row"><span class="detail-label">Max KL/r:</span> <span>${finalData.gov_slenderness} (${finalData.axis})</span></div>
                                <div class="result-details-row"><span class="detail-label">Elastic Buckling (F<sub>e</sub>):</span> <span>${finalData.Fe} ksi</span></div>
                                <div class="result-details-row"><span class="detail-label">Critical Stress (F<sub>cr</sub>):</span> <span>${finalData.Fcr} ksi</span></div>
                                <div class="result-details-row"><span class="detail-label">Max KL<sub>x</sub> / KL<sub>y</sub>:</span> <span>${(maxKLx / 12).toFixed(1)}' / ${(maxKLy / 12).toFixed(1)}'</span></div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                resultsDiv.innerHTML = `
                    <div class="results-header">
                        <h3>Analysis Results</h3>
                        <div class="status-badge status-unsafe-badge">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            STATUS: NOT SAFE
                        </div>
                    </div>
                    <div class="result-card" style="border-color: rgba(239, 68, 68, 0.4);">
                        <div class="result-card-header" style="color: var(--danger-red);">Capacity Failure</div>
                        <p style="margin: 0; color: var(--text-main);">No section in the database satisfies the required load of <strong>${RequiredLoad.toFixed(2)} kips</strong> under the current slenderness limits.</p>
                        <div class="result-details" style="margin-top: 15px;">
                            <div class="result-details-row"><span class="detail-label">Max effective KLx:</span> <span>${(maxKLx / 12).toFixed(2)} ft</span></div>
                            <div class="result-details-row"><span class="detail-label">Max effective KLy:</span> <span>${(maxKLy / 12).toFixed(2)} ft</span></div>
                        </div>
                    </div>
                `;
            }
            resultsDiv.scrollIntoView({ behavior: 'smooth' });

            // Print report
            const printReport = document.getElementById('print-report');
            let printHTML = `
                <div class="print-header">
                    <h1>STEEL ANALYSIS</h1><h2>AXIAL COMPRESSION DESIGN REPORT</h2>
                </div>
                <div class="table-title">1. Material & Load Parameters</div>
                <table class="print-table">
                    <tr><th>Design Method</th><td>${method}</td></tr>
                    <tr><th>Steel Designation</th><td>${displaySteelName}</td></tr>
                    <tr><th>Yield Strength (Fy)</th><td>${Fy} ksi</td></tr>
                    <tr><th>Modulus of Elasticity (E)</th><td>29,000 ksi</td></tr>
                    <tr><th>Dead Load (DL)</th><td>${DL} kips</td></tr>
                    <tr><th>Live Load (LL)</th><td>${LL} kips</td></tr>
                    <tr><th>Required Axial Load (${method === 'LRFD' ? 'Pu' : 'Pa'})</th><td><strong>${RequiredLoad.toFixed(2)} kips</strong></td></tr>
                </table>
                <div class="table-title">2. Geometric & Bracing Data</div>
                <table class="print-table">
                    <tr><th>Total Column Length</th><td>${totalLength.toFixed(2)} ft</td></tr>
                    <tr><th>Max Effective Length (KLx)</th><td>${(maxKLx / 12).toFixed(2)} ft</td></tr>
                    <tr><th>Max Effective Length (KLy)</th><td>${(maxKLy / 12).toFixed(2)} ft</td></tr>
                </table>
            `;
            if (finalSection) {
                printHTML += `
                    <div class="table-title">3. Selected Section Properties</div>
                    <table class="print-table">
                        <tr><th>Selected Shape</th><td><strong>${finalSection.name}</strong></td></tr>
                        <tr><th>Gross Area (Ag)</th><td>${finalSection.Ag} in²</td></tr>
                        <tr><th>Radius of Gyration (rx)</th><td>${finalSection.rx} in</td></tr>
                        <tr><th>Radius of Gyration (ry)</th><td>${finalSection.ry} in</td></tr>
                    </table>
                    <div class="table-title">4. Capacity & Design Checks</div>
                    <table class="print-table">
                        <tr><th>Governing Slenderness (KL/r)</th><td>${finalData.gov_slenderness} (${finalData.axis}-Axis Controls)</td></tr>
                        <tr><th>Elastic Buckling Stress (Fe)</th><td>${finalData.Fe} ksi</td></tr>
                        <tr><th>Critical Buckling Stress (Fcr)</th><td>${finalData.Fcr} ksi</td></tr>
                        <tr><th>Nominal Axial Strength (Pn)</th><td>${finalData.Pn} kips</td></tr>
                        <tr><th>Design Strength (${method === 'LRFD' ? '&phi;Pn' : 'Pn/&Omega;'})</th><td><strong>${finalData.capacity} kips</strong></td></tr>
                        <tr><th>Design Status</th><td class="print-safe">SAFE (Capacity &ge; Required Load)</td></tr>
                    </table>
                `;
            } else {
                printHTML += `
                    <div class="table-title">3. Design Checks</div>
                    <table class="print-table"><tr><th>Design Status</th><td class="print-unsafe">NOT SAFE: No section in the database satisfies the required load of ${RequiredLoad.toFixed(2)} kips.</td></tr></table>
                `;
            }
            printReport.innerHTML = printHTML;
        }
    </script>
</body>
</html>
